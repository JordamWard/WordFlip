      <button onClick={onBack} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),marginBottom:20,fontSize:"0.8rem"}}>← Back</button>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 20px"}}>Local Multiplayer</h2>
      <p style={{color:"var(--wf-text-dim)",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.85rem",marginBottom:8}}>Players</p>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
        {[2,3,4].map(n=>(
          <button key={n} onClick={()=>setPlayerCount(n)} style={{...btnStyle(playerCount===n?"var(--wf-accent2)":"var(--wf-border)",playerCount===n?"#0D1B2A":"var(--wf-text-dim)"),padding:"8px 18px"}}>{n}</button>
        ))}
      </div>
      <div style={{background:"var(--wf-surface)",border:"1px solid var(--wf-border)",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.72rem",margin:0,lineHeight:1.8}}>⭐ Flip in order → <strong style={{color:"#F5EDD6"}}>300 pts</strong> · ✓ Any order → <strong style={{color:"#F5EDD6"}}>100 pts</strong> · ✗ Wrong → passes turn</p>
      </div>
      <button onClick={()=>setStarted(true)} style={{...btnStyle("var(--wf-accent)","#0a2e24"),width:"100%",padding:"14px",borderRadius:12}}>Start Game</button>
    </div>
  );

  if (gameOver) {
    const maxScore=Math.max(...scores);
    const winners=scores.map((s,i)=>s===maxScore?i:-1).filter(i=>i>=0);
    return (
      <div style={{textAlign:"center",maxWidth:360,margin:"0 auto"}}>
        <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 20px"}}>
          {winners.length===1?`${playerNames[winners[0]]} Wins!`:"It's a Tie!"}
        </h2>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          {scores.map((s,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",background:"var(--wf-surface)",borderRadius:10,padding:"10px 16px",border:`1.5px solid ${s===maxScore?COLORS[i]:"var(--wf-border)"}`}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:COLORS[i],fontWeight:700}}>{playerNames[i]}</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"var(--wf-accent2)",fontWeight:700}}>{s.toLocaleString()} pts</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>{ setGameOver(false); setStarted(false); setFoundWords([]); setFoundTileIdsMulti(new Set()); setFlipped([]); setScores(Array(playerCount).fill(0)); setCurrentPlayer(0); setTurns(0); }} style={btnStyle("var(--wf-accent)","#0a2e24")}>Rematch</button>
          <button onClick={onBack} style={btnStyle("var(--wf-border)","#F5EDD6")}>Menu</button>
        </div>
      </div>
    );
  }

  const foundWordSet=new Set(foundWords.map(f=>f.wordIndex));

  function handleTileClick(tile) {
    if (multiProcessingRef.current||foundTileIdsMulti.has(tile.id)||multiFlippedRef.current.length>=4||multiFlippedRef.current.includes(tile.id)) return;
    multiFlippedRef.current=[...multiFlippedRef.current,tile.id];
    const newFlipped=multiFlippedRef.current;
    setFlipped([...newFlipped]);
    if (newFlipped.length===4) {
      setTurns(t=>t+1);
      const ft=newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters=ft.map(t=>t.letter);
      const sorted=[...letters].sort().join("");
      const matchIdx=words.findIndex((w,i)=>!foundWordSet.has(i)&&[...w].sort().join("")===sorted);
      if (matchIdx===-1) {
        multiProcessingRef.current=true;
        setError(newFlipped); setFlash("bad");
        setTimeout(()=>{multiFlippedRef.current=[];multiProcessingRef.current=false;setFlipped([]);setError([]);setFlash(null);setCurrentPlayer(p=>(p+1)%playerCount);},700); return;
      }
      const multiInOrder = letters.join("") === words[matchIdx];
      const multiPts = multiInOrder ? 300 : 100;
      multiProcessingRef.current=true;
      soundManager.wordGreen();
      setFlash(multiInOrder ? "goodOrder" : "good");
      setTimeout(()=>{
        const newFW=[...foundWords,{wordIndex:matchIdx,player:currentPlayer,inOrder:multiInOrder}];
        setFoundWords(newFW);
        setInOrderMap(prev=>({...prev,[matchIdx]:multiInOrder}));
        setFoundTileIdsMulti(prev=>new Set([...prev,...newFlipped]));
        const ns=[...scores]; ns[currentPlayer]+=multiPts; setScores(ns);
        multiFlippedRef.current=[];multiProcessingRef.current=false;
        setFlipped([]); setFlash(null);
        if (newFW.length===words.length) {
          soundManager.complete(); setGameOver(true);
          // Small payout for a completed pass-and-play game (signed-in device
          // owner). Only on natural completion — the End button pays nothing,
          // so quick-quitting can't farm coins.
          grantIfSignedIn(TOKENS.LOCAL, 'lmp-' + Date.now(), refreshWallet);
          if (onAchievements) onAchievements(unlockAchievements(['play_local']));
        }
      },400);
    }
  }

  return (
    <div style={{width:"100%",maxWidth:500,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:10,flexWrap:"wrap"}}>
        {playerNames.map((name,i)=>(
          <div key={i} style={{padding:"4px 14px",borderRadius:20,background:i===currentPlayer?COLORS[i]+"22":"var(--wf-surface)",border:`1.5px solid ${i===currentPlayer?COLORS[i]:"var(--wf-border)"}`,fontFamily:"'JetBrains Mono',monospace",fontSize:"0.8rem",color:i===currentPlayer?COLORS[i]:"#2a4060",fontWeight:i===currentPlayer?700:400,transition:"all 0.2s"}}>
            {name}: {scores[i].toLocaleString()}pts
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:10}}>
        {words.map((word,i)=>{
          const fw=foundWords.find(f=>f.wordIndex===i);
          return <div key={i} style={{padding:"3px 12px",borderRadius:20,background:fw?COLORS[fw.player]+"33":"#0e1f30",border:fw?`1.5px solid ${COLORS[fw.player]}`:"1.5px solid var(--wf-border)",fontFamily:"'JetBrains Mono',monospace",fontWeight:fw?.inOrder?900:700,fontSize:"0.8rem",color:fw?COLORS[fw.player]:"var(--wf-text-mute)",letterSpacing:"0.15em",transition:"all 0.3s cubic-bezier(.4,2,.6,1)",transform:fw?"scale(1.06)":"scale(1)",boxShadow:fw?.inOrder?`0 0 10px ${COLORS[fw.player]}88`:"none"}}>{fw?.inOrder?"⭐ ":""}{word}</div>;
        })}
      </div>
      <div style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>
        {flash&&<span style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:"1rem",color:flash==="good"||flash==="goodOrder"?COLORS[currentPlayer]:"#FF5E5B"}}>
          {flash==="good"&&`✓ ${playerNames[currentPlayer]} found a word — goes again!`}
          {flash==="goodOrder"&&`⭐ ${playerNames[currentPlayer]} got it in order — goes again!`}
          {flash==="bad"&&"✗ Next player's turn"}
        </span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"clamp(3px,1.2vw,8px)",padding:"clamp(4px,2vw,12px)",background:"var(--wf-surface)",borderRadius:16,border:"1.5px solid var(--wf-border)"}}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile} isFlipped={flipped.includes(tile.id)} isFound={foundTileIdsMulti.has(tile.id)} isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)} isError={error.includes(tile.id)} onClick={()=>handleTileClick(tile)} orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined} />
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.75rem",margin:0}}>
          {playerNames[currentPlayer]}'s turn · Turn {turns+1}
        </p>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{ if(window.confirm('End game and see results?')) setGameOver(true); }} style={{...btnStyle("var(--wf-border)","var(--wf-text-mute)"),padding:"4px 10px",fontSize:"0.7rem"}}>End</button>
          <button onClick={()=>{ if(window.confirm('Return to menu?')) onBack(); }} style={{...btnStyle("var(--wf-border)","var(--wf-text-mute)"),padding:"4px 10px",fontSize:"0.7rem"}}>Menu</button>
        </div>
      </div>
    </div>
  );
}

// ─── Online Multiplayer ───────────────────────────────────────────────────────
function OnlineScreen({ onBack, refreshWallet, onAchievements }) {
  const [phase, setPhase] = useState('join'); // join | lobby | game | done
  const [playerName, setPlayerName] = useState(() => localStorage.getItem('wf_online_name') || '');
  const [codeInput, setCodeInput] = useState(() => new URLSearchParams(window.location.search).get('room') || '');
  const [room, setRoom] = useState(null);
  const [players, setPlayers] = useState([]);
  const [gs, setGs] = useState(null);
  const [tiles, setTiles] = useState([]);
  const [flipped, setFlipped] = useState([]);
  const [remoteFlips, setRemoteFlips] = useState(new Set());
  const [errTiles, setErrTiles] = useState([]);
  const [flash, setFlash] = useState(null);
  const [timeLeft, setTimeLeft] = useState(60);
  const [busy, setBusy] = useState(false);
  const [errMsg, setErrMsg] = useState('');
  const [linkCopied, setLinkCopied] = useState(false);
  const [fromInvite, setFromInvite] = useState(!!(new URLSearchParams(window.location.search).get('room')));

  const myId = useRef(getMyPlayerId()).current;
  const channelRef = useRef(null);
  const timerRef = useRef(null);
  const processingRef = useRef(false);
  const flippedRef = useRef([]);
  const foundTileIdsRef = useRef(new Set());
  const phaseRef = useRef('join');
  const gsRef = useRef(null);
  const roomRef = useRef(null);
  const playersRef = useRef([]);

  useEffect(() => { phaseRef.current = phase; }, [phase]);
  useEffect(() => { gsRef.current = gs; }, [gs]);
  useEffect(() => { roomRef.current = room; }, [room]);
  useEffect(() => { playersRef.current = players; }, [players]);

  // Rebuild found tile id set whenever game state changes
  useEffect(() => {
    if (!gs) return;
    const ids = new Set();
    (gs.found_words || []).forEach(fw => (fw.tile_ids || []).forEach(id => ids.add(id)));
    foundTileIdsRef.current = ids;
  }, [gs]);

  // Auto-join when arriving via invite link and player already has a saved name
  useEffect(() => {
    if (fromInvite && codeInput && playerName.trim()) {
      joinRoom();
    }
  }, []); // intentionally runs once on mount

  // Cleanup subscriptions on unmount
  useEffect(() => () => {
    if (channelRef.current) try { getSB().removeChannel(channelRef.current); } catch(e) {}
    clearInterval(timerRef.current);
  }, []);

  // Token payout when the game ends: winner gets MP_WIN, everyone else MP_LOSS.
  // The 'mp-<roomId>' reason is idempotent server-side, so re-renders, refreshes,
  // and revisits of the done screen can never double-pay.
  useEffect(() => {
    if (phase !== 'done' || !roomRef.current) return;
    const ps = playersRef.current;
    if (!ps.length) return;
    const maxScore = Math.max(...ps.map(p => p.score || 0));
    const mine = ps.find(p => p.id === myId)?.score || 0;
    const won = maxScore > 0 && mine >= maxScore;
    const amount = won ? TOKENS.MP_WIN : TOKENS.MP_LOSS;
    grantIfSignedIn(amount, 'mp-' + roomRef.current.id, refreshWallet);
    // Mode achievements: played online, and won it (finished top).
    if (onAchievements) onAchievements(unlockAchievements(won ? ['play_online','win_online'] : ['play_online']));
  }, [phase]);

  // 60-second countdown; auto-pass when it hits 0 on my turn
  useEffect(() => {
    if (phase !== 'game' || !gs?.turn_expires_at) return;
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      const raw = Math.round((new Date(gs.turn_expires_at) - Date.now()) / 1000);
      setTimeLeft(Math.max(0, raw));
      if (processingRef.current) return;
      const cur = gsRef.current;
      if (!cur) return;
      if (raw <= 0 && cur.current_player_id === myId) {
        clearInterval(timerRef.current);
        passTurn(cur);
      } else if (raw <= 0 && cur.current_player_id !== myId) {
        // Takeover: if the current player closed the app, their device can't
        // pass its own turn and the game would hang at 0:00 forever. After a
        // grace period — staggered by turn order so clients don't stampede —
        // another client advances the turn. passTurn's turn_number guard means
        // only the first writer wins; the rest are no-ops.
        const sorted = [...playersRef.current].sort((a,b)=>a.turn_order-b.turn_order);
        const myIdx = Math.max(0, sorted.findIndex(p => p.id === myId));
        if (raw <= -(4 + myIdx * 2)) {
          clearInterval(timerRef.current);
          passTurn(cur);
        }
      }
    }, 500);
    return () => clearInterval(timerRef.current);
  }, [gs?.turn_expires_at, phase]);

  function getNextPlayer(list, currentId) {
    const sorted = [...list].sort((a, b) => a.turn_order - b.turn_order);
    const idx = sorted.findIndex(p => p.id === currentId);
    return sorted[(idx + 1) % sorted.length];
  }

  // Full re-sync from the DB: covers realtime events missed while the WebSocket
  // was down (iOS kills it whenever Safari is backgrounded). Applies the same
  // transitions the realtime handlers would have.
  async function refreshRoomState(roomId) {
    try {
      const db = getSB();
      const [{ data: r }, { data: pl }, { data: gsData }] = await Promise.all([
        db.from('rooms').select('*').eq('id', roomId).single(),
        db.from('players').select('*').eq('room_id', roomId).order('turn_order'),
        db.from('game_state').select('*').eq('room_id', roomId).maybeSingle(),
      ]);
      if (pl) { setPlayers(pl); playersRef.current = pl; }
      if (gsData) {
        setGs(gsData); gsRef.current = gsData;
        const ids = new Set();
        (gsData.found_words || []).forEach(fw => (fw.tile_ids || []).forEach(id => ids.add(id)));
        foundTileIdsRef.current = ids;
      }
      if (r) {
        setRoom(r); roomRef.current = r;
        if (r.status === 'playing' && phaseRef.current === 'lobby') {
          setTiles(buildTilesSeeded(r.words, r.shuffle_seed));
          setPhase('game'); phaseRef.current = 'game';
        }
        if (r.status === 'done' && phaseRef.current === 'game') {
          setPhase('done'); phaseRef.current = 'done';
        }
      }
    } catch(e) { console.error('refreshRoomState:', e); }
  }

  // Re-sync + resubscribe when the app returns to the foreground. iOS drops the
  // realtime WebSocket on background; without this, guests stay stuck in the
  // lobby after the host starts, and turn changes stop arriving.
  useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState !== 'visible') return;
      const r = roomRef.current;
      if (!r || (phaseRef.current !== 'lobby' && phaseRef.current !== 'game')) return;
      ensureFreshSession();
      refreshRoomState(r.id);
      const st = channelRef.current?.state;
      if (st !== 'joined' && st !== 'joining') {
        leaveCurrentChannel();
        subscribeToRoom(r.id);
      }
    };
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, []);

  function subscribeToRoom(roomId) {
    const channel = getSB()
      .channel(`room-${roomId}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, payload => {
        const r = payload.new;
        setRoom(r); roomRef.current = r;
        if (r.status === 'playing' && phaseRef.current !== 'game' && phaseRef.current !== 'done') {
          setTiles(buildTilesSeeded(r.words, r.shuffle_seed));
          setPhase('game'); phaseRef.current = 'game';
        }
        if (r.status === 'done' && phaseRef.current !== 'done') {
          setPhase('done'); phaseRef.current = 'done';
        }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_id=eq.${roomId}` }, async () => {
        const { data } = await getSB().from('players').select('*').eq('room_id', roomId).order('turn_order');
        if (data) { setPlayers(data); playersRef.current = data; }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'game_state', filter: `room_id=eq.${roomId}` }, async payload => {
        const newGs = payload.new;
        if (!newGs) return;
        setGs(newGs); gsRef.current = newGs;
        const ids = new Set();
        (newGs.found_words || []).forEach(fw => (fw.tile_ids || []).forEach(id => ids.add(id)));
        foundTileIdsRef.current = ids;
        setRemoteFlips(new Set());
        if (newGs.current_player_id !== myId) {
          flippedRef.current = []; setFlipped([]); setErrTiles([]); setFlash(null);
          processingRef.current = false;
        }
        // Fallback game-start: if game_state arrives while still in lobby,
        // transition to game (covers the case where rooms UPDATE was missed)
        if (phaseRef.current === 'lobby') {
          let r = roomRef.current;
          if (!r?.words) {
            const { data } = await getSB().from('rooms').select('*').eq('id', roomId).single();
            if (data) { r = data; setRoom(data); roomRef.current = data; }
          }
          if (r?.words) {
            setTiles(buildTilesSeeded(r.words, r.shuffle_seed));
            setPhase('game'); phaseRef.current = 'game';
          }
        }
      })
      .on('broadcast', { event: 'tile_flip' }, ({ payload }) => {
        if (payload?.playerId !== myId) {
          setRemoteFlips(prev => new Set([...prev, payload.tileId]));
        }
      })
      .subscribe(status => {
        if (status === 'SUBSCRIBED') {
          // Catch anything that happened between connect attempts
          refreshRoomState(roomId);
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
          // Retry unless we intentionally left this room
          if (channelRef.current === channel &&
              (phaseRef.current === 'lobby' || phaseRef.current === 'game')) {
            setTimeout(() => {
              if (channelRef.current !== channel) return;
              leaveCurrentChannel();
              subscribeToRoom(roomId);
            }, 2000);
          }
        }
      });
    channelRef.current = channel;
  }

  // Shared cleanup: unsubscribe from any active channel before entering a new room
  function leaveCurrentChannel() {
    const ch = channelRef.current;
    if (ch) {
      // Null the ref first: the CLOSED status callback fires during removal and
      // must see this as an intentional leave, not a dropped connection to retry.
      channelRef.current = null;
      try { getSB().removeChannel(ch); } catch(e) {}
    }
  }

  function resetRoomState() {
    leaveCurrentChannel();
    setRoom(null); roomRef.current = null;
    setPlayers([]); playersRef.current = [];
    setGs(null); gsRef.current = null;
    setTiles([]); setFlipped([]); flippedRef.current = [];
    setRemoteFlips(new Set()); setErrTiles([]); setFlash(null);
    processingRef.current = false;
    setPhase('join'); phaseRef.current = 'join';
  }

  async function createRoom() {
    if (!playerName.trim()) { setErrMsg('Enter your name first'); return; }
    setBusy(true); setErrMsg('');
    localStorage.setItem('wf_online_name', playerName.trim());
    leaveCurrentChannel();
    try {
      // Signed-in users attach their JWT to every REST call; a day-old expired
      // token would make all of these 401. Refresh it first (no-op when signed out).
      await ensureFreshSession();
      const db = getSB();
      // Close any stale waiting rooms this player hosted so they don't linger
      await db.from('rooms').update({ status: 'done' }).eq('host_id', myId).eq('status', 'waiting');
      const words = pickRandom(ALL_WORDS_9);
      const seed = Math.floor(Math.random() * 1e8);
      const { data: r, error: re } = await db.from('rooms')
        .insert({ code: genRoomCode(), status: 'waiting', words, shuffle_seed: seed, host_id: myId })
        .select().single();
      if (re) throw re;
      const { error: pe } = await db.from('players')
        .upsert({ id: myId, room_id: r.id, name: playerName.trim(), turn_order: 0, score: 0 },
                 { onConflict: 'id' });
      if (pe) throw pe;
      setRoom(r); roomRef.current = r;
      setPlayers([{ id: myId, room_id: r.id, name: playerName.trim(), turn_order: 0, score: 0 }]);
      playersRef.current = [{ id: myId, room_id: r.id, name: playerName.trim(), turn_order: 0, score: 0 }];
      try { window.history.replaceState({}, '', window.location.pathname); } catch(e) {}
      setFromInvite(false);
      subscribeToRoom(r.id);
      setPhase('lobby'); phaseRef.current = 'lobby';
    } catch(e) {
      setErrMsg('Could not create room — check console for details.');
      console.error('createRoom:', e);
    }
    setBusy(false);
  }

  async function joinRoom() {
    if (!playerName.trim()) { setErrMsg('Enter your name first'); return; }
    const code = codeInput.trim().toUpperCase();
    if (code.length < 2) { setErrMsg('Enter a room code'); return; }
    setBusy(true); setErrMsg('');
    localStorage.setItem('wf_online_name', playerName.trim());
    leaveCurrentChannel();
    try {
      // Same as createRoom: make sure a signed-in user's JWT isn't expired,
      // or every call below 401s ("it kept not letting us join").
      await ensureFreshSession();
      const db = getSB();
      // Fetch room regardless of status so we can give specific errors
      const { data: r, error: re } = await db.from('rooms').select('*').eq('code', code).single();
      if (re || !r) { setErrMsg('Room not found — double-check the code.'); setBusy(false); return; }
      if (r.status === 'done') { setErrMsg('That game has ended. Ask your friend to create a new room.'); setBusy(false); return; }

      const { data: existing } = await db.from('players').select('*').eq('room_id', r.id).order('turn_order');
      const alreadyIn = existing?.find(p => p.id === myId);
      if (!alreadyIn) {
        if (existing && existing.length >= 4) { setErrMsg('Room is full (4 players max).'); setBusy(false); return; }
        const { error: pe } = await db.from('players')
          .upsert({ id: myId, room_id: r.id, name: playerName.trim(), turn_order: existing?.length || 0, score: 0 },
                  { onConflict: 'id' });
        if (pe) throw pe;
      }
      const allPlayers = alreadyIn ? (existing || []) : [...(existing || []),
        { id: myId, room_id: r.id, name: playerName.trim(), turn_order: existing?.length || 0, score: 0 }];
      setRoom(r); roomRef.current = r;
      setPlayers(allPlayers); playersRef.current = allPlayers;

      // Clear invite URL so it doesn't persist across sessions
      if (fromInvite) {
        try { window.history.replaceState({}, '', window.location.pathname); } catch(e) {}
        setFromInvite(false);
      }

      if (r.status === 'playing') {
        // Late join: fetch current game state and jump straight into the game
        const { data: gsData } = await db.from('game_state').select('*').eq('room_id', r.id).single();
        if (gsData) { setGs(gsData); gsRef.current = gsData; }
        setTiles(buildTilesSeeded(r.words, r.shuffle_seed));
        subscribeToRoom(r.id);
        setPhase('game'); phaseRef.current = 'game';
      } else {
        subscribeToRoom(r.id);
        setPhase('lobby'); phaseRef.current = 'lobby';
      }
    } catch(e) {
      setErrMsg('Could not join room — please try again.');
      console.error('joinRoom:', e);
    }
    setBusy(false);
  }

  async function startGame() {
    try {
      const db = getSB();
      const now = new Date();
      const expires = new Date(now.getTime() + 60000);
      const firstPlayer = [...playersRef.current].sort((a, b) => a.turn_order - b.turn_order)[0];
      await db.from('rooms').update({ status: 'playing', started_at: now.toISOString() }).eq('id', roomRef.current.id);
      await db.from('game_state').insert({
        room_id: roomRef.current.id, found_words: [], turn_number: 0,
        current_player_id: firstPlayer?.id || myId,
        turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
      });
      // Host transitions locally (Realtime covers guests)
      setTiles(buildTilesSeeded(roomRef.current.words, roomRef.current.shuffle_seed));
      setPhase('game'); phaseRef.current = 'game';
    } catch(e) { console.error('startGame:', e); }
  }

  function handleTileClick(tile) {
    if (gsRef.current?.current_player_id !== myId) return;
    if (processingRef.current) return;
    if (foundTileIdsRef.current.has(tile.id)) return;
    if (flippedRef.current.length >= 4) return;
    if (flippedRef.current.includes(tile.id)) return;
    soundManager.flip();
    flippedRef.current = [...flippedRef.current, tile.id];
    setFlipped([...flippedRef.current]);
    try { channelRef.current?.send({ type: 'broadcast', event: 'tile_flip', payload: { tileId: tile.id, playerId: myId } }); } catch(e) {}
    if (flippedRef.current.length === 4) {
      processingRef.current = true;
      submitGuess([...flippedRef.current]);
    }
  }

  async function submitGuess(tileIds) {
    const db = getSB();
    const currentGs = gsRef.current;
    const currentRoom = roomRef.current;
    const currentPlayers = playersRef.current;
    if (!currentGs || !currentRoom) { processingRef.current = false; return; }
    const ft = tileIds.map(id => tiles.find(t => t.id === id)).filter(Boolean);
    const letters = ft.map(t => t.letter);
    const sorted = [...letters].sort().join('');
    const words = currentRoom.words;
    const foundWordsList = currentGs.found_words || [];
    const foundIndices = new Set(foundWordsList.map(fw => fw.wordIndex));
    const matchIdx = words.findIndex((w, i) => !foundIndices.has(i) && [...w].sort().join('') === sorted);
    const now = new Date();
    const expires = new Date(now.getTime() + 60000);
    const myPlayerData = currentPlayers.find(p => p.id === myId);

    function unlock() {
      flippedRef.current = []; setFlipped([]); setErrTiles([]); setFlash(null);
      processingRef.current = false;
    }
    // Safety valve: always release the lock within 5s even if a DB call hangs
    const safetyTimer = setTimeout(unlock, 5000);

    if (matchIdx === -1) {
      setErrTiles(tileIds); setFlash('bad');
      soundManager.wrong();
      const nextP = getNextPlayer(currentPlayers, myId);
      setTimeout(async () => {
        try {
          await db.from('game_state').update({
            turn_number: (currentGs.turn_number || 0) + 1,
            current_player_id: nextP.id,
            turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
          }).eq('room_id', currentRoom.id);
        } catch(e) { console.error('submitGuess wrong:', e); }
        clearTimeout(safetyTimer); unlock();
      }, 800);
      return;
    }

    const inOrder = letters.join('') === words[matchIdx];
    const pts = inOrder ? 300 : 100;
    inOrder ? soundManager.wordGreen() : soundManager.wordYellow();
    setFlash(inOrder ? 'good' : 'goodYellow');
    const newFoundWords = [...foundWordsList, {
      wordIndex: matchIdx, playerId: myId,
      playerName: myPlayerData?.name || '?', inOrder, tile_ids: tileIds,
    }];
    setTimeout(async () => {
      try {
        const gameOver = newFoundWords.length >= words.length;
        // Read my current score fresh — the local players list can be stale if a
        // realtime event was missed, and score = stale + pts would drop points.
        const { data: freshMe } = await db.from('players').select('score').eq('id', myId).maybeSingle();
        const baseScore = freshMe?.score ?? myPlayerData?.score ?? 0;
        await db.from('players').update({ score: baseScore + pts }).eq('id', myId);
        await db.from('game_state').update({
          found_words: newFoundWords, turn_number: (currentGs.turn_number || 0) + 1,
          current_player_id: myId,
          turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
        }).eq('room_id', currentRoom.id);
        if (gameOver) await db.from('rooms').update({ status: 'done' }).eq('id', currentRoom.id);
      } catch(e) { console.error('submitGuess hit:', e); }
      clearTimeout(safetyTimer); unlock();
    }, 500);
  }

  // Advance an expired turn. Works both for my own turn and as a takeover when
  // the current player disconnected. The .eq('turn_number') guard means only
  // the first client's write lands; concurrent attempts match zero rows.
  async function passTurn(fromGs) {
    processingRef.current = true;
    const currentRoom = roomRef.current;
    if (!fromGs || !currentRoom) { processingRef.current = false; return; }
    const now = new Date();
    const expires = new Date(now.getTime() + 60000);
    const nextP = getNextPlayer(playersRef.current, fromGs.current_player_id);
    if (fromGs.current_player_id === myId) { flippedRef.current = []; setFlipped([]); }
    try {
      await getSB().from('game_state').update({
        turn_number: (fromGs.turn_number || 0) + 1,
        current_player_id: nextP.id,
        turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
      }).eq('room_id', currentRoom.id).eq('turn_number', fromGs.turn_number || 0);
      // Pull the result back immediately in case our realtime channel is down
      // (otherwise we'd wait on an event that never arrives).
      await refreshRoomState(currentRoom.id);
    } catch(e) { console.error('passTurn:', e); }
    processingRef.current = false;
  }

  // ─── Derived view state ───────────────────────────────────────────────────────
  const isMyTurn = gs?.current_player_id === myId;
  const isHost = room?.host_id === myId;
  const sortedPlayers = [...players].sort((a, b) => a.turn_order - b.turn_order);
  const foundWordsList = gs?.found_words || [];
  const words = room?.words || [];
  const currentPlayerObj = sortedPlayers.find(p => p.id === gs?.current_player_id);
  const timeDanger = timeLeft <= 10;

  // ─── JOIN ─────────────────────────────────────────────────────────────────────
  if (phase === 'join') return (
    <div style={{textAlign:'center', maxWidth:360, margin:'0 auto'}}>
      <button onClick={onBack} style={{...btnStyle('#1e3048','#7a9cc0'), marginBottom:20, fontSize:'0.8rem'}}>← Back</button>
      <div style={{fontSize:'2rem', marginBottom:8}}>🌐</div>
      <h2 style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', margin:'0 0 20px'}}>Online Play</h2>
      {fromInvite && codeInput && (
        <div style={{background:'#0e2a1a', border:'1.5px solid #00F5C4', borderRadius:10, padding:'10px 14px', marginBottom:16, fontFamily:"'JetBrains Mono',monospace", fontSize:'0.8rem', color:'#00F5C4'}}>
          {busy
            ? `🔄 Joining room ${codeInput}…`
            : <>🎮 Invited to room <strong style={{letterSpacing:'0.12em'}}>{codeInput}</strong> — enter your name and hit Join!</>
          }
        </div>
      )}
      {errMsg && <p style={{color:'#FF5E5B', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.8rem', marginBottom:12}}>{errMsg}</p>}
      <input value={playerName} onChange={e => setPlayerName(e.target.value.slice(0,12))} placeholder="Your name (max 12 chars)" maxLength={12}
        style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1.5px solid #2a4060', background:'#0a1520', color:'#F5EDD6', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.9rem', marginBottom:16, boxSizing:'border-box', outline:'none'}}
        onKeyDown={e => e.key==='Enter' && (fromInvite && codeInput ? joinRoom() : createRoom())} />
      {!fromInvite && (
        <button onClick={createRoom} disabled={busy}
          style={{...btnStyle('linear-gradient(90deg,#00c49f,#00F5C4)','#0a2e24'), width:'100%', padding:'13px', marginBottom:12, opacity:busy?0.6:1}}>
          {busy?'Creating...':'✦ Create Room'}
        </button>
      )}
      <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:12}}>
        <div style={{flex:1, height:1, background:'#1e3048'}} />
        <span style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.7rem'}}>{fromInvite ? 'join room' : 'or join existing'}</span>
        <div style={{flex:1, height:1, background:'#1e3048'}} />
      </div>
      <div style={{display:'flex', gap:8}}>
        <input value={codeInput} onChange={e => setCodeInput(e.target.value.toUpperCase().slice(0,6))} placeholder="ROOM CODE" maxLength={6}
          style={{flex:1, padding:'12px 14px', borderRadius:10, border:`1.5px solid ${fromInvite&&codeInput?'#00F5C4':'#2a4060'}`, background:'#0a1520', color:'#F5EDD6', fontFamily:"'JetBrains Mono',monospace", fontSize:'1rem', letterSpacing:'0.15em', outline:'none'}}
          onKeyDown={e => e.key==='Enter' && joinRoom()} />
        <button onClick={joinRoom} disabled={busy} style={{...btnStyle(fromInvite&&codeInput?'#00F5C4':'#1e3048', fromInvite&&codeInput?'#0a2e24':'#F5EDD6'), padding:'12px 18px', opacity:busy?0.6:1}}>Join →</button>
      </div>
      {fromInvite && (
        <button onClick={() => { setCodeInput(''); }} style={{...btnStyle('transparent','#3a5570'), marginTop:10, fontSize:'0.72rem', border:'none', textDecoration:'underline'}}>
          Create a new room instead
        </button>
      )}
    </div>
  );

  // ─── LOBBY ────────────────────────────────────────────────────────────────────
  if (phase === 'lobby') return (
    <div style={{textAlign:'center', maxWidth:360, margin:'0 auto'}}>
      <div style={{background:'#0a1520', border:'1.5px solid #1e3048', borderRadius:14, padding:'16px 20px', marginBottom:16}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.7rem', margin:'0 0 6px', letterSpacing:'0.08em'}}>ROOM CODE</p>
        <div style={{fontFamily:"'Fraunces',serif", color:'#00F5C4', fontSize:'2.4rem', fontWeight:900, letterSpacing:'0.22em'}}>{room?.code}</div>
        <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.7rem', margin:'6px 0 0'}}>Share with friends to join</p>
      </div>
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#7a9cc0', fontSize:'0.75rem', margin:'0 0 8px'}}>Players ({players.length}/4)</p>
      {sortedPlayers.map((p, i) => (
        <div key={p.id} style={{display:'flex', alignItems:'center', gap:10, background:'#0a1520', borderRadius:10, padding:'10px 14px', marginBottom:6, border:`1.5px solid ${p.id===myId?MP_COLORS[i]+'66':'#1e3048'}`}}>
          <div style={{width:8, height:8, borderRadius:'50%', background:MP_COLORS[i], flexShrink:0}} />
          <span style={{fontFamily:"'JetBrains Mono',monospace", color:p.id===myId?'#F5EDD6':'#7a9cc0', fontSize:'0.85rem', flex:1, textAlign:'left'}}>
            {p.name}{p.id===myId?' (you)':''}{p.turn_order===0?' 👑':''}
          </span>
        </div>
      ))}
      {/* Invite link */}
      <button onClick={() => {
        const link = `https://wordflipgame.netlify.app?room=${room?.code}`;
        navigator.clipboard.writeText(link).then(() => { setLinkCopied(true); setTimeout(() => setLinkCopied(false), 2500); }).catch(() => {});
      }} style={{...btnStyle(linkCopied?'#0e2a1a':'#0a1520', linkCopied?'#00F5C4':'#7a9cc0'), width:'100%', padding:'10px', marginTop:12, border:`1.5px solid ${linkCopied?'#00F5C4':'#1e3048'}`, borderRadius:10, fontSize:'0.82rem', transition:'all 0.2s'}}>
        {linkCopied ? '✓ Link copied!' : '🔗 Copy invite link'}
      </button>
      <div style={{marginTop:12}}>
        {isHost ? (
          <>
            <button onClick={startGame} disabled={players.length<2}
              style={{...btnStyle(players.length>=2?'linear-gradient(90deg,#00c49f,#00F5C4)':'#1e3048', players.length>=2?'#0a2e24':'#3a5570'), width:'100%', padding:'13px', opacity:players.length<2?0.5:1}}>
              {players.length<2?'Waiting for players…':'Start Game →'}
            </button>
            {players.length>=2&&players.length<4&&(
              <p style={{fontFamily:"'JetBrains Mono',monospace",color:'#3a5570',fontSize:'0.7rem',margin:'8px 0 0'}}>
                You can start now or wait for more (up to 4 players). Players can join mid-game too.
              </p>
            )}
          </>
        ) : (
          <div style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.8rem', padding:'12px', background:'#0a1520', borderRadius:10, border:'1.5px solid #1e3048'}}>
            ⏳ Waiting for host to start...
          </div>
        )}
      </div>
      <button onClick={resetRoomState}
        style={{...btnStyle('transparent','#3a5570'), marginTop:12, fontSize:'0.75rem', border:'none', textDecoration:'underline'}}>
        Leave room
      </button>
    </div>
  );

  // ─── DONE ─────────────────────────────────────────────────────────────────────
  if (phase === 'done') {
    const byScore = [...players].sort((a, b) => b.score - a.score);
    const maxScore = byScore[0]?.score || 0;
    return (
      <div style={{textAlign:'center', maxWidth:360, margin:'0 auto'}}>
        <div style={{fontSize:'3rem', marginBottom:8}}>🏆</div>
        <h2 style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', margin:'0 0 20px'}}>
          {byScore[0]?.id===myId ? 'You Win!' : `${byScore[0]?.name} Wins!`}
        </h2>
        <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:24}}>
          {byScore.map((p, i) => {
            const colorIdx = sortedPlayers.findIndex(x => x.id === p.id);
            return (
              <div key={p.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', background:'#0a1520', borderRadius:10, padding:'10px 16px', border:`1.5px solid ${p.score===maxScore?MP_COLORS[colorIdx>=0?colorIdx:0]:'#1e3048'}`}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', marginRight:8, fontSize:'0.8rem'}}>#{i+1}</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace", color:p.id===myId?'#F5EDD6':'#7a9cc0', flex:1, textAlign:'left'}}>{p.name}{p.id===myId?' (you)':''}</span>
                <span style={{fontFamily:"'Fraunces',serif", color:'#FFB703', fontWeight:700}}>{p.score.toLocaleString()} pts</span>
              </div>
            );
          })}
        </div>
        <div style={{display:'flex', gap:10, justifyContent:'center'}}>
          <button onClick={resetRoomState} style={btnStyle('#00F5C4','#0a2e24')}>New Game</button>
          <button onClick={onBack} style={btnStyle('#1e3048','#F5EDD6')}>Menu</button>
        </div>
      </div>
    );
  }

  // ─── GAME ─────────────────────────────────────────────────────────────────────
  return (
    <div style={{width:'100%', maxWidth:480, margin:'0 auto'}}>
      {/* Player score chips */}
      <div style={{display:'flex', gap:6, justifyContent:'center', marginBottom:10, flexWrap:'wrap'}}>
        {sortedPlayers.map((p, i) => (
          <div key={p.id} style={{padding:'4px 12px', borderRadius:20, background:p.id===gs?.current_player_id?MP_COLORS[i]+'22':'#0a1520', border:`1.5px solid ${p.id===gs?.current_player_id?MP_COLORS[i]:'#1e3048'}`, fontFamily:"'JetBrains Mono',monospace", fontSize:'0.75rem', color:p.id===gs?.current_player_id?MP_COLORS[i]:'#2a4060', fontWeight:p.id===gs?.current_player_id?700:400, transition:'all 0.2s'}}>
            {p.name}{p.id===myId?' ✦':''}: {p.score.toLocaleString()}
          </div>
        ))}
      </div>
      {/* Turn indicator + timer */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
        <span style={{fontFamily:"'JetBrains Mono',monospace", color:'#7a9cc0', fontSize:'0.78rem'}}>
          {isMyTurn ? '👉 Your turn' : `⏳ ${currentPlayerObj?.name || '?'}'s turn`}
        </span>
        <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.85rem', fontWeight:700, color:timeDanger?'#FF5E5B':'#7a9cc0', transition:'color 0.3s'}}>
          ⏱ {timeLeft}s
        </span>
      </div>
      {/* Word banners */}
      <div style={{display:'flex', gap:6, flexWrap:'wrap', justifyContent:'center', marginBottom:10}}>
        {words.map((word, i) => {
          const fw = foundWordsList.find(f => f.wordIndex === i);
          const pIdx = fw ? sortedPlayers.findIndex(p => p.id === fw.playerId) : -1;
          const col = pIdx >= 0 ? MP_COLORS[pIdx] : '#00F5C4';
          return (
            <div key={i} style={{padding:'3px 12px', borderRadius:20, background:fw?col+'22':'#0e1f30', border:`1.5px solid ${fw?col:'#1e3048'}`, fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:'0.82rem', color:fw?col:'#3a5570', letterSpacing:'0.15em', transition:'all 0.3s', boxShadow:fw?.inOrder?`0 0 10px ${col}55`:fw?`0 0 6px ${col}33`:'none'}}>
              {fw?.inOrder?'⭐ ':''}{word}
            </div>
          );
        })}
      </div>
      {/* Flash feedback */}
      <div style={{height:28, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:6}}>
        {flash && <span style={{fontFamily:"'Fraunces',serif", fontSize:'0.95rem', fontWeight:700, animation:'fadeInOut 0.5s ease', color:flash==='good'?'#00F5C4':flash==='goodYellow'?'#FFB703':'#FF5E5B'}}>
          {flash==='good'&&'🟩 Nice — bonus points!'}
          {flash==='goodYellow'&&'🟨 Found! Try in order for more pts'}
          {flash==='bad'&&"✗ Wrong — next player's turn"}
        </span>}
      </div>
      {/* Board — 6×6 grid; click-locked when not my turn but remote flips still visible */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:'clamp(3px,1.2vw,8px)', padding:'clamp(4px,2vw,12px)', background:'#0a1520', borderRadius:16, border:'1.5px solid #1e3048'}}>
        {(() => {
          const cpIdx = players.findIndex(p => p.id === gs?.current_player_id);
          const currentPlayerColor = cpIdx >= 0 ? MP_COLORS[cpIdx] : '#FFB703';
          return tiles.map(tile => {
            const isLocalFlipped = flipped.includes(tile.id);
            const isRemote = !isLocalFlipped && remoteFlips.has(tile.id);
            return (
              <Tile key={tile.id} tile={tile}
                isFlipped={isLocalFlipped || isRemote}
                isFound={foundTileIdsRef.current.has(tile.id)}
                foundInOrder={foundWordsList.find(fw => fw.tile_ids?.includes(tile.id))?.inOrder || false}
                isSelected={isLocalFlipped && !errTiles.includes(tile.id)}
                isError={errTiles.includes(tile.id)}
                remoteColor={isRemote ? currentPlayerColor : undefined}
                onClick={() => handleTileClick(tile)}
                orderNum={isLocalFlipped ? flipped.indexOf(tile.id) : undefined}
              />
            );
          });
        })()}
      </div>
      {!isMyTurn && <p style={{textAlign:'center', color:'#3a5570', fontSize:'0.72rem', marginTop:8, fontFamily:"'JetBrains Mono',monospace"}}>Watching {currentPlayerObj?.name || 'other player'} choose…</p>}
      {/* Footer: room code for rejoining + leave button */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8}}>
        <span
          onClick={() => { const link=`https://wordflipgame.netlify.app?room=${room?.code}`; navigator.clipboard.writeText(link).catch(()=>{}); }}
          title="Tap to copy invite link"
          style={{fontFamily:"'JetBrains Mono',monospace", color:'#2a4060', fontSize:'0.68rem', cursor:'pointer', userSelect:'none'}}
        >
          Room <strong style={{color:'#3a5570', letterSpacing:'0.1em'}}>{room?.code}</strong> 🔗
        </span>
        <button onClick={() => { if(window.confirm('Leave this game?')) { resetRoomState(); onBack(); }}}
          style={{...btnStyle('#1e3048','#3a5570'), padding:'4px 10px', fontSize:'0.7rem'}}>Leave</button>
      </div>
    </div>
  );
}

  return (
    <div style={{width:"100%",maxWidth:360,margin:"0 auto",animation:"menuIn 0.3s ease"}}>
      <button onClick={onBack} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),marginBottom:20,fontSize:"0.8rem"}}>← Back</button>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>

          <button key={opt.label} onClick={()=>setLarge(opt.val)} style={{background:large===opt.val?"#0e2a3a":"var(--wf-surface)",border:`2px solid ${large===opt.val?"var(--wf-accent)":"var(--wf-border)"}`,borderRadius:12,padding:"14px 12px",cursor:"pointer",textAlign:"left",transition:"all 0.15s",boxShadow:large===opt.val?"0 0 14px #00F5C422":"none"}}>
            <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,color:large===opt.val?"var(--wf-accent)":"#F5EDD6",fontSize:"1.05rem"}}>{opt.label}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.72rem",marginTop:3}}>{opt.sub}</div>
          </button>
        ))}
      </div>
      <div style={{background:"var(--wf-surface)",border:"1px solid var(--wf-border)",borderRadius:12,padding:"14px 16px",marginBottom:24}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.75rem",margin:"0 0 8px",fontWeight:700,letterSpacing:"0.08em"}}>SCORING</p>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.72rem",margin:0,lineHeight:1.9}}>
          🟩 Flip in order → <strong style={{color:"var(--wf-accent)"}}>+300 pts</strong><br/>
          🟨 Any order → <strong style={{color:"var(--wf-accent2)"}}>+100 pts</strong><br/>
          ⏱ Time bonus → <strong style={{color:"#9B5DE5"}}>600 pts</strong>, −1/sec<br/>
          🎯 Accuracy → <strong style={{color:"#00BBF9"}}>800 pts</strong>, −50/miss
        </p>
      </div>
      <button onClick={()=>onStart(large)} style={{...btnStyle("linear-gradient(90deg,#00c49f,#00F5C4)","#0a2e24"),width:"100%",padding:"14px",fontSize:"1rem",borderRadius:12,fontWeight:800}}>
        Play →
      </button>
    </div>

// ─── Streak Card ──────────────────────────────────────────────────────────────
// Big streak number + a 7-day strip that starts on the day the current
// milestone window began (start Thursday → Th F S S M T W). Streak days are
// consecutive by definition, so the first N cells burn and the rest are dots.
// The chip at the end shows the token bonus for completing this window.
function StreakCard({ animate, delay = 600 }) {
  const live = getLiveStreak();
  const count = live.count;
  // Anchor = the most recent streak day (today, or yesterday if not yet played)
  const anchor = new Date();
  if (!live.playedToday && count > 0) anchor.setDate(anchor.getDate() - 1);
  const daysIntoWindow = count > 0 ? ((count - 1) % 7) + 1 : 0;
  const windowStart = new Date(anchor);
  windowStart.setDate(anchor.getDate() - Math.max(0, daysIntoWindow - 1));
  const DAY_LETTERS = ["S","M","T","W","Th","F","S"];
  const frozenSet = new Set(live.frozen || []);
  const cells = Array.from({length:7}, (_, i) => {
    const d = new Date(windowStart);
    d.setDate(windowStart.getDate() + i);
    const key = `wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    return { label: DAY_LETTERS[d.getDay()], fired: i < daysIntoWindow, frozen: frozenSet.has(key) };
  });
  const hitMilestoneToday = live.playedToday && count > 0 && count % 7 === 0;
  const windowBonus = streakWeekBonus(count > 0 ? Math.ceil(count / 7) : 1);

  // Animated mode (results screen): the number shows yesterday's count, then
  // ticks up with a pop + firework; a milestone's bonus counts up after it.
  const [shownCount, setShownCount] = useState(animate && count > 0 ? count - 1 : count);
  const [pop, setPop] = useState(false);
  const [numFw, setNumFw] = useState(false);
  const [bonusReveal, setBonusReveal] = useState(!animate);
  const [bonusFw, setBonusFw] = useState(false);
  useEffect(() => {
    if (!animate) return;
    const timers = [];
    if (count > 0) {
      timers.push(setTimeout(() => {
        setShownCount(count); setPop(true); setNumFw(true);
        timers.push(setTimeout(() => setPop(false), 500));
      }, delay));
    }
    if (hitMilestoneToday) {
      timers.push(setTimeout(() => setBonusReveal(true), delay + 700));
      timers.push(setTimeout(() => setBonusFw(true), delay + 1600));
    }
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{textAlign:"center"}}>
      <div style={{position:"relative",display:"inline-block"}}>
        <Firework color="var(--wf-accent2)" trigger={numFw} large />
        <div style={{
          fontFamily:"'Fraunces',serif",fontWeight:900,fontSize:"clamp(3rem,12vw,4.2rem)",lineHeight:1,
          background:"linear-gradient(180deg,#ffcf40,#FFB703)",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
          transform: pop ? "scale(1.22)" : "scale(1)",
          transition:"transform 0.3s cubic-bezier(.4,2,.6,1)",
        }}>{shownCount}</div>
      </div>
      <div style={{fontFamily:"'Fraunces',serif",fontWeight:700,color:"var(--wf-accent2)",fontSize:"1.05rem",margin:"2px 0 12px"}}>
        day streak
      </div>
      <div style={{background:"var(--wf-surface)",border:"1.5px solid var(--wf-border)",borderRadius:14,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
          {cells.map((c, i) => (
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.62rem",fontWeight:700,color:c.frozen?"#4FC3F7":c.fired?"var(--wf-accent2)":"var(--wf-text-mute)"}}>{c.label}</span>
              <span style={{fontSize:"1.05rem",lineHeight:1,
                opacity:c.fired?1:0.3,
                // Frozen days: recolor the 🔥 to an icy blue via hue-rotate + a
                // cool cast, so a saved day reads as a blue flame, not orange.
                filter:c.frozen?"hue-rotate(180deg) saturate(1.5) brightness(1.05)":c.fired?"none":"grayscale(1)"}}>
                {c.fired ? "🔥" : "🔘"}
              </span>
            </div>
          ))}
          <span style={{
            fontFamily:"'JetBrains Mono',monospace",fontSize:"0.66rem",fontWeight:700,
            color: hitMilestoneToday ? "var(--wf-accent)" : "var(--wf-accent2)",
            background: hitMilestoneToday ? "#0a2e2455" : "#1a120055",
            border: `1px solid ${hitMilestoneToday ? "#00F5C455" : "#FFB70344"}`,
            borderRadius:8,padding:"3px 7px",marginLeft:4,whiteSpace:"nowrap",flexShrink:0,
          }}>
            {hitMilestoneToday ? "✓" : "×"}{windowBonus}🪙
          </span>
        </div>
        {hitMilestoneToday && (
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.72rem",margin:"10px 0 0",color:"var(--wf-accent)",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
            opacity: bonusReveal ? 1 : 0, transition:"opacity 0.35s ease"}}>
            <span>🎉 {count}-day streak bonus:</span>
            <span style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
              <Firework color="var(--wf-accent)" trigger={bonusFw} large />
              <CountUp to={streakWeekBonus(count/7)} active={bonusReveal} color="var(--wf-accent)" large unit="🪙" />
            </span>
          </div>
        )}
        {live.best > count && (
          <p style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.64rem",margin:"8px 0 0",color:"var(--wf-text-mute)"}}>
            Best: {live.best}🔥
          </p>
        )}
      </div>
    </div>
  );
}

// ─── Daily Nine — the mini-game itself ───────────────────────────────────────
function DailyNine({ onBack, onSolve, signedIn }) {
  const target = useMemo(()=>getDailyNine(), []);
  const already = getNineDone();
  const [solved, setSolved] = useState(!!(already && already.solved));
  // 9 tiles built from the target's letters, scrambled (never already in order).
  const [tiles] = useState(()=>{
    let arr;
    do { arr = shuffle(target.split("").map((letter,i)=>({ id:i, letter }))); }
    while (arr.map(t=>t.letter).join("") === target);
    return arr;
  });
  const [slots, setSlots] = useState(()=> solved ? target.split("").map((_,i)=>i) : Array(9).fill(null));
  const [hints, setHints] = useState(0);
  const [wrong, setWrong] = useState(false);
  const placed = new Set(slots.filter(x=>x!=null));
  const letterOf = (id)=> tiles.find(t=>t.id===id)?.letter || "";

  // Glide animation: a floating clone that flies from the tapped grid tile to
  // its answer slot. `arriving` hides the destination letter mid-flight so you
  // don't see it twice.
  const slotRefs = useRef([]);
  const [fly, setFly] = useState(null);
  const [flyGo, setFlyGo] = useState(false);
  const [arriving, setArriving] = useState(-1);

  function placeTile(id, e) {
    if (solved || placed.has(id) || fly) return;
    const i = slots.indexOf(null);
    if (i === -1) return;
    const next = slots.slice(); next[i] = id; setSlots(next); setWrong(false);
    // Measure start (tapped tile) and end (destination slot) for the glide.
    const fromR = e && e.currentTarget && e.currentTarget.getBoundingClientRect();
    const toEl = slotRefs.current[i];
    const toR = toEl && toEl.getBoundingClientRect();
    if (fromR && toR) {
      setArriving(i);
      setFly({ letter: letterOf(id), x0:fromR.left, y0:fromR.top, x1:toR.left, y1:toR.top, w1:toR.width, h1:toR.height });
    }
  }
  function removeSlot(i) {
    if (solved || slots[i]==null) return;
    const next = slots.slice(); next[i] = null; setSlots(next); setWrong(false);
  }
  function clearAll() { if (!solved) { setSlots(Array(9).fill(null)); setWrong(false); } }
  function useNineHint() {
    if (solved || hints>=3) return;
    const i = slots.indexOf(null);
    if (i === -1) return;
    const want = target[i];
    const t = tiles.find(t=> t.letter===want && !placed.has(t.id));
    if (!t) return;
    const next = slots.slice(); next[i] = t.id; setSlots(next);
    setHints(hints+1); setWrong(false);
  }

  // Auto-check once every slot is filled.
  useEffect(()=>{
    if (solved || slots.some(x=>x==null)) return;
    const word = slots.map(id=>letterOf(id)).join("");
    if (word === target) {
      setSolved(true);
      setNineDoneLS({ solved:true, hints });
      onSolve && onSolve();
    } else {
      setWrong(true);
    }
  }, [slots]); // eslint-disable-line

  // Kick off the glide on the next frame (from start pos → slot pos), then clear.
  useEffect(()=>{
    if (!fly) return;
    setFlyGo(false);
    const raf = requestAnimationFrame(()=> requestAnimationFrame(()=> setFlyGo(true)));
    const done = setTimeout(()=>{ setFly(null); setFlyGo(false); setArriving(-1); }, 300);
    return ()=>{ cancelAnimationFrame(raf); clearTimeout(done); };
  }, [fly]);

  return (
    <div style={{width:"100%",maxWidth:400,margin:"0 auto",animation:"menuIn 0.3s ease"}}>
      <button onClick={onBack} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),marginBottom:14,fontSize:"0.8rem"}}>← Back</button>
      <div style={{textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:"2.2rem"}}>🎲</div>
        <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"1.5rem",margin:"4px 0 4px"}}>Daily Nine</h2>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.72rem",margin:0}}>
          Tap the letters to spell the hidden 9-letter word · <strong style={{color:"var(--wf-accent)"}}>+{NINE_REWARD} coins</strong>
        </p>
      </div>

      {/* Answer row */}
      <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:22,flexWrap:"nowrap",
        animation: wrong ? "nineShake 0.5s ease" : "none"}}>
        {slots.map((id,i)=>{
          const hidden = arriving===i; // letter is mid-flight; keep the slot empty-looking
          return (
            <div key={i} ref={el=>slotRefs.current[i]=el} onClick={()=>removeSlot(i)} style={{
              width:34,height:44,borderRadius:7,cursor:id!=null&&!solved?"pointer":"default",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:"1.05rem",
              background: solved ? "linear-gradient(135deg,#00c49f,#00F5C4)" : (id!=null&&!hidden) ? "linear-gradient(135deg,#FFB703,#ffcf40)" : "transparent",
              color: solved ? "#0a2e24" : "#3d2800",
              border: solved ? "2px solid #00F5C4" : wrong ? "2px solid #ff5a5a" : (id!=null&&!hidden) ? "2px solid #ffcf40" : "2px dashed var(--wf-border)",
              transition:"border-color 0.15s, background 0.2s",
              // Stadium wave: each solved letter hops in sequence, left → right.
              animation: solved ? "nineWave 0.9s ease" : "none",
              animationDelay: solved ? `${i*0.07}s` : "0s",
            }}>{(id!=null&&!hidden)?letterOf(id):""}</div>
          );
        })}
      </div>

      {/* Letter grid (3×3) */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,60px)",gap:8,justifyContent:"center",marginBottom:18}}>
        {tiles.map(t=>{
          const used = placed.has(t.id);
          return (
            <div key={t.id} onClick={(e)=>placeTile(t.id, e)} style={{
              width:60,height:60,borderRadius:10,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:"1.5rem",
              cursor: used||solved ? "default":"pointer",
              background: used ? "transparent" : "linear-gradient(135deg,#FFB703,#ffcf40)",
              border: used ? "2px dashed var(--wf-border)" : "2px solid #ffcf40",
              color: used ? "transparent" : "#3d2800",
              opacity: used ? 0.5 : 1,
              transition:"opacity 0.15s, background 0.2s",
              userSelect:"none",
            }}>{used ? "" : t.letter}</div>
          );
        })}
      </div>

      {solved ? (
        <div style={{textAlign:"center",marginTop:10}}>
          <p style={{fontFamily:"'Fraunces',serif",color:"var(--wf-accent2)",fontSize:"1.15rem",fontWeight:700,margin:"0 0 4px"}}>🎉 You got it!</p>
          <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.75rem",margin:"0 0 14px"}}>
            {signedIn ? `+${NINE_REWARD} coins added to your wallet.` : `Sign in to claim your +${NINE_REWARD} coins.`}
          </p>
          <button onClick={onBack} style={{...btnStyle("linear-gradient(90deg,#FFB703,#ff9f1c)","#0D1B2A"),padding:"10px 24px"}}>Done</button>
        </div>
      ) : (
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={useNineHint} disabled={hints>=3} style={{...btnStyle("var(--wf-border)",hints>=3?"var(--wf-text-mute)":"#F5EDD6"),padding:"9px 14px",fontSize:"0.78rem",opacity:hints>=3?0.5:1}}>
            💡 Hint ({3-hints})
          </button>
          <button onClick={clearAll} style={{...btnStyle("var(--wf-border)","#F5EDD6"),padding:"9px 14px",fontSize:"0.78rem"}}>Clear</button>
        </div>
      )}

      {/* Flying letter clone: glides from the tapped grid tile into its slot. */}
      {fly && (
        <div style={{
          position:"fixed",left:0,top:0,zIndex:60,pointerEvents:"none",
          width:fly.w1,height:fly.h1,borderRadius:7,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontFamily:"'JetBrains Mono',monospace",fontWeight:800,fontSize:"1.05rem",
          background:"linear-gradient(135deg,#FFB703,#ffcf40)",color:"#3d2800",
          border:"2px solid #ffcf40",
          transform:`translate(${flyGo?fly.x1:fly.x0}px, ${flyGo?fly.y1:fly.y0}px)`,
          transition:"transform 0.26s cubic-bezier(.2,.75,.3,1)",
        }}>{fly.letter}</div>
      )}
    </div>
  );
}

// ─── Auth Screens ─────────────────────────────────────────────────────────────
function AuthScreen({ onBack, onAuth, recoveryMode, onResetDone, initialMode }) {
  const [mode, setMode] = useState(initialMode === "signup" ? "signup" : "signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [username, setUsername] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [usernameOk, setUsernameOk] = useState(null);
  const [showPassword, setShowPassword] = useState(false);
  const [resetSent, setResetSent] = useState(false);
  const [info, setInfo] = useState("");
  const checkTimer = useRef(null);

  async function handleSetNewPassword(e) {
    e.preventDefault();
    setError(""); setInfo("");
    if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
    setLoading(true);
    try {
      await authUpdatePassword(password);
      onResetDone && onResetDone();
    } catch (err) {
      console.error("Update password error:", err);
      setError(err?.message || "Could not update password");
    }
    setLoading(false);
  }

  async function handleForgotPassword() {
    setError(""); setInfo("");
    if (!email) { setError("Enter your email above first, then tap Forgot password"); return; }
    setLoading(true);
    try {
      await authResetPassword(email);
      setResetSent(true);
      setInfo("Check your email for a password reset link.");
    } catch (err) {
      console.error("Reset error:", err);
      setError(err?.message || "Could not send reset email");
    }
    setLoading(false);
  }

  function onUsernameChange(val) {
    const clean = val.replace(/[^a-zA-Z0-9_]/g, "").slice(0, 20);
    setUsername(clean);
    setUsernameOk(null);
    if (checkTimer.current) clearTimeout(checkTimer.current);
    if (clean.length >= 3) {
      checkTimer.current = setTimeout(async () => {
        const avail = await authCheckUsername(clean);
        setUsernameOk(avail);
      }, 400);
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      if (mode === "signup") {
        if (username.length < 3) { setError("Username must be at least 3 characters"); setLoading(false); return; }
        if (password.length < 6) { setError("Password must be at least 6 characters"); setLoading(false); return; }
        if (usernameOk === false) { setError("Username is already taken"); setLoading(false); return; }
        const signUpData = await authSignUp(email, password, username);
        if (!signUpData.session) {
          await authSignIn(email, password);
        }
      } else {
        await authSignIn(email, password);
      }
      onAuth();
    } catch (err) {
      console.error("Auth error:", err);
      const msg = err?.message || err?.error_description || (typeof err === "string" ? err : JSON.stringify(err));
      setError(msg || "Something went wrong");
    }
    setLoading(false);
  }

  const inputStyle = {
    width:"100%", padding:"12px 14px", borderRadius:10, border:"1.5px solid var(--wf-border)",
    background:"var(--wf-surface)", color:"#F5EDD6", fontFamily:"'JetBrains Mono',monospace",
    fontSize:"0.9rem", outline:"none", boxSizing:"border-box",
  };

  if (recoveryMode) {
    return (
      <div style={{width:"100%",maxWidth:380,animation:"menuIn 0.3s ease"}}>
        <div style={{background:"#0e1a2a",borderRadius:16,border:"1.5px solid var(--wf-border)",padding:"24px 20px"}}>
          <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 6px",fontSize:"1.3rem"}}>Set a new password</h2>
          <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.72rem",margin:"0 0 16px"}}>Enter a new password for your account.</p>
          <form onSubmit={handleSetNewPassword} style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{position:"relative"}}>
              <input type={showPassword?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} placeholder="New password (6+ characters)" required minLength={6} style={{...inputStyle,paddingRight:44}} autoComplete="new-password" />
              <button type="button" onClick={()=>setShowPassword(s=>!s)} aria-label={showPassword?"Hide password":"Show password"} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"1rem",padding:"4px 6px",lineHeight:1}}>
                {showPassword?"🙈":"👁️"}
              </button>
            </div>
            {error && (
              <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#FF5E5B",fontSize:"0.75rem",margin:0,padding:"8px 12px",background:"#FF5E5B15",borderRadius:8}}>{error}</p>
            )}
            <button type="submit" disabled={loading} style={{
              ...btnStyle("linear-gradient(90deg,#00F5C4,#00c49f)","#0a2e24"),
              padding:"13px", borderRadius:12, fontSize:"0.95rem", fontWeight:700,
              opacity: loading ? 0.6 : 1,
            }}>
              {loading ? "..." : "Update Password"}
            </button>
          </form>
        </div>
      </div>
    );
  }

  return (
    <div style={{width:"100%",maxWidth:380,animation:"menuIn 0.3s ease"}}>
      <button onClick={onBack} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),marginBottom:16,fontSize:"0.8rem"}}>← Back</button>

      <div style={{background:"#0e1a2a",borderRadius:16,border:"1.5px solid var(--wf-border)",padding:"24px 20px"}}>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <button onClick={()=>{setMode("signin");setError("");}} style={{
            flex:1, padding:"8px 0", borderRadius:10, border:"none", cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:"0.8rem",
            background: mode==="signin" ? "var(--wf-accent)" : "var(--wf-surface)",
            color: mode==="signin" ? "#0a2e24" : "var(--wf-text-mute)",
          }}>Sign In</button>
          <button onClick={()=>{setMode("signup");setError("");}} style={{
            flex:1, padding:"8px 0", borderRadius:10, border:"none", cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:"0.8rem",
            background: mode==="signup" ? "var(--wf-accent2)" : "var(--wf-surface)",
            color: mode==="signup" ? "#0D1B2A" : "var(--wf-text-mute)",
          }}>Create Account</button>
        </div>

        <form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:12}}>
          {mode==="signup" && (
            <div>
              <label style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.7rem",marginBottom:4,display:"block",letterSpacing:"0.08em"}}>USERNAME</label>
              <div style={{position:"relative"}}>
                <input value={username} onChange={e=>onUsernameChange(e.target.value)} placeholder="cool_player_42" maxLength={20} style={inputStyle} autoComplete="username" />
                {username.length >= 3 && usernameOk !== null && (
                  <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:"0.9rem"}}>
                    {usernameOk ? "✓" : "✗"}
                  </span>
                )}
              </div>
              {username.length > 0 && username.length < 3 && (
                <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#FF5E5B",fontSize:"0.65rem",margin:"4px 0 0"}}>At least 3 characters</p>
              )}
            </div>
          )}
          <div>
            <label style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.7rem",marginBottom:4,display:"block",letterSpacing:"0.08em"}}>EMAIL</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required style={inputStyle} autoComplete="email" />
          </div>
          <div>
            <label style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.7rem",marginBottom:4,display:"block",letterSpacing:"0.08em"}}>PASSWORD</label>
            <div style={{position:"relative"}}>
              <input type={showPassword?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} placeholder={mode==="signup"?"6+ characters":"••••••••"} required minLength={6} style={{...inputStyle,paddingRight:44}} autoComplete={mode==="signup"?"new-password":"current-password"} />
              <button type="button" onClick={()=>setShowPassword(s=>!s)} aria-label={showPassword?"Hide password":"Show password"} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"1rem",padding:"4px 6px",lineHeight:1}}>
                {showPassword?"🙈":"👁️"}
              </button>
            </div>
            {mode==="signin" && (
              <button type="button" onClick={handleForgotPassword} style={{background:"none",border:"none",cursor:"pointer",color:"#9B5DE5",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.68rem",padding:"6px 0 0",textAlign:"left"}}>
                Forgot password?
              </button>
            )}
          </div>

          {error && (
            <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#FF5E5B",fontSize:"0.75rem",margin:0,padding:"8px 12px",background:"#FF5E5B15",borderRadius:8}}>{error}</p>
          )}
          {info && (
            <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-accent)",fontSize:"0.75rem",margin:0,padding:"8px 12px",background:"#00F5C415",borderRadius:8}}>{info}</p>
          )}

          <button type="submit" disabled={loading} style={{
            ...btnStyle(mode==="signup"?"linear-gradient(90deg,#FFB703,#ff9f1c)":"linear-gradient(90deg,#00F5C4,#00c49f)", mode==="signup"?"#0D1B2A":"#0a2e24"),
            padding:"13px", borderRadius:12, fontSize:"0.95rem", fontWeight:700, marginTop:4,
            opacity: loading ? 0.6 : 1,
          }}>
            {loading ? "..." : mode==="signup" ? "Create Account" : "Sign In"}
          </button>
        </form>
      </div>
    </div>
  );
}

// A small preview of a reward cosmetic — a theme swatch or a tile-back mini.
function RewardPreview({ entry, size = 44 }) {
  if (entry.type === 'theme') {
    const t = themeById(entry.key);
    return (
      <div style={{width:size, height:size, borderRadius:10, flexShrink:0, background:t.bg, border:'1.5px solid #2a4060', position:'relative', overflow:'hidden'}}>
        <div style={{position:'absolute', bottom:5, left:5, display:'flex', gap:3}}>
          <span style={{width:9, height:9, borderRadius:'50%', background:t.swatch[1]}} />
          <span style={{width:9, height:9, borderRadius:'50%', background:t.swatch[2]}} />
        </div>
      </div>
    );
  }
  const b = tileBackById(entry.key);
  const prev = b.themed ? activeTileBack() : { bg:b.bg, dot:b.dot, symbol:b.symbol, symbolColor:b.symbolColor };
  return (
    <div style={{width:size, height:size, borderRadius:9, flexShrink:0, border:'1.5px solid #2a4060',
      display:'flex', alignItems:'center', justifyContent:'center',
      backgroundImage:`radial-gradient(circle at 30% 30%, ${prev.dot} 1px, transparent 1px),radial-gradient(circle at 70% 70%, ${prev.dot} 1px, transparent 1px),${prev.bg}`,
      backgroundSize:'10px 10px, 10px 10px, 100% 100%'}}>
      <span style={{color:prev.symbolColor, fontSize:'1.2rem', fontWeight:900}}>{prev.symbol}</span>
    </div>
  );
}
