let _sbClient = null;
// Route REST/Auth fetches through a same-origin Netlify proxy so Edge/Safari
// tracking prevention doesn't treat them as third-party. Realtime uses a
// WebSocket (not fetch), so it stays on the direct SUPABASE_URL and is untouched.
function sbProxyFetch(input, init) {
  let url = typeof input === 'string' ? input : (input && input.url);
  if (url && url.startsWith(SUPABASE_URL)) {
    const proxied = '/sb-proxy' + url.slice(SUPABASE_URL.length);
    input = typeof input === 'string' ? proxied : new Request(proxied, input);
  }
  return fetch(input, init);
}
function getSB() {
  if (typeof supabase === 'undefined') throw new Error('Supabase SDK not loaded');
  if (!_sbClient) _sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { fetch: sbProxyFetch },
  });
  return _sbClient;
}

// ─── Auth helpers ─────────────────────────────────────────────────────────────
async function authSignUp(email, password, username) {
  const res = await getSB().auth.signUp({
    email,
    password,
    options: { data: { username, display_name: username } }
  });
  if (res.error) throw res.error;
  if (res.data?.user?.identities?.length === 0) {
    throw new Error("An account with this email already exists");
  }
  // If the user is immediately active (email confirmation disabled in Supabase),
  // create the profile row now. Otherwise the DB trigger handles it on confirm.
  if (res.data?.session && res.data?.user) {
    const { error: pe } = await getSB().from('profiles').upsert(
      { id: res.data.user.id, username, display_name: username },
      { onConflict: 'id' }
    );
    if (pe) console.warn("Profile create on signup (may be handled by trigger):", pe.message);
  }
  return res.data;
}

async function authSignIn(email, password) {
  const { data, error } = await getSB().auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function authResetPassword(email) {
  const { error } = await getSB().auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin,
  });
  if (error) throw error;
}

async function authUpdatePassword(newPassword) {
  const { error } = await getSB().auth.updateUser({ password: newPassword });
  if (error) throw error;
}

async function authSignOut() {
  // scope:'local' clears the session from localStorage without a network call.
  // This avoids Safari stalling on the server-side invalidation request.
  const { error } = await getSB().auth.signOut({ scope: 'local' });
  if (error) throw error;
}

async function authGetSession() {
  const { data: { session } } = await getSB().auth.getSession();
  return session;
}

async function authGetProfile(userId) {
  // maybeSingle (not single) so a transient 0-row response doesn't throw; retry once
  let { data, error } = await getSB().from('profiles').select('*').eq('id', userId).maybeSingle();
  if (error) throw error;
  if (!data) {
    await new Promise(r => setTimeout(r, 600));
    ({ data, error } = await getSB().from('profiles').select('*').eq('id', userId).maybeSingle());
    if (error) throw error;
  }
  return data;
}

async function authCheckUsername(username) {
  const { data } = await getSB().from('profiles').select('id').eq('username', username).maybeSingle();
  return !data;
}

// ─── Leaderboard helpers ──────────────────────────────────────────────────────
async function submitDailyScore(userId, score, dayKey, turns, elapsed, wrongGuesses, blocks) {
  const { error } = await getSB().from('daily_scores').upsert({
    user_id: userId, score, day_key: dayKey, turns, elapsed, wrong_guesses: wrongGuesses, blocks,
  }, { onConflict: 'user_id,day_key' });
  if (error) console.error("Score submit error:", error);
}

async function fetchLeaderboard(mode, dayKey) {
  let query = getSB()
    .from('daily_scores')
    .select('score, day_key, turns, elapsed, wrong_guesses, blocks, created_at, profiles(username)')
    .order('score', { ascending: false })
    .limit(50);
  if (mode === 'daily') {
    query = query.eq('day_key', dayKey);
  }
  const { data, error } = await query;
  if (error) { console.error("Leaderboard fetch error:", error); return []; }
  return data;
}

async function fetchMyScores(userId) {
  const { data, error } = await getSB()
    .from('daily_scores')
    .select('score, day_key, turns, elapsed, wrong_guesses, blocks, created_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });
  if (error) { console.error("My scores fetch error:", error); return []; }
  return data;
}

// Convert a stored day_key ("2026-6-17") into display date strings
function dayKeyToDates(dayKey) {
  const [y, m, d] = String(dayKey || "").split('-').map(Number);
  const dt = (y && m && d) ? new Date(y, m - 1, d) : new Date();
  return {
    date: dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }),
    shortDate: dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
  };
}

async function retroSubmitTodayScore(userId) {
  const done = getDailyDone();
  if (!done || !done.score) return;
  const dk = dateKey().replace('wf_', '');
  const wordResultsArr = getDailyWords().map((_,i) => done?.wordResults?.[i] || (done?.outOfTurns ? "missed" : "yellow"));
  const blocks = getDailyWords().map((_,i) => {
    const r = done?.wordResults?.[i];
    return r==="green" ? "🟩" : r==="yellow" ? "🟨" : "🟥";
  }).join("");
  await submitDailyScore(userId, done.score, dk, done.turns, done.elapsed, done.wrongGuesses||0, blocks);
}

// Earning amounts (tweak freely — placeholders until the shop is priced)
const TOKENS = { SIGNUP: 100, SOLO: 50, MP_WIN: 50, MP_LOSS: 25 };
// Daily challenge pays out 10% of the score earned
const dailyTokens = (score) => Math.max(0, Math.round((score || 0) * 0.1));

async function fetchWallet(userId) {
  const { data, error } = await getSB().from('wallets').select('balance').eq('user_id', userId).maybeSingle();
  if (error) { console.error("Wallet fetch error:", error); return 0; }
  return data?.balance || 0;
}

// Idempotent grant via the secure RPC. Returns the new balance (or null on failure).
async function grantTokens(amount, reason) {
  const { data, error } = await getSB().rpc('add_tokens', { p_amount: amount, p_reason: reason });
  if (error) { console.error("Grant tokens error:", error); return null; }
  return data;
}

// Grant all tokens the signed-in user has earned but not yet received.
// Safe to call repeatedly — each reason is idempotent server-side.
async function grantEarnedTokens(userId) {
  await grantTokens(TOKENS.SIGNUP, 'signup-bonus');
  const done = getDailyDone();
  if (done && done.score) {
    await grantTokens(dailyTokens(done.score), 'daily-' + dateKey().replace('wf_', ''));
  }
}

function useAuth() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [recovery, setRecovery] = useState(false);
  const [balance, setBalance] = useState(0);
  const sessionRef = useRef(null);

  async function loadProfile(userId, mounted) {
    try {
      let p = await authGetProfile(userId);
      // If no profile row found (trigger didn't run or signup path skipped it),
      // create it now from the user's own auth metadata while they're signed in.
      if (!p) {
        const { data: { user } } = await getSB().auth.getUser();
        const meta = user?.user_metadata || {};
        const uname = meta.username
          || (user?.email || '').split('@')[0].replace(/[^a-zA-Z0-9_]/g, '').slice(0, 20)
          || 'player';
        const { data: created, error: ce } = await getSB()
          .from('profiles')
          .upsert({ id: userId, username: uname, display_name: uname }, { onConflict: 'id' })
          .select('*')
          .maybeSingle();
        if (ce) console.error("Profile auto-create failed:", ce.message);
        else p = created;
      }
      if (!mounted || (mounted.current === false)) return;
      setProfile(p);
    } catch (err) {
      console.error("Profile load failed:", err);
    }
    try {
      const b = await fetchWallet(userId);
      if (mounted && mounted.current !== false) setBalance(b);
    } catch {}
  }

  useEffect(() => {
    const m = { current: true };
    authGetSession().then(async (s) => {
      if (!m.current) return;
      sessionRef.current = s;
      setSession(s);
      if (s?.user) await loadProfile(s.user.id, m);
      if (m.current) setLoading(false);
    }).catch((err) => { console.error("Session load failed:", err); if (m.current) setLoading(false); });

    const { data: { subscription } } = getSB().auth.onAuthStateChange(async (event, s) => {
      if (!m.current) return;
      if (event === "PASSWORD_RECOVERY") setRecovery(true);
      sessionRef.current = s;
      setSession(s);
      if (s?.user) {
        await loadProfile(s.user.id, m);
      } else {
        setProfile(null);
      }
    });

    return () => { m.current = false; subscription.unsubscribe(); };
  }, []);

  const refreshProfile = useCallback(async () => {
    const s = sessionRef.current || await authGetSession();
    if (s?.user) {
      try {
        const p = await authGetProfile(s.user.id);
        setProfile(p);
      } catch (err) { console.error("refreshProfile failed:", err); }
    }
  }, [session]);

  const refreshWallet = useCallback(async () => {
    const s = sessionRef.current || await authGetSession();
    if (s?.user) {
      try { setBalance(await fetchWallet(s.user.id)); } catch {}
    }
  }, [session]);

  function signOut() {
    // Clear Supabase's session from localStorage (no network call needed).
    // Then do a full page reload — the cleanest possible sign-out on Safari PWA.
    // On reload, Supabase finds no token in storage and starts unauthenticated.
    try { getSB().auth.signOut({ scope: 'local' }); } catch {}
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-'))
        .forEach(k => localStorage.removeItem(k));
    } catch {}
    window.location.reload();
  }

  return { session, profile, loading, refreshProfile, recovery, clearRecovery: () => setRecovery(false), balance, refreshWallet, signOut };
}

// Seeded PRNG — gives every client the same tile layout for a given room
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function buildTilesSeeded(words, seed) {
  const tiles = [];
  words.forEach((word, wi) => word.split('').forEach((letter, li) => {
    tiles.push({ id: `${wi}-${li}`, letter });
  }));
  const rng = mulberry32(seed);
  const a = [...tiles];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function getMyPlayerId() {
  let id = localStorage.getItem('wf_player_id');
  if (!id) {
    // crypto.randomUUID() requires iOS 15.4+ — fallback for older devices
    id = (typeof crypto.randomUUID === 'function')
      ? crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    localStorage.setItem('wf_player_id', id);
  }
  return id;
}

// Daily words: deterministic by date from the 4-word bank
function getDailyWords() {
  const d = new Date();
  const idx = (d.getFullYear() * 500 + (d.getMonth()+1) * 31 + d.getDate()) % ALL_WORDS_4.length;
  return ALL_WORDS_4[idx];
}

function dateKey() {
  const d = new Date();
  return `wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickRandom(pool) {
  return pool[Math.floor(Math.random()*pool.length)];
}

function buildTiles(words) {
  const tiles = [];
  words.forEach((word,wi) => word.split("").forEach((letter,li) => {
    tiles.push({ id:`${wi}-${li}`, letter });
  }));
  return shuffle(tiles);
}

function formatTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,"0")}`;
}

function scoreCalc(ms, wordResults, wrongGuesses, bonusPts = 0) {
  const greenPts = wordResults.filter(r=>r==="green").length * 300;
  const yellowPts = wordResults.filter(r=>r==="yellow").length * 100;
  // "missed" words score 0 — no bonus for unfound words
  const timeBonus = Math.max(0, 600 - Math.floor(ms/1000)); // 600 pts, -1/sec over 6 min
  const guessBonus = Math.max(0, 800 - (wrongGuesses||0) * 50); // 800 pts, -50 per wrong guess
  return greenPts + yellowPts + timeBonus + guessBonus + bonusPts;
}

// ─── localStorage helpers ─────────────────────────────────────────────────────
// ─── Personal history (sorted by date, newest first) ─────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem("wf_history")||"[]"); } catch { return []; }
}
function saveToHistory(entry) {
  const history = getHistory();
  // One entry per day — replace if already played today
  const filtered = history.filter(e => e.dayKey !== entry.dayKey);
  filtered.unshift(entry); // newest first
  localStorage.setItem("wf_history", JSON.stringify(filtered.slice(0, 365)));
}
function getPersonalBest() {
  const h = getHistory();
  return h.length ? Math.max(...h.map(e => e.score)) : 0;
}
function getDailyBest() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_best")||"null"); } catch { return null; }
}
function saveDailyBest(score) {
  const best = getDailyBest();
  if (!best || score > best) localStorage.setItem(dateKey()+"_best", JSON.stringify(score));
}
// Keep old leaderboard getter for any legacy data migration
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem("wf_leaderboard")||"[]"); } catch { return []; }
}
function getDailyDone() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_done")||"null"); } catch { return null; }
}
function setDailyDone(result) {
  localStorage.setItem(dateKey()+"_done", JSON.stringify(result));
}

// ─── Streak helpers (no login needed — stored per device) ─────────────────────
function getStreak() {
  try { return JSON.parse(localStorage.getItem("wf_streak")||'{"count":0,"lastDate":""}'); }
  catch { return { count:0, lastDate:"" }; }
}
function updateStreak() {
  const today = dateKey();
  const s = getStreak();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate()-1);
    return `wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  })();
  if (s.lastDate === today) return s; // already counted today
  const newCount = s.lastDate === yesterday ? s.count + 1 : 1;
  const updated = { count: newCount, lastDate: today };
  localStorage.setItem("wf_streak", JSON.stringify(updated));
  return updated;
}

// ─── Share helper ─────────────────────────────────────────────────────────────
function buildShareText(turns, ms, score, wordResults, totalWords) {
  const d = new Date();
  const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  // wordResults array may be shorter than totalWords if player ran out of turns
  const blocks = Array.from({length: totalWords || wordResults.length}, (_,i) => {
    const r = wordResults[i];
    if (r === "green") return "\u{1F7E9}";
    if (r === "yellow") return "\u{1F7E8}";
    return "\u{1F7E5}"; // 🟥 not found
  }).join("");
  return "WordFlip Daily \u00B7 " + date + "\n"
    + blocks + "\n"
    + turns + " guess" + (turns !== 1 ? "es" : "") + " \u00B7 " + formatTime(ms) + " \u00B7 " + score.toLocaleString() + " pts\n"
    + "https://wordflipgame.netlify.app";
}

// ─── Fireworks ────────────────────────────────────────────────────────────────
function Fireworks({ active }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particles = useRef([]);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const colors = ["#00F5C4","#FFB703","#FF5E5B","#9B5DE5","#F5EDD6","#00BBF9"];
    particles.current = [];
    for (let b=0; b<8; b++) {
      const x=Math.random()*canvas.width, y=Math.random()*canvas.height*0.6+50;
      const color=colors[Math.floor(Math.random()*colors.length)];
      for (let p=0; p<40; p++) {
        const angle=(Math.PI*2*p)/40+Math.random()*0.3, speed=Math.random()*6+2;
        particles.current.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,alpha:1,color,r:Math.random()*3+1});
      }
    }
    function frame() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.current = particles.current.filter(p=>p.alpha>0.02);
      particles.current.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.alpha*=0.96;
        ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (particles.current.length>0) animRef.current=requestAnimationFrame(frame);
    }
    animRef.current=requestAnimationFrame(frame);
    return ()=>cancelAnimationFrame(animRef.current);
  },[active]);
  if (!active) return null;
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999}} />;
}

// ─── Sound Manager ────────────────────────────────────────────────────────────
const soundManager = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, dur, type="sine", vol=0.25, delay=0) {
    try {
      const c = ac(), osc = c.createOscillator(), g = c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      g.gain.setValueAtTime(0, c.currentTime + delay);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }
  // Haptic feedback via Web Vibration API (Android/Chrome; silent fallback on iOS)
  function vibe(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
  }
  return {
    flip()       { tone(520,0.05,"triangle",0.12); tone(280,0.08,"triangle",0.07,0.03); vibe(8); },
    select()     { tone(880,0.04,"sine",0.1); vibe(5); },
    wordGreen()  { [523,659,784,1047].forEach((f,i)=>tone(f,0.22,"sine",0.22,i*0.08)); vibe([30,15,60]); },
    wordYellow() { [523,659,784].forEach((f,i)=>tone(f,0.18,"sine",0.14,i*0.09)); vibe([20,10,30]); },
    wrong()      { tone(180,0.12,"sawtooth",0.18); tone(140,0.18,"triangle",0.1,0.06); vibe([15,20,15]); },
    complete()   { [523,659,784,1047,1319,784,1047].forEach((f,i)=>tone(f,0.28,"sine",0.2,i*0.07)); vibe([40,20,40,20,80]); },
    bonus()      { [659,784,1047].forEach((f,i)=>tone(f,0.18,"sine",0.18,i*0.07)); vibe([10,10,40]); },
  };
})();

        width:"100%",aspectRatio:"1",perspective:"600px",
        cursor:isFound?"default":"pointer",
        background:"none",border:"none",padding:0,
        borderRadius:10,
        outline:"none",
        transition:"box-shadow 0.15s",
      }}
      onFocus={e => { if(!isFound) e.currentTarget.style.boxShadow="0 0 0 3px #00F5C4"; }}
      onBlur={e => { e.currentTarget.style.boxShadow="none"; }}
    >
      <div style={{
        position:"relative",width:"100%",height:"100%",transformStyle:"preserve-3d",
        animation: isFound?"tileVanish 0.5s cubic-bezier(.4,0,.2,1) 0.15s both":"none",
        transition: isFound?"none":"transform 0.22s cubic-bezier(.4,2,.6,1)",
        transform: isFlipped?"rotateY(180deg)":"rotateY(0deg)",
      }}>
        <div style={{
          position:"absolute",inset:0,backfaceVisibility:"hidden",
          background:"linear-gradient(135deg,#162030 0%,#0D1B2A 100%)",
          borderRadius:10,border:"2px solid #2a4060",
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:"0 2px 8px #00000066",
          backgroundImage:`radial-gradient(circle at 30% 30%, #1e3048 1px, transparent 1px),radial-gradient(circle at 70% 70%, #1e3048 1px, transparent 1px)`,
          backgroundSize:"12px 12px",

          <span style={{color:"#1e3048",fontSize:"1.4em",fontWeight:900}}>✦</span>
        </div>
        <div style={{
          position:"absolute",inset:0,backfaceVisibility:"hidden",
          transform:"rotateY(180deg)",borderRadius:10,
          background: isError?"#FF5E5B":remoteColor&&isFlipped&&!isFound?remoteColor+"28":isSelected?"linear-gradient(135deg,#FFB703,#ffcf40)":isFound&&foundInOrder?"linear-gradient(135deg,#00c49f,#00F5C4)":isFound?"linear-gradient(135deg,#c9a800,#FFB703)":"#F5EDD6",
          border: remoteColor&&isFlipped&&!isFound?`2.5px solid ${remoteColor}`:isSelected?"2.5px solid #FFB703":isFound&&foundInOrder?"2.5px solid #00F5C4":isFound?"2.5px solid #FFB703":"2px solid #c8bca0",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          boxShadow:remoteColor&&isFlipped&&!isFound?`0 0 14px ${remoteColor}55`:isSelected?"0 0 16px #FFB70388":"0 2px 8px #00000044",
          transition:"background 0.2s,box-shadow 0.2s,border 0.2s",
        }}>
          <span style={{
            fontFamily:"'JetBrains Mono',monospace",
            fontSize:"clamp(1.1rem,3.5vw,1.8rem)",fontWeight:800,
            color:isError?"#fff":isSelected?"#3d2800":isFound&&!foundInOrder?"#3d2800":"#0D1B2A",letterSpacing:"0.05em",
          }}>{tile.letter}</span>
          {isFlipped&&!isFound&&orderNum!==undefined&&(
            <span style={{position:"absolute",bottom:4,right:6,fontSize:"0.55em",fontWeight:700,opacity:0.4,color:isSelected?"#3d2800":"#0D1B2A"}}>{orderNum+1}</span>
          )}
        </div>
      </div>
    </button>
  );
}

// ─── Game Board ───────────────────────────────────────────────────────────────
function GameBoard({ words, onWin, timeLimit, onTimeUp, maxTurns }) {
  const cols = words.length===4?4:6;
  const [tiles] = useState(()=>buildTiles(words));
  const [flipped, setFlipped] = useState([]);
  const [found, setFound] = useState([]);
  const [foundTileIds, setFoundTileIds] = useState(new Set());
  const [error, setError] = useState([]);
  const [turns, setTurns] = useState(0);
  const [hadError, setHadError] = useState(false);
  const [wrongGuesses, setWrongGuesses] = useState(0);
  const [wordResults, setWordResults] = useState({});
  const [foundInOrderSet, setFoundInOrderSet] = useState(new Set());
  const [foundBonusWords, setFoundBonusWords] = useState([]);
  const [lastBonusWord, setLastBonusWord] = useState("");
  const [bonusPts, setBonusPts] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const [started, setStarted] = useState(false);
  const [flash, setFlash] = useState(null);
  const [outOfTurns, setOutOfTurns] = useState(false);
  const [floatingScores, setFloatingScores] = useState([]);
  const [scorePop, setScorePop] = useState(false);
  const timerRef = useRef(null);
  const startRef = useRef(null);
  const floatIdRef = useRef(0);
  const hasEndedRef = useRef(false); // prevents double onWin calls
  const stateRef = useRef({});       // always holds latest state values
  const processingRef = useRef(false); // hard lock during 4-tile processing
  const flippedRef = useRef([]);       // always-current mirror of flipped state
  const foundTileIdsRef = useRef(new Set()); // always-current mirror

  useEffect(()=>{
    if (!started) return;
    startRef.current = Date.now()-elapsed;
    timerRef.current = setInterval(()=>{
      const e = Date.now()-startRef.current;
      setElapsed(e);
      if (timeLimit && e>=timeLimit*1000) { clearInterval(timerRef.current); onTimeUp&&onTimeUp(); }
    },200);
    return ()=>clearInterval(timerRef.current);
  },[started]);

  // safeOnWin: can only fire once per game, always uses fresh state from stateRef
  function safeOnWin(extraProps={}) {
    if (hasEndedRef.current) return;
    hasEndedRef.current = true;
    clearInterval(timerRef.current);
    setFlipped([]);
    setError([]);
    setFlash(null);
    const s = stateRef.current;
    setTimeout(()=>onWin({
      turns:s.turns, elapsed:s.elapsed, words:s.words,
      wordResults:s.wordResults, wrongGuesses:s.wrongGuesses,
      bonusPts:s.bonusPts, bonusWords:s.foundBonusWords, ...extraProps
    }), 600);
  }

  useEffect(()=>{
    if (found.length===words.length) {
      soundManager.complete();
      safeOnWin();
    }
  },[found]);

  useEffect(()=>{
    // Only trigger if words remain unfound (found effect handles the win case)
    if (maxTurns && turns >= maxTurns && stateRef.current.found.length < words.length) {
      setOutOfTurns(true);
      safeOnWin({outOfTurns:true});
    }
  },[turns]);

  // Keep refs fresh — these are used in handleTileClick guards (never stale)
  stateRef.current = {turns,elapsed,words,wordResults,wrongGuesses,bonusPts,found,foundBonusWords};
  foundTileIdsRef.current = foundTileIds;
  const timeLeft = timeLimit ? Math.max(0,timeLimit-Math.floor(elapsed/1000)) : null;

  function unlock() {
    processingRef.current = false;
    flippedRef.current = [];
    setFlipped([]);
    setError([]);
    setFlash(null);
  }

  function handleTileClick(tile) {
    // Ref-based guards — always current, never stale, immune to React batching
    if (processingRef.current) return;
    if (hasEndedRef.current) return;
    if (foundTileIdsRef.current.has(tile.id)) return;
    if (flippedRef.current.length >= 4) return;
    if (flippedRef.current.includes(tile.id)) return;

    if (!started) setStarted(true);

    // Update ref immediately (sync) then state (async for render)
    flippedRef.current = [...flippedRef.current, tile.id];
    const newFlipped = flippedRef.current;
    setFlipped([...newFlipped]);
    soundManager.flip();

    if (newFlipped.length === 4) {
      // Lock immediately — prevents ANY further input until we unlock
      processingRef.current = true;
      setTurns(t=>t+1);

      const ft = newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters = ft.map(t=>t.letter);
      const sorted = [...letters].sort().join("");
      const s = stateRef.current;
      const matchIdx = words.findIndex((w,i)=>!s.found.includes(i)&&[...w].sort().join("")===sorted);

      if (matchIdx===-1) {
        // Check for bonus word
        const bonusWord = ALL_WORDS_4.flat().find(w=>
          !words.includes(w) && [...w].sort().join("")===sorted
        );
        if (bonusWord && !foundBonusWords.includes(bonusWord)) {
          soundManager.bonus();
          const bfid = ++floatIdRef.current;
          setFloatingScores(prev=>[...prev,{id:bfid,pts:50,color:"#9B5DE5"}]);
          setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==bfid)),1500);
          setFoundBonusWords(b=>[...b,bonusWord]);
          setLastBonusWord(bonusWord);
          setBonusPts(p=>p+50);
          setFlash("bonus");
          setTimeout(()=>unlock(), 1200);
          return;
        }
        // Bad guess
        setError(newFlipped); setFlash("bad"); setHadError(true); setWrongGuesses(g=>g+1);
        soundManager.wrong();
        setTimeout(()=>unlock(), 700);
        return;
      }

      // Valid word found!
      const inOrder = letters.join("") === words[matchIdx];
      const pts = inOrder ? 300 : 100;
      const floatColor = inOrder ? "#00F5C4" : "#FFB703";
      inOrder ? soundManager.wordGreen() : soundManager.wordYellow();
      const fid = ++floatIdRef.current;
      setFloatingScores(prev=>[...prev,{id:fid,pts,color:floatColor}]);
      setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==fid)),1150);
      setFlash(inOrder ? "good" : "goodYellow");
      setTimeout(()=>{
        setFound(f=>[...f,matchIdx]);
        setWordResults(prev=>({...prev,[matchIdx]:inOrder?"green":"yellow"}));
        if (inOrder) setFoundInOrderSet(prev=>new Set([...prev,...newFlipped]));
        // Add to found tile ids ref so future guards block them immediately
        const newFoundIds = new Set([...foundTileIdsRef.current,...newFlipped]);
        foundTileIdsRef.current = newFoundIds;
        setFoundTileIds(newFoundIds);
        setHadError(false);
        setScorePop(true); setTimeout(()=>setScorePop(false),400);
        unlock(); // clears flipped, error, flash, releases lock
      },420);
    }
  }

  return (
    <div style={{width:"100%",maxWidth:480,margin:"0 auto"}}>
      {(() => {
        const turnsLeft = maxTurns ? maxTurns - turns : null;
        const turnsDanger = turnsLeft !== null && turnsLeft <= 3;
        const wr = Object.values(wordResults);
        const liveScore = wr.filter(r=>r==="green").length*300 + wr.filter(r=>r==="yellow").length*100 + bonusPts;
        return (
          <div style={{marginBottom:8}}>
            {/* Score row — prominent center with floating animation target */}
            <div style={{position:"relative", textAlign:"center", marginBottom:6}}>
              <FloatingScore items={floatingScores} />
              <span style={{
                fontFamily:"'Fraunces',serif",
                fontSize:"clamp(1.4rem,5vw,2rem)",
                fontWeight:900,
                color:"#FFB703",
                animation: scorePop ? "scorePop 0.4s cubic-bezier(.4,2,.6,1)" : "none",
                display:"inline-block",
                transition:"color 0.2s",
              }}>
                {liveScore.toLocaleString()}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#3a5570",fontSize:"0.7rem",marginLeft:4}}>pts</span>
            </div>
            {/* Stats row */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
                {maxTurns ? (
                  <>Turns: <strong aria-live={turnsDanger?"assertive":"off"} style={{color:turnsLeft<=3?"#FF5E5B":"#FFB703",transition:"color 0.3s"}}>{turnsLeft}</strong> left</>
                ) : (
                  <>Guesses: <strong style={{color:"#FFB703"}}>{turns}</strong></>
                )}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
                Found: <strong style={{color:"#00F5C4"}}>{found.length}/{words.length}</strong>
              </span>
              <span
                aria-live={timeLeft!==null&&timeLeft<15?"assertive":"off"}
                style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:timeLeft!==null&&timeLeft<15?"#FF5E5B":"#7a9cc0"}}
              >
                {timeLeft!==null?`⏱ ${timeLeft}s`:`⏱ ${formatTime(elapsed)}`}
              </span>
            </div>
          </div>
        );
      })()}
      <FoundWordBanner words={words} wordResults={wordResults} />
      <div
        aria-live="polite"
        aria-atomic="true"
        style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:4}}
      >
        {flash&&(
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"0.95rem",fontWeight:700,animation:"fadeInOut 0.5s ease",
            color:flash==="good"?"#00F5C4":flash==="goodYellow"?"#FFB703":flash==="bonus"?"#9B5DE5":"#FF5E5B"}}>
            {flash==="good"&&"🟩 Nice — bonus points!"}
            {flash==="goodYellow"&&"🟨 Found! Try in order for more pts"}
            {flash==="bonus"&&`✨ Bonus word: ${lastBonusWord.toUpperCase()}! +50 pts`}
            {flash==="bad"&&"✗ Not a valid word here"}
          </span>
        )}
      </div>
      <div
        role="grid"
        aria-label="WordFlip game board"
        style={{
          display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,
          gap:"clamp(4px,1.5vw,10px)",padding:"clamp(4px,2vw,12px)",
          background:"#0a1520",borderRadius:16,border:"1.5px solid #1e3048",
          boxShadow:"0 4px 32px #00000055",
        }}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile}
            isFlipped={flipped.includes(tile.id)}
            isFound={foundTileIds.has(tile.id)}
            foundInOrder={foundInOrderSet.has(tile.id)}
            isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)}
            isError={error.includes(tile.id)}
            onClick={()=>handleTileClick(tile)}
            orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined}
          />
        ))}
      </div>
      <p style={{textAlign:"center",color:"#2a4060",fontSize:"0.75rem",marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>{maxTurns?`${maxTurns} turns max · `:""}🟩 +300 · 🟨 +100 · time & accuracy bonus revealed at end</p>
    </div>
  );
}

// ─── Count-up number animation ──────────────────────────────────────────────────────
function CountUp({ to, active, color, large }) {
  const [val, setVal] = useState(0);
  const [big, setBig] = useState(false);
  const started = useRef(false);
  useEffect(() => {
    if (!active || started.current) return;
    started.current = true;
    if (to === 0) { setVal(0); return; }
    const DURATION = large ? 800 : 620;
    const FRAMES  = large ? 32 : 26;
    let frame = 0;
    const id = setInterval(() => {
      frame++;
      const p = 1 - Math.pow(1 - frame / FRAMES, 3); // cubic ease-out
      setVal(frame >= FRAMES ? to : Math.round(p * to));
      if (frame >= FRAMES) {
        clearInterval(id);
        setBig(true);
        setTimeout(() => setBig(false), large ? 400 : 300);
      }
    }, Math.round(DURATION / FRAMES));
    return () => clearInterval(id);
  }, [active]);
  const popScale = large ? 1.45 : 1.38;
  return (
    <span style={{
      fontFamily: large ? "'Fraunces',serif" : "'JetBrains Mono',monospace",
      fontWeight: 900, color,
      fontSize: large ? "1.6rem" : "0.88rem",
      display: "inline-block",
      transform: big ? `scale(${popScale})` : "scale(1)",
      transition: "transform 0.22s cubic-bezier(.4,2,.6,1)",
    }}>
      +{val.toLocaleString()}{large && <span style={{fontSize:"0.85rem",fontWeight:700}}> pts</span>}
    </span>
  );
}

// ─── Firework burst helper ────────────────────────────────────────────────────
function Firework({ color, trigger, large }) {
  const [particles, setParticles] = useState([]);
  const fired = useRef(false);
  useEffect(() => {
    if (!trigger || fired.current) return;
    fired.current = true;
    const count = large ? 22 : 12;
    setParticles(Array.from({ length: count }, (_, i) => {
      const angle = (i / count) * 2 * Math.PI;
      const dist = (large ? 58 : 32) + Math.random() * (large ? 28 : 14);
      return { id: i, tx: Math.cos(angle) * dist, ty: Math.sin(angle) * dist };
    }));
    const t = setTimeout(() => setParticles([]), 900);
    return () => clearTimeout(t);
  }, [trigger]);
  const sz = large ? 9 : 5;
  return particles.map(p => (
    <div key={p.id} style={{
      position:"absolute", width:sz, height:sz, borderRadius:"50%",
      background:color, boxShadow:`0 0 ${sz+2}px ${color}`,
      top:"50%", right:0, marginTop:-(sz/2),
      "--fw-tx":p.tx+"px", "--fw-ty":p.ty+"px",
      animation:"fwParticle 0.72s ease-out forwards", pointerEvents:"none", zIndex:20,
    }} />
  ));
}

// ─── Score Receipt ─────────────────────────────────────────────────────────────────────────────────
function ScoreReceipt({ wordResults, elapsed, wrongGuesses, turns, score, bonusPts = 0, bonusWords = [] }) {
  const greens = wordResults.filter(r=>r==="green").length;
  const yellows = wordResults.filter(r=>r==="yellow").length;
  const wordPts  = greens*300 + yellows*100;
  const timePts  = Math.max(0, 600 - Math.floor(elapsed/1000));
  const guessPts = Math.max(0, 800 - wrongGuesses*50);

  const timeFormula  = timePts > 0 ? `${timePts}s to spare` : "just in time!";
  const accuracyCredits = Math.round(guessPts / 50);
  const guessFormula = `${accuracyCredits} remaining guesses × 50 pts`;

  const rows = [
    { icon:"🔤", label:`Words (${greens}🟩 ${yellows}🟨)`,
      formula: yellows > 0 ? `${greens}×300 + ${yellows}×100` : `${greens}×300`,
      pts:wordPts,  color:"#00F5C4" },
    ...(bonusPts > 0 ? [
      { icon:"✨", label:"Bonus words",
        formula: (bonusWords && bonusWords.length)
          ? `${bonusWords.map(w=>w.toUpperCase()).join(", ")} · ${bonusWords.length}×50`
          : `${Math.round(bonusPts/50)}×50`,
        pts:bonusPts, color:"#FFB703" },
    ] : []),
    { icon:"⏱", label:"Time bonus",
      formula:timeFormula,
      pts:timePts,  color:"#9B5DE5" },
    { icon:"🎯", label:"Accuracy bonus",
      formula:guessFormula,
      pts:guessPts, color:"#00BBF9" },
  ];

  const ROW_MS   = 1200;
  const FW_AFTER = 700;
  const [visibleCount, setVisibleCount] = useState(0);
  const [firedSet,     setFiredSet]     = useState(new Set());

  useEffect(() => {
    const timers = [];
    const fire = key => setFiredSet(s => { const n = new Set(s); n.add(key); return n; });
    rows.forEach((_, i) => {
      timers.push(setTimeout(() => setVisibleCount(v => Math.max(v, i+1)), 300 + i*ROW_MS));
      timers.push(setTimeout(() => fire(i),                                300 + i*ROW_MS + FW_AFTER));
    });
    const totalShow = 300 + rows.length * ROW_MS;
    timers.push(setTimeout(() => setVisibleCount(rows.length + 1), totalShow));
    timers.push(setTimeout(() => fire("total"),                    totalShow + 900));
    return () => timers.forEach(clearTimeout);
  }, []);

  const totalVisible = visibleCount > rows.length;

  return (
    <div style={{background:"#0a1520", border:"1.5px solid #1e3048", borderRadius:14, padding:"16px 18px", marginBottom:20, textAlign:"left"}}>
      {rows.map((row, i) => {
        const visible = visibleCount > i;
        return (
          <div key={row.label} style={{
            marginBottom:10, opacity:visible?1:0,
            transform:visible?"translateX(0)":"translateX(-10px)",
            transition:"opacity 0.35s ease, transform 0.35s ease",
          }}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#7a9cc0", fontSize:"0.78rem"}}>
                {row.icon} {row.label}
              </span>
              <div style={{position:"relative", display:"flex", alignItems:"center", flexShrink:0, marginLeft:12}}>
                <Firework color={row.color} trigger={firedSet.has(i)} />
                <CountUp to={row.pts} active={visible} color={row.color} />
              </div>
            </div>
            <div style={{fontFamily:"'JetBrains Mono',monospace", color:"#3a5570", fontSize:"0.68rem", marginTop:3, paddingLeft:"1.4em"}}>
              {row.formula}
            </div>
          </div>
        );
      })}
      <div style={{
        borderTop:"1.5px dashed #1e3048", marginTop:10, paddingTop:10,
        display:"flex", justifyContent:"space-between", alignItems:"center",
        opacity:totalVisible?1:0,
        transform:totalVisible?"scale(1)":"scale(0.88)",
        transition:"opacity 0.4s cubic-bezier(.4,2,.6,1), transform 0.4s cubic-bezier(.4,2,.6,1)",
      }}>
        <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#7a9cc0", fontSize:"0.78rem", fontWeight:700}}>TOTAL</span>
        <div style={{position:"relative", display:"flex", alignItems:"center"}}>
          <Firework color="#FFB703" trigger={firedSet.has("total")} large />
          <CountUp to={score} active={totalVisible} color="#FFB703" large />
        </div>
      </div>
    </div>
  );
}


// ─── Win Screen ───────────────────────────────────────────────────────────────
function WinScreen({ result, mode, onPlayAgain, onMenu, isDaily, streak, isNewBest }) {
  const wordResultsArr = result.words.map((_,i) => result.wordResults?.[i] || (result.outOfTurns ? "missed" : "yellow"));
  const score = scoreCalc(result.elapsed, wordResultsArr, result.wrongGuesses, result.bonusPts||0);
  const prevBest = getPersonalBest();
  const computedNewBest = isDaily && score > prevBest;
  const showNewBest = isNewBest || computedNewBest;
  const [copied, setCopied] = useState(false);

  function handleShare() {
    const text = buildShareText(result.turns, result.elapsed, score, wordResultsArr, result.words.length);
    const shareData = { title:"WordFlip Daily", text };
    const tryClipboard = () => navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
      navigator.share(shareData).catch(tryClipboard);
    } else { tryClipboard(); }
  }

  return (
    <div role="main" aria-label="Game results" style={{textAlign:"center",maxWidth:400,margin:"0 auto",padding:20}}>
      <div aria-hidden="true" style={{fontSize:"3rem",marginBottom:8}}>{result.outOfTurns?"😬":"🎉"}</div>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"2rem",margin:"0 0 4px"}}>
        {result.outOfTurns?"Out of turns!":mode==="daily"?"Daily Complete!":"You Win!"}
      </h2>
      <p style={{color:"#7a9cc0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.9rem",marginBottom:16}}>
        {result.words.join(" · ")}
      </p>
      {isDaily&&(
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          {streak>0&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#1a1200",border:"1.5px solid #FFB703",borderRadius:20,padding:"5px 14px"}}>
              <span>🔥</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontWeight:700,fontSize:"0.9rem"}}>{streak} day streak</span>
            </div>
          )}
          {showNewBest&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0a2e24",border:"1.5px solid #00F5C4",borderRadius:20,padding:"5px 14px"}}>
              <span>🏆</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"#00F5C4",fontWeight:700,fontSize:"0.9rem"}}>New personal best!</span>
            </div>
          )}
        </div>
      )}
      <ScoreReceipt
        wordResults={wordResultsArr}
        elapsed={result.elapsed}
        wrongGuesses={result.wrongGuesses||0}
        turns={result.turns}
        score={score}
        bonusPts={result.bonusPts||0}
        bonusWords={result.bonusWords||[]}
      />
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        {isDaily&&(
          <button onClick={handleShare} style={{...btnStyle(copied?"#00c49f":"#1e3048",copied?"#0a2e24":"#F5EDD6"),padding:"10px 20px"}}>
            {copied?"✓ Copied!":"📤 Share"}
          </button>
        )}
        {!isDaily&&(
          <button onClick={onPlayAgain} style={btnStyle("#00F5C4","#0a2e24")}>Play Again</button>
        )}
        <button onClick={onMenu} style={btnStyle("#1e3048","#F5EDD6")}>Menu</button>
      </div>
    </div>
  );
}

function btnStyle(bg,color) {
  return {
    background:bg,color,border:"none",borderRadius:10,
    padding:"10px 24px",fontFamily:"'JetBrains Mono',monospace",
    fontWeight:700,fontSize:"0.9rem",cursor:"pointer",transition:"opacity 0.15s",
  };
}

// ─── Local Multiplayer ────────────────────────────────────────────────────────
function LocalMultiScreen({ onBack }) {
  const [playerCount,setPlayerCount] = useState(2);
  const [started,setStarted] = useState(false);
  const [scores,setScores] = useState([0,0]);
  const [inOrderMap,setInOrderMap] = useState({});
  const [currentPlayer,setCurrentPlayer] = useState(0);
  const [gameOver,setGameOver] = useState(false);
  const [words] = useState(()=>pickRandom(ALL_WORDS_9));
  const [foundWords,setFoundWords] = useState([]);
  const [tiles] = useState(()=>buildTiles(words));
  const [flipped,setFlipped] = useState([]);
  const [error,setError] = useState([]);
  const [flash,setFlash] = useState(null);
  const [turns,setTurns] = useState(0);
  const [foundTileIdsMulti,setFoundTileIdsMulti] = useState(new Set());
  const multiProcessingRef = React.useRef(false);
  const multiFlippedRef = React.useRef([]);
  const COLORS=["#00F5C4","#FFB703","#FF5E5B","#9B5DE5"];
  const playerNames=Array.from({length:playerCount},(_,i)=>`Player ${i+1}`);

  useEffect(()=>{ if (!started) setScores(Array(playerCount).fill(0)); },[playerCount]);

  if (!started) return (
    <div style={{textAlign:"center",maxWidth:360,margin:"0 auto"}}>
      <button onClick={onBack} style={{...btnStyle("#1e3048","#7a9cc0"),marginBottom:20,fontSize:"0.8rem"}}>← Back</button>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 20px"}}>Local Multiplayer</h2>
      <p style={{color:"#7a9cc0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.85rem",marginBottom:8}}>Players</p>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
        {[2,3,4].map(n=>(
          <button key={n} onClick={()=>setPlayerCount(n)} style={{...btnStyle(playerCount===n?"#FFB703":"#1e3048",playerCount===n?"#0D1B2A":"#7a9cc0"),padding:"8px 18px"}}>{n}</button>
        ))}
      </div>
      <div style={{background:"#0a1520",border:"1px solid #1e3048",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#3a5570",fontSize:"0.72rem",margin:0,lineHeight:1.8}}>⭐ Flip in order → <strong style={{color:"#F5EDD6"}}>300 pts</strong> · ✓ Any order → <strong style={{color:"#F5EDD6"}}>100 pts</strong> · ✗ Wrong → passes turn</p>
      </div>
      <button onClick={()=>setStarted(true)} style={{...btnStyle("#00F5C4","#0a2e24"),width:"100%",padding:"14px",borderRadius:12}}>Start Game</button>
    </div>
  );

  if (gameOver) {
    const maxScore=Math.max(...scores);
    const winners=scores.map((s,i)=>s===maxScore?i:-1).filter(i=>i>=0);
    return (
      <div style={{textAlign:"center",maxWidth:360,margin:"0 auto"}}>
        <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 20px"}}>
          {winners.length===1?`${playerNames[winners[0]]} Wins!`:"It's a Tie!"}
        </h2>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          {scores.map((s,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",background:"#0a1520",borderRadius:10,padding:"10px 16px",border:`1.5px solid ${s===maxScore?COLORS[i]:"#1e3048"}`}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:COLORS[i],fontWeight:700}}>{playerNames[i]}</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontWeight:700}}>{s.toLocaleString()} pts</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>{ setGameOver(false); setStarted(false); setFoundWords([]); setFoundTileIdsMulti(new Set()); setFlipped([]); setScores(Array(playerCount).fill(0)); setCurrentPlayer(0); setTurns(0); }} style={btnStyle("#00F5C4","#0a2e24")}>Rematch</button>
          <button onClick={onBack} style={btnStyle("#1e3048","#F5EDD6")}>Menu</button>
        </div>
      </div>
    );
  }

  const foundWordSet=new Set(foundWords.map(f=>f.wordIndex));

  function handleTileClick(tile) {
    if (multiProcessingRef.current||foundTileIdsMulti.has(tile.id)||multiFlippedRef.current.length>=4||multiFlippedRef.current.includes(tile.id)) return;
    multiFlippedRef.current=[...multiFlippedRef.current,tile.id];
    const newFlipped=multiFlippedRef.current;
    setFlipped([...newFlipped]);
    if (newFlipped.length===4) {
      setTurns(t=>t+1);
      const ft=newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters=ft.map(t=>t.letter);
      const sorted=[...letters].sort().join("");
      const matchIdx=words.findIndex((w,i)=>!foundWordSet.has(i)&&[...w].sort().join("")===sorted);
      if (matchIdx===-1) {
        multiProcessingRef.current=true;
        setError(newFlipped); setFlash("bad");
        setTimeout(()=>{multiFlippedRef.current=[];multiProcessingRef.current=false;setFlipped([]);setError([]);setFlash(null);setCurrentPlayer(p=>(p+1)%playerCount);},700); return;
      }
      const multiInOrder = letters.join("") === words[matchIdx];
      const multiPts = multiInOrder ? 300 : 100;
      multiProcessingRef.current=true;
      soundManager.wordGreen();
      setFlash(multiInOrder ? "goodOrder" : "good");
      setTimeout(()=>{
        const newFW=[...foundWords,{wordIndex:matchIdx,player:currentPlayer,inOrder:multiInOrder}];
        setFoundWords(newFW);
        setInOrderMap(prev=>({...prev,[matchIdx]:multiInOrder}));
        setFoundTileIdsMulti(prev=>new Set([...prev,...newFlipped]));
        const ns=[...scores]; ns[currentPlayer]+=multiPts; setScores(ns);
        multiFlippedRef.current=[];multiProcessingRef.current=false;
        setFlipped([]); setFlash(null);
        if (newFW.length===words.length) { soundManager.complete(); setGameOver(true); }
      },400);
    }
  }

  return (
    <div style={{width:"100%",maxWidth:500,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:10,flexWrap:"wrap"}}>
        {playerNames.map((name,i)=>(
          <div key={i} style={{padding:"4px 14px",borderRadius:20,background:i===currentPlayer?COLORS[i]+"22":"#0a1520",border:`1.5px solid ${i===currentPlayer?COLORS[i]:"#1e3048"}`,fontFamily:"'JetBrains Mono',monospace",fontSize:"0.8rem",color:i===currentPlayer?COLORS[i]:"#2a4060",fontWeight:i===currentPlayer?700:400,transition:"all 0.2s"}}>
            {name}: {scores[i].toLocaleString()}pts
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:10}}>
        {words.map((word,i)=>{
          const fw=foundWords.find(f=>f.wordIndex===i);
          return <div key={i} style={{padding:"3px 12px",borderRadius:20,background:fw?COLORS[fw.player]+"33":"#0e1f30",border:fw?`1.5px solid ${COLORS[fw.player]}`:"1.5px solid #1e3048",fontFamily:"'JetBrains Mono',monospace",fontWeight:fw?.inOrder?900:700,fontSize:"0.8rem",color:fw?COLORS[fw.player]:"#3a5570",letterSpacing:"0.15em",transition:"all 0.3s cubic-bezier(.4,2,.6,1)",transform:fw?"scale(1.06)":"scale(1)",boxShadow:fw?.inOrder?`0 0 10px ${COLORS[fw.player]}88`:"none"}}>{fw?.inOrder?"⭐ ":""}{word}</div>;
        })}
      </div>
      <div style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>
        {flash&&<span style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:"1rem",color:flash==="good"||flash==="goodOrder"?COLORS[currentPlayer]:"#FF5E5B"}}>
          {flash==="good"&&`✓ ${playerNames[currentPlayer]} found a word — goes again!`}
          {flash==="goodOrder"&&`⭐ ${playerNames[currentPlayer]} got it in order — goes again!`}
          {flash==="bad"&&"✗ Next player's turn"}
        </span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"clamp(3px,1.2vw,8px)",padding:"clamp(4px,2vw,12px)",background:"#0a1520",borderRadius:16,border:"1.5px solid #1e3048"}}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile} isFlipped={flipped.includes(tile.id)} isFound={foundTileIdsMulti.has(tile.id)} isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)} isError={error.includes(tile.id)} onClick={()=>handleTileClick(tile)} orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined} />
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.75rem",margin:0}}>
          {playerNames[currentPlayer]}'s turn · Turn {turns+1}
        </p>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{ if(window.confirm('End game and see results?')) setGameOver(true); }} style={{...btnStyle("#1e3048","#3a5570"),padding:"4px 10px",fontSize:"0.7rem"}}>End</button>
          <button onClick={()=>{ if(window.confirm('Return to menu?')) onBack(); }} style={{...btnStyle("#1e3048","#3a5570"),padding:"4px 10px",fontSize:"0.7rem"}}>Menu</button>
        </div>
      </div>
    </div>
  );
}

// ─── Online Multiplayer ───────────────────────────────────────────────────────
function OnlineScreen({ onBack }) {
  const [phase, setPhase] = useState('join'); // join | lobby | game | done
  const [playerName, setPlayerName] = useState(() => localStorage.getItem('wf_online_name') || '');
  const [codeInput, setCodeInput] = useState(() => new URLSearchParams(window.location.search).get('room') || '');
  const [room, setRoom] = useState(null);
  const [players, setPlayers] = useState([]);
  const [gs, setGs] = useState(null);
  const [tiles, setTiles] = useState([]);
  const [flipped, setFlipped] = useState([]);
  const [remoteFlips, setRemoteFlips] = useState(new Set());
  const [errTiles, setErrTiles] = useState([]);
  const [flash, setFlash] = useState(null);
  const [timeLeft, setTimeLeft] = useState(60);
  const [busy, setBusy] = useState(false);
  const [errMsg, setErrMsg] = useState('');
  const [linkCopied, setLinkCopied] = useState(false);
  const fromInvite = useRef(!!(new URLSearchParams(window.location.search).get('room'))).current;

  const myId = useRef(getMyPlayerId()).current;
  const channelRef = useRef(null);
  const timerRef = useRef(null);
  const processingRef = useRef(false);
  const flippedRef = useRef([]);
  const foundTileIdsRef = useRef(new Set());
  const phaseRef = useRef('join');
  const gsRef = useRef(null);
  const roomRef = useRef(null);
  const playersRef = useRef([]);

  useEffect(() => { phaseRef.current = phase; }, [phase]);
  useEffect(() => { gsRef.current = gs; }, [gs]);
  useEffect(() => { roomRef.current = room; }, [room]);
  useEffect(() => { playersRef.current = players; }, [players]);

  // Rebuild found tile id set whenever game state changes
  useEffect(() => {
    if (!gs) return;
    const ids = new Set();
    (gs.found_words || []).forEach(fw => (fw.tile_ids || []).forEach(id => ids.add(id)));
    foundTileIdsRef.current = ids;
  }, [gs]);

  // Auto-copy room code when arriving via invite link
  useEffect(() => {
    if (fromInvite && codeInput) {
      try { navigator.clipboard.writeText(codeInput); } catch(e) {}
    }
  }, []);

  // Cleanup subscriptions on unmount
  useEffect(() => () => {
    if (channelRef.current) try { getSB().removeChannel(channelRef.current); } catch(e) {}
    clearInterval(timerRef.current);
  }, []);

  // 60-second countdown; auto-pass when it hits 0 on my turn
  useEffect(() => {
    if (phase !== 'game' || !gs?.turn_expires_at) return;
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      const left = Math.max(0, Math.round((new Date(gs.turn_expires_at) - Date.now()) / 1000));
      setTimeLeft(left);
      if (left <= 0 && gsRef.current?.current_player_id === myId && !processingRef.current) {
        clearInterval(timerRef.current);
        autoPassTurn();
      }
    }, 500);
    return () => clearInterval(timerRef.current);
  }, [gs?.turn_expires_at, phase]);

  function getNextPlayer(list, currentId) {
    const sorted = [...list].sort((a, b) => a.turn_order - b.turn_order);
    const idx = sorted.findIndex(p => p.id === currentId);
    return sorted[(idx + 1) % sorted.length];
  }

  function subscribeToRoom(roomId) {
    const channel = getSB()
      .channel(`room-${roomId}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, payload => {
        const r = payload.new;
        setRoom(r); roomRef.current = r;
        if (r.status === 'playing' && phaseRef.current !== 'game' && phaseRef.current !== 'done') {
          setTiles(buildTilesSeeded(r.words, r.shuffle_seed));
          setPhase('game'); phaseRef.current = 'game';
        }
        if (r.status === 'done' && phaseRef.current !== 'done') {
          setPhase('done'); phaseRef.current = 'done';
        }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players', filter: `room_id=eq.${roomId}` }, async () => {
        const { data } = await getSB().from('players').select('*').eq('room_id', roomId).order('turn_order');
        if (data) { setPlayers(data); playersRef.current = data; }
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'game_state', filter: `room_id=eq.${roomId}` }, async payload => {
        const newGs = payload.new;
        if (!newGs) return;
        setGs(newGs); gsRef.current = newGs;
        const ids = new Set();
        (newGs.found_words || []).forEach(fw => (fw.tile_ids || []).forEach(id => ids.add(id)));
        foundTileIdsRef.current = ids;
        setRemoteFlips(new Set());
        if (newGs.current_player_id !== myId) {
          flippedRef.current = []; setFlipped([]); setErrTiles([]); setFlash(null);
          processingRef.current = false;
        }
        // Fallback game-start: if game_state arrives while still in lobby,
        // transition to game (covers the case where rooms UPDATE was missed)
        if (phaseRef.current === 'lobby') {
          let r = roomRef.current;
          if (!r?.words) {
            const { data } = await getSB().from('rooms').select('*').eq('id', roomId).single();
            if (data) { r = data; setRoom(data); roomRef.current = data; }
          }
          if (r?.words) {
            setTiles(buildTilesSeeded(r.words, r.shuffle_seed));
            setPhase('game'); phaseRef.current = 'game';
          }
        }
      })
      .on('broadcast', { event: 'tile_flip' }, ({ payload }) => {
        if (payload?.playerId !== myId) {
          setRemoteFlips(prev => new Set([...prev, payload.tileId]));
        }
      })
      .subscribe();
    channelRef.current = channel;
  }

  async function createRoom() {
    if (!playerName.trim()) { setErrMsg('Enter your name first'); return; }
    setBusy(true); setErrMsg('');
    localStorage.setItem('wf_online_name', playerName.trim());
    try {
      const db = getSB();
      const words = pickRandom(ALL_WORDS_9);
      const seed = Math.floor(Math.random() * 1e8);
      const { data: r, error: re } = await db.from('rooms')
        .insert({ code: genRoomCode(), status: 'waiting', words, shuffle_seed: seed, host_id: myId })
        .select().single();
      if (re) throw re;
      // upsert so re-creating after an abandoned room doesn't 409
      const { error: pe } = await db.from('players')
        .upsert({ id: myId, room_id: r.id, name: playerName.trim(), turn_order: 0, score: 0 });
      if (pe) throw pe;
      setRoom(r); roomRef.current = r;
      setPlayers([{ id: myId, room_id: r.id, name: playerName.trim(), turn_order: 0, score: 0 }]);
      playersRef.current = [{ id: myId, room_id: r.id, name: playerName.trim(), turn_order: 0, score: 0 }];
      subscribeToRoom(r.id);
      setPhase('lobby'); phaseRef.current = 'lobby';
    } catch(e) {
      setErrMsg('Could not create room — check console for details.');
      console.error('createRoom:', e);
    }
    setBusy(false);
  }

  async function joinRoom() {
    if (!playerName.trim()) { setErrMsg('Enter your name first'); return; }
    const code = codeInput.trim().toUpperCase();
    if (code.length < 2) { setErrMsg('Enter a room code'); return; }
    setBusy(true); setErrMsg('');
    localStorage.setItem('wf_online_name', playerName.trim());
    try {
      const db = getSB();
      const { data: r, error: re } = await db.from('rooms').select('*').eq('code', code).eq('status', 'waiting').single();
      if (re || !r) { setErrMsg('Room not found or already started.'); setBusy(false); return; }
      const { data: existing } = await db.from('players').select('*').eq('room_id', r.id).order('turn_order');
      if (existing && existing.length >= 4) { setErrMsg('Room is full (4 players max).'); setBusy(false); return; }
      const alreadyIn = existing?.find(p => p.id === myId);
      if (!alreadyIn) {
        const { error: pe } = await db.from('players')
          .insert({ id: myId, room_id: r.id, name: playerName.trim(), turn_order: existing?.length || 0, score: 0 });
        if (pe) throw pe;
      }
      const allPlayers = alreadyIn ? (existing || []) : [...(existing || []),
        { id: myId, room_id: r.id, name: playerName.trim(), turn_order: existing?.length || 0, score: 0 }];
      setRoom(r); roomRef.current = r;
      setPlayers(allPlayers); playersRef.current = allPlayers;
      subscribeToRoom(r.id);
      setPhase('lobby'); phaseRef.current = 'lobby';
    } catch(e) {
      setErrMsg('Could not join room — check console for details.');
      console.error('joinRoom:', e);
    }
    setBusy(false);
  }

  async function startGame() {
    try {
      const db = getSB();
      const now = new Date();
      const expires = new Date(now.getTime() + 60000);
      const firstPlayer = [...playersRef.current].sort((a, b) => a.turn_order - b.turn_order)[0];
      await db.from('rooms').update({ status: 'playing', started_at: now.toISOString() }).eq('id', roomRef.current.id);
      await db.from('game_state').insert({
        room_id: roomRef.current.id, found_words: [], turn_number: 0,
        current_player_id: firstPlayer?.id || myId,
        turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
      });
      // Host transitions locally (Realtime covers guests)
      setTiles(buildTilesSeeded(roomRef.current.words, roomRef.current.shuffle_seed));
      setPhase('game'); phaseRef.current = 'game';
    } catch(e) { console.error('startGame:', e); }
  }

  function handleTileClick(tile) {
    if (gsRef.current?.current_player_id !== myId) return;
    if (processingRef.current) return;
    if (foundTileIdsRef.current.has(tile.id)) return;
    if (flippedRef.current.length >= 4) return;
    if (flippedRef.current.includes(tile.id)) return;
    soundManager.flip();
    flippedRef.current = [...flippedRef.current, tile.id];
    setFlipped([...flippedRef.current]);
    try { channelRef.current?.send({ type: 'broadcast', event: 'tile_flip', payload: { tileId: tile.id, playerId: myId } }); } catch(e) {}
    if (flippedRef.current.length === 4) {
      processingRef.current = true;
      submitGuess([...flippedRef.current]);
    }
  }

  async function submitGuess(tileIds) {
    const db = getSB();
    const currentGs = gsRef.current;
    const currentRoom = roomRef.current;
    const currentPlayers = playersRef.current;
    if (!currentGs || !currentRoom) { processingRef.current = false; return; }
    const ft = tileIds.map(id => tiles.find(t => t.id === id)).filter(Boolean);
    const letters = ft.map(t => t.letter);
    const sorted = [...letters].sort().join('');
    const words = currentRoom.words;
    const foundWordsList = currentGs.found_words || [];
    const foundIndices = new Set(foundWordsList.map(fw => fw.wordIndex));
    const matchIdx = words.findIndex((w, i) => !foundIndices.has(i) && [...w].sort().join('') === sorted);
    const now = new Date();
    const expires = new Date(now.getTime() + 60000);
    const myPlayerData = currentPlayers.find(p => p.id === myId);

    function unlock() {
      flippedRef.current = []; setFlipped([]); setErrTiles([]); setFlash(null);
      processingRef.current = false;
    }
    // Safety valve: always release the lock within 5s even if a DB call hangs
    const safetyTimer = setTimeout(unlock, 5000);

    if (matchIdx === -1) {
      setErrTiles(tileIds); setFlash('bad');
      soundManager.wrong();
      const nextP = getNextPlayer(currentPlayers, myId);
      setTimeout(async () => {
        try {
          await db.from('game_state').update({
            turn_number: (currentGs.turn_number || 0) + 1,
            current_player_id: nextP.id,
            turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
          }).eq('room_id', currentRoom.id);
        } catch(e) { console.error('submitGuess wrong:', e); }
        clearTimeout(safetyTimer); unlock();
      }, 800);
      return;
    }

    const inOrder = letters.join('') === words[matchIdx];
    const pts = inOrder ? 300 : 100;
    inOrder ? soundManager.wordGreen() : soundManager.wordYellow();
    setFlash(inOrder ? 'good' : 'goodYellow');
    const newFoundWords = [...foundWordsList, {
      wordIndex: matchIdx, playerId: myId,
      playerName: myPlayerData?.name || '?', inOrder, tile_ids: tileIds,
    }];
    setTimeout(async () => {
      try {
        const gameOver = newFoundWords.length >= words.length;
        await db.from('players').update({ score: (myPlayerData?.score || 0) + pts }).eq('id', myId);
        await db.from('game_state').update({
          found_words: newFoundWords, turn_number: (currentGs.turn_number || 0) + 1,
          current_player_id: myId,
          turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
        }).eq('room_id', currentRoom.id);
        if (gameOver) await db.from('rooms').update({ status: 'done' }).eq('id', currentRoom.id);
      } catch(e) { console.error('submitGuess hit:', e); }
      clearTimeout(safetyTimer); unlock();
    }, 500);
  }

  async function autoPassTurn() {
    processingRef.current = true;
    const currentGs = gsRef.current; const currentRoom = roomRef.current;
    if (!currentGs || !currentRoom) { processingRef.current = false; return; }
    const now = new Date();
    const expires = new Date(now.getTime() + 60000);
    const nextP = getNextPlayer(playersRef.current, myId);
    flippedRef.current = []; setFlipped([]);
    try {
      await getSB().from('game_state').update({
        turn_number: (currentGs.turn_number || 0) + 1,
        current_player_id: nextP.id,
        turn_started_at: now.toISOString(), turn_expires_at: expires.toISOString(),
      }).eq('room_id', currentRoom.id).eq('current_player_id', myId); // idempotent guard
    } catch(e) { console.error('autoPassTurn:', e); }
    processingRef.current = false;
  }

  // ─── Derived view state ───────────────────────────────────────────────────────
  const isMyTurn = gs?.current_player_id === myId;
  const isHost = room?.host_id === myId;
  const sortedPlayers = [...players].sort((a, b) => a.turn_order - b.turn_order);
  const foundWordsList = gs?.found_words || [];
  const words = room?.words || [];
  const currentPlayerObj = sortedPlayers.find(p => p.id === gs?.current_player_id);
  const timeDanger = timeLeft <= 10;

  // ─── JOIN ─────────────────────────────────────────────────────────────────────
  if (phase === 'join') return (
    <div style={{textAlign:'center', maxWidth:360, margin:'0 auto'}}>
      <button onClick={onBack} style={{...btnStyle('#1e3048','#7a9cc0'), marginBottom:20, fontSize:'0.8rem'}}>← Back</button>
      <div style={{fontSize:'2rem', marginBottom:8}}>🌐</div>
      <h2 style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', margin:'0 0 20px'}}>Online Play</h2>
      {fromInvite && codeInput && (
        <div style={{background:'#0e2a1a', border:'1.5px solid #00F5C4', borderRadius:10, padding:'10px 14px', marginBottom:16, fontFamily:"'JetBrains Mono',monospace", fontSize:'0.8rem', color:'#00F5C4'}}>
          🎮 You've been invited to room <strong style={{letterSpacing:'0.12em'}}>{codeInput}</strong> — enter your name then hit Join!
        </div>
      )}
      {errMsg && <p style={{color:'#FF5E5B', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.8rem', marginBottom:12}}>{errMsg}</p>}
      <input value={playerName} onChange={e => setPlayerName(e.target.value.slice(0,12))} placeholder="Your name (max 12 chars)" maxLength={12}
        style={{width:'100%', padding:'12px 14px', borderRadius:10, border:'1.5px solid #2a4060', background:'#0a1520', color:'#F5EDD6', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.9rem', marginBottom:16, boxSizing:'border-box', outline:'none'}}
        onKeyDown={e => e.key==='Enter' && (fromInvite && codeInput ? joinRoom() : createRoom())} />
      {!fromInvite && (
        <button onClick={createRoom} disabled={busy}
          style={{...btnStyle('linear-gradient(90deg,#00c49f,#00F5C4)','#0a2e24'), width:'100%', padding:'13px', marginBottom:12, opacity:busy?0.6:1}}>
          {busy?'Creating...':'✦ Create Room'}
        </button>
      )}
      <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:12}}>
        <div style={{flex:1, height:1, background:'#1e3048'}} />
        <span style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.7rem'}}>{fromInvite ? 'join room' : 'or join existing'}</span>
        <div style={{flex:1, height:1, background:'#1e3048'}} />
      </div>
      <div style={{display:'flex', gap:8}}>
        <input value={codeInput} onChange={e => setCodeInput(e.target.value.toUpperCase().slice(0,6))} placeholder="ROOM CODE" maxLength={6}
          style={{flex:1, padding:'12px 14px', borderRadius:10, border:`1.5px solid ${fromInvite&&codeInput?'#00F5C4':'#2a4060'}`, background:'#0a1520', color:'#F5EDD6', fontFamily:"'JetBrains Mono',monospace", fontSize:'1rem', letterSpacing:'0.15em', outline:'none'}}
          onKeyDown={e => e.key==='Enter' && joinRoom()} />
        <button onClick={joinRoom} disabled={busy} style={{...btnStyle(fromInvite&&codeInput?'#00F5C4':'#1e3048', fromInvite&&codeInput?'#0a2e24':'#F5EDD6'), padding:'12px 18px', opacity:busy?0.6:1}}>Join →</button>
      </div>
      {fromInvite && (
        <button onClick={() => { setCodeInput(''); }} style={{...btnStyle('transparent','#3a5570'), marginTop:10, fontSize:'0.72rem', border:'none', textDecoration:'underline'}}>
          Create a new room instead
        </button>
      )}
    </div>
  );

  // ─── LOBBY ────────────────────────────────────────────────────────────────────
  if (phase === 'lobby') return (
    <div style={{textAlign:'center', maxWidth:360, margin:'0 auto'}}>
      <div style={{background:'#0a1520', border:'1.5px solid #1e3048', borderRadius:14, padding:'16px 20px', marginBottom:16}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.7rem', margin:'0 0 6px', letterSpacing:'0.08em'}}>ROOM CODE</p>
        <div style={{fontFamily:"'Fraunces',serif", color:'#00F5C4', fontSize:'2.4rem', fontWeight:900, letterSpacing:'0.22em'}}>{room?.code}</div>
        <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.7rem', margin:'6px 0 0'}}>Share with friends to join</p>
      </div>
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#7a9cc0', fontSize:'0.75rem', margin:'0 0 8px'}}>Players ({players.length}/4)</p>
      {sortedPlayers.map((p, i) => (
        <div key={p.id} style={{display:'flex', alignItems:'center', gap:10, background:'#0a1520', borderRadius:10, padding:'10px 14px', marginBottom:6, border:`1.5px solid ${p.id===myId?MP_COLORS[i]+'66':'#1e3048'}`}}>
          <div style={{width:8, height:8, borderRadius:'50%', background:MP_COLORS[i], flexShrink:0}} />
          <span style={{fontFamily:"'JetBrains Mono',monospace", color:p.id===myId?'#F5EDD6':'#7a9cc0', fontSize:'0.85rem', flex:1, textAlign:'left'}}>
            {p.name}{p.id===myId?' (you)':''}{p.turn_order===0?' 👑':''}
          </span>
        </div>
      ))}
      {/* Invite link */}
      <button onClick={() => {
        const link = `https://wordflipgame.netlify.app?room=${room?.code}`;
        navigator.clipboard.writeText(link).then(() => { setLinkCopied(true); setTimeout(() => setLinkCopied(false), 2500); }).catch(() => {});
      }} style={{...btnStyle(linkCopied?'#0e2a1a':'#0a1520', linkCopied?'#00F5C4':'#7a9cc0'), width:'100%', padding:'10px', marginTop:12, border:`1.5px solid ${linkCopied?'#00F5C4':'#1e3048'}`, borderRadius:10, fontSize:'0.82rem', transition:'all 0.2s'}}>
        {linkCopied ? '✓ Link copied!' : '🔗 Copy invite link'}
      </button>
      <div style={{marginTop:12}}>
        {isHost ? (
          <button onClick={startGame} disabled={players.length<2}
            style={{...btnStyle(players.length>=2?'linear-gradient(90deg,#00c49f,#00F5C4)':'#1e3048', players.length>=2?'#0a2e24':'#3a5570'), width:'100%', padding:'13px', opacity:players.length<2?0.5:1}}>
            {players.length<2?'Waiting for players...':'Start Game →'}
          </button>
        ) : (
          <div style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', fontSize:'0.8rem', padding:'12px', background:'#0a1520', borderRadius:10, border:'1.5px solid #1e3048'}}>
            ⏳ Waiting for host to start...
          </div>
        )}
      </div>
      <button onClick={() => { try{getSB().removeChannel(channelRef.current);}catch(e){} setPhase('join'); phaseRef.current='join'; setRoom(null); setPlayers([]); }}
        style={{...btnStyle('transparent','#3a5570'), marginTop:12, fontSize:'0.75rem', border:'none', textDecoration:'underline'}}>
        Leave room
      </button>
    </div>
  );

  // ─── DONE ─────────────────────────────────────────────────────────────────────
  if (phase === 'done') {
    const byScore = [...players].sort((a, b) => b.score - a.score);
    const maxScore = byScore[0]?.score || 0;
    return (
      <div style={{textAlign:'center', maxWidth:360, margin:'0 auto'}}>
        <div style={{fontSize:'3rem', marginBottom:8}}>🏆</div>
        <h2 style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', margin:'0 0 20px'}}>
          {byScore[0]?.id===myId ? 'You Win!' : `${byScore[0]?.name} Wins!`}
        </h2>
        <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:24}}>
          {byScore.map((p, i) => {
            const colorIdx = sortedPlayers.findIndex(x => x.id === p.id);
            return (
              <div key={p.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', background:'#0a1520', borderRadius:10, padding:'10px 16px', border:`1.5px solid ${p.score===maxScore?MP_COLORS[colorIdx>=0?colorIdx:0]:'#1e3048'}`}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace", color:'#3a5570', marginRight:8, fontSize:'0.8rem'}}>#{i+1}</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace", color:p.id===myId?'#F5EDD6':'#7a9cc0', flex:1, textAlign:'left'}}>{p.name}{p.id===myId?' (you)':''}</span>
                <span style={{fontFamily:"'Fraunces',serif", color:'#FFB703', fontWeight:700}}>{p.score.toLocaleString()} pts</span>
              </div>
            );
          })}
        </div>
        <div style={{display:'flex', gap:10, justifyContent:'center'}}>
          <button onClick={() => { try{getSB().removeChannel(channelRef.current);}catch(e){} setPhase('join'); phaseRef.current='join'; setRoom(null); setPlayers([]); setGs(null); setTiles([]); setFlipped([]); }} style={btnStyle('#00F5C4','#0a2e24')}>New Game</button>
          <button onClick={onBack} style={btnStyle('#1e3048','#F5EDD6')}>Menu</button>
        </div>
      </div>
    );
  }

  // ─── GAME ─────────────────────────────────────────────────────────────────────
  return (
    <div style={{width:'100%', maxWidth:480, margin:'0 auto'}}>
      {/* Player score chips */}
      <div style={{display:'flex', gap:6, justifyContent:'center', marginBottom:10, flexWrap:'wrap'}}>
        {sortedPlayers.map((p, i) => (

            const isLocalFlipped = flipped.includes(tile.id);
            const isRemote = !isLocalFlipped && remoteFlips.has(tile.id);

              <Tile key={tile.id} tile={tile}

                isFound={foundTileIdsRef.current.has(tile.id)}

                isError={errTiles.includes(tile.id)}

                onClick={() => handleTileClick(tile)}

// ─── Daily Already Done Screen ────────────────────────────────────────────────
function DailyAlreadyDone({ onMenu, streak, session, onSignIn }) {
  const done = getDailyDone();
  const wordResultsArr2 = getDailyWords().map((_,i) => done?.wordResults?.[i] || (done?.outOfTurns ? "missed" : "yellow"));
  // Infer bonusPts from saved total for old entries that predate the bonusPts field
  const basePts = done ? scoreCalc(done.elapsed, wordResultsArr2, done.wrongGuesses, 0) : 0;
  const bonusPts = done ? (done.bonusPts != null ? done.bonusPts : Math.max(0, (done.score||0) - basePts)) : 0;
  const score = done ? (done.score || scoreCalc(done.elapsed, wordResultsArr2, done.wrongGuesses, bonusPts)) : 0;
  const [copied,setCopied] = useState(false);
  function handleShare() {
    const wordResultsArr = getDailyWords().map((_,i) => done?.wordResults?.[i] || "yellow");
    const text = buildShareText(done?.turns ?? 0, done?.elapsed ?? 0, score, wordResultsArr, getDailyWords().length);
    const shareData = { title:"WordFlip Daily", text };
    const tryClipboard = () => navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
      navigator.share(shareData).catch(tryClipboard);
    } else { tryClipboard(); }
  }
  return (
    <div style={{textAlign:"center",maxWidth:380,margin:"0 auto",padding:20}}>
      <div style={{fontSize:"3rem",marginBottom:12}}>✅</div>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"1.8rem",margin:"0 0 8px"}}>Already Played!</h2>
      <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.85rem",marginBottom:16}}>
        Come back tomorrow for a new challenge.
      </p>
      {streak>0&&(
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"#1a1200",border:"1.5px solid #FFB703",borderRadius:20,padding:"6px 16px",marginBottom:16}}>
          <span style={{fontSize:"1.2rem"}}>🔥</span>
          <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontWeight:700}}>{streak} day streak</span>
        </div>
      )}
      {done&&(
        <ScoreReceipt
          wordResults={wordResultsArr2}
          elapsed={done.elapsed}
          wrongGuesses={done.wrongGuesses||0}
          turns={done.turns}
          score={score}
          bonusPts={bonusPts}
          bonusWords={done.bonusWords||[]}
        />
      )}
      {!session&&onSignIn&&(
        <div onClick={onSignIn} style={{
