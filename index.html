let _sbClient = null;
// Route REST/Auth fetches through a same-origin Netlify proxy so Edge/Safari
// tracking prevention doesn't treat them as third-party. Realtime uses a
// WebSocket (not fetch), so it stays on the direct SUPABASE_URL and is untouched.
function sbProxyFetch(input, init) {
  let url = typeof input === 'string' ? input : (input && input.url);
  if (url && url.startsWith(SUPABASE_URL)) {
    const proxied = '/sb-proxy' + url.slice(SUPABASE_URL.length);
    input = typeof input === 'string' ? proxied : new Request(proxied, input);
  }
  return fetch(input, init);
}
function getSB() {
  if (typeof supabase === 'undefined') throw new Error('Supabase SDK not loaded');
  if (!_sbClient) _sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { fetch: sbProxyFetch },
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: false,
    },
  });
  return _sbClient;
}

// ─── Auth helpers ─────────────────────────────────────────────────────────────
async function authSignUp(email, password, username) {
  const res = await getSB().auth.signUp({
    email,
    password,
    options: { data: { username, display_name: username } }
  });
  if (res.error) throw res.error;
  if (res.data?.user?.identities?.length === 0) {
    throw new Error("An account with this email already exists");
  }
  // If the user is immediately active (email confirmation disabled in Supabase),
  // create the profile row now. Otherwise the DB trigger handles it on confirm.
  if (res.data?.session && res.data?.user) {
    const { error: pe } = await getSB().from('profiles').upsert(
      { id: res.data.user.id, username, display_name: username },
      { onConflict: 'id' }
    );
    if (pe) console.warn("Profile create on signup (may be handled by trigger):", pe.message);
  }
  return res.data;
}

async function authSignIn(email, password) {
  const { data, error } = await getSB().auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function authResetPassword(email) {
  const { error } = await getSB().auth.resetPasswordForEmail(email, {

async function authUpdatePassword(newPassword) {

async function authSignOut() {
  // scope:'local' clears the session from localStorage without a network call.
  // This avoids Safari stalling on the server-side invalidation request.
  const { error } = await getSB().auth.signOut({ scope: 'local' });
  if (error) throw error;
}

async function authGetSession() {
  const { data: { session } } = await getSB().auth.getSession();
  return session;
}

// Guarantee a non-expired access token before a critical write.
// iOS/WebKit freezes background timers, so the library's hourly auto-refresh
// often hasn't run when the user reopens a day-old session and plays. Without
// this, score/token writes go out with an expired JWT and are silently rejected
// until the next sign-in. Returns the (possibly refreshed) session, or null.
async function ensureFreshSession() {
  try {
    const sb = getSB();
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return null;
    const expiresAtMs = (session.expires_at || 0) * 1000;
    // Refresh if already expired or expiring within the next 2 minutes.
    if (Date.now() > expiresAtMs - 120000) {
      const { data, error } = await sb.auth.refreshSession();
      if (!error && data?.session) return data.session;
    }
    return session;
  } catch { return null; }
}

async function authGetProfile(userId) {
  // maybeSingle (not single) so a transient 0-row response doesn't throw; retry once
  let { data, error } = await getSB().from('profiles').select('*').eq('id', userId).maybeSingle();
  if (error) throw error;
  if (!data) {
    await new Promise(r => setTimeout(r, 600));
    ({ data, error } = await getSB().from('profiles').select('*').eq('id', userId).maybeSingle());
    if (error) throw error;
  }
  return data;
}

async function authCheckUsername(username) {

  return !data;
}

// ─── Leaderboard helpers ──────────────────────────────────────────────────────
async function submitDailyScore(userId, score, dayKey, turns, elapsed, wrongGuesses, blocks) {
  // ignoreDuplicates: the FIRST score of the day wins. Replaying the daily on a
  // second browser (before it syncs) can no longer overwrite the real score.
  const { error } = await getSB().from('daily_scores').upsert({
    user_id: userId, score, day_key: dayKey, turns, elapsed, wrong_guesses: wrongGuesses, blocks,
  }, { onConflict: 'user_id,day_key', ignoreDuplicates: true });
  if (error) console.error("Score submit error:", error);
}

async function fetchLeaderboard(mode, dayKey) {
  let query = getSB()
    .from('daily_scores')
    .select('score, day_key, turns, elapsed, wrong_guesses, blocks, created_at, profiles(username)')
    .order('score', { ascending: false })
    .limit(50);
  if (mode === 'daily') {
    query = query.eq('day_key', dayKey);
  }
  const { data, error } = await query;
  if (error) { console.error("Leaderboard fetch error:", error); return []; }
  return data;
}

async function fetchMyScores(userId) {
  const { data, error } = await getSB()
    .from('daily_scores')
    .select('score, day_key, turns, elapsed, wrong_guesses, blocks, created_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });
  if (error) { console.error("My scores fetch error:", error); return []; }
  return data;
}

// Convert a stored day_key ("2026-6-17") into display date strings
function dayKeyToDates(dayKey) {
  const [y, m, d] = String(dayKey || "").split('-').map(Number);
  const dt = (y && m && d) ? new Date(y, m - 1, d) : new Date();
  return {
    date: dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }),
    shortDate: dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
  };
}

// One daily per ACCOUNT, not per device: if this account already submitted a
// score today (played on another browser/device), reconstruct the local
// "done" marker from the server row so this device also shows Already Played.
async function syncDailyDoneFromServer(userId) {
  if (getDailyDone()) return false;
  try {
    await ensureFreshSession();
    const dk = dateKey().replace('wf_', '');
    const { data } = await getSB().from('daily_scores').select('*')
      .eq('user_id', userId).eq('day_key', dk).maybeSingle();
    if (!data) return false;
    const wordResults = {};
    [...(data.blocks || '')].forEach((ch, i) => {
      if (ch === '🟩') wordResults[i] = 'green';
      else if (ch === '🟨') wordResults[i] = 'yellow';
    });
    const missed = [...(data.blocks || '')].some(ch => ch === '🟥');
    setDailyDone({
      turns: data.turns, elapsed: data.elapsed, score: data.score,
      wordResults, wrongGuesses: data.wrong_guesses || 0,
      outOfTurns: missed, bonusPts: null, bonusWords: [],
    });
    clearDailyProgress(); // finished elsewhere — discard any local in-progress game
    return true;
  } catch (e) { return false; }
}

async function retroSubmitTodayScore(userId) {
  const done = getDailyDone();
  if (!done || !done.score) return;
  const dk = dateKey().replace('wf_', '');
  const wordResultsArr = getDailyWords().map((_,i) => done?.wordResults?.[i] || (done?.outOfTurns ? "missed" : "yellow"));
  const blocks = getDailyWords().map((_,i) => {
    const r = done?.wordResults?.[i];
    return r==="green" ? "🟩" : r==="yellow" ? "🟨" : "🟥";
  }).join("");
  await submitDailyScore(userId, done.score, dk, done.turns, done.elapsed, done.wrongGuesses||0, blocks);
}

// Idempotent grant via the secure RPC. Returns the new balance (or null on failure).
async function grantTokens(amount, reason) {
  const { data, error } = await getSB().rpc('add_tokens', { p_amount: amount, p_reason: reason });
  if (error) { console.error("Grant tokens error:", error); return null; }
  return data;
}

// Grant all tokens the signed-in user has earned but not yet received.

async function grantEarnedTokens(userId) {
  await grantTokens(TOKENS.SIGNUP, 'signup-bonus');
  const done = getDailyDone();
  if (done && done.score) {
    await grantTokens(dailyTokens(done.score), 'daily-' + dateKey().replace('wf_', ''));
  }
}

function getInv(invKey) {
  try { return Math.max(0, parseInt(localStorage.getItem(invKey) || '0', 10) || 0); } catch { return 0; }
}
function addInv(invKey, delta) {
  const n = Math.max(0, getInv(invKey) + delta);
  try { localStorage.setItem(invKey, String(n)); } catch {}

// Grant tokens only when signed in (the RPC uses auth.uid server-side).

// Atomic server-side spend via the spend_tokens RPC (see supabase-migrations.sql).
// The RPC rejects overdrafts, so the balance can never go negative.
// (Kept for future non-inventory purchases; item buys go through buyItem below.)
async function spendTokens(amount, reason) {
  const { data, error } = await getSB().rpc('spend_tokens', { p_amount: amount, p_reason: reason });
  if (error) {
    console.error('Spend tokens error:', error);
    const m = String(error.message || '');
    if (/insufficient/i.test(m)) return { ok:false, msg:'Not enough coins.' };
    if (/find the function|does not exist|404/i.test(m)) return { ok:false, msg:'Shop is not set up yet — try again later.' };
    return { ok:false, msg:'Purchase failed — please try again.' };
  }
  return { ok:true, balance:data };
}

    return { ok:false, msg:'Purchase failed — please try again.' };
  }
  return { ok:true, count:data };

// Pull the account's inventory into the local cache (wf_inv_*) so power-ups
// follow the account across browsers/devices. First sync for an account
// imports any pre-existing local purchases (bought before inventories existed).
async function syncInventoryFromServer(userId) {
  try {
    const db = getSB();
    const { data, error } = await db.from('inventories').select('hint,xray,freeze').eq('user_id', userId).maybeSingle();
    if (error) return; // table missing (migration not run) — keep local behavior
    if (!data) {
      const lh = getInv('wf_inv_hint'), lx = getInv('wf_inv_xray'), lf = getInv('wf_inv_freeze');
      for (let i = 0; i < lh; i++) await db.rpc('buy_item', { p_item:'hint', p_price:0 });
      for (let i = 0; i < lx; i++) await db.rpc('buy_item', { p_item:'xray', p_price:0 });
      for (let i = 0; i < lf; i++) await db.rpc('buy_item', { p_item:'freeze', p_price:0 });
      return; // local cache already reflects the imported counts
    }
    try {
      localStorage.setItem('wf_inv_hint', String(data.hint || 0));
      localStorage.setItem('wf_inv_xray', String(data.xray || 0));
      localStorage.setItem('wf_inv_freeze', String(data.freeze || 0));
    } catch {}
  } catch (e) {}
}

// Consume one item server-side (fire-and-forget). The local cache was already
// decremented for instant UI; the server response re-syncs it exactly.
function syncUseItem(itemKey) {
  ensureFreshSession().then(s => {
    if (!s?.user) return; // guests play off the local count
    getSB().rpc('use_item', { p_item: itemKey }).then(({ data, error }) => {
      if (!error && typeof data === 'number') {
        try { localStorage.setItem('wf_inv_' + itemKey, String(data)); } catch {}
      }
    });
  }).catch(() => {});
}

function useAuth() {
  const [session, setSession] = useState(null);
  // Initialize profile and balance from localStorage immediately — no network needed.
  // This is the primary fix for the "?" avatar on iOS cold start: the cached value
  // shows instantly while the background refresh confirms/updates it.
  const [profile, setProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem('wf_profile') || 'null'); } catch { return null; }
  });
  const [loading, setLoading] = useState(true);
  const [recovery, setRecovery] = useState(false);
  const explicitSignOut = useRef(false);
  const [balance, setBalance] = useState(() => {
    try { return parseInt(localStorage.getItem('wf_balance') || '0', 10); } catch { return 0; }
  });
  const sessionRef = useRef(null);
  const profileRef = useRef(null);

  async function loadProfile(userId, mounted) {
    let p = null;
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        if (attempt > 0) await new Promise(r => setTimeout(r, 1000 * attempt));
        p = await authGetProfile(userId);
        if (!p || !p.username) {
          const { data: { user } } = await getSB().auth.getUser();
          const meta = user?.user_metadata || {};
          const uname = meta.username
            || (user?.email || '').split('@')[0].replace(/[^a-zA-Z0-9_]/g, '').slice(0, 20)
            || 'player';
          const { data: created, error: ce } = await getSB()
            .from('profiles')
            .upsert({ id: userId, username: uname, display_name: uname }, { onConflict: 'id' })
            .select('*')
            .maybeSingle();
          if (ce) console.error("Profile auto-create failed:", ce.message);
          else p = created;
        }
        break;
      } catch (err) {
        console.warn(`loadProfile attempt ${attempt + 1} failed:`, err.message || err);
      }
    }
    if (!mounted || (mounted.current === false)) return;
    if (p) {
      profileRef.current = p;
      setProfile(p);
      try { localStorage.setItem('wf_profile', JSON.stringify(p)); } catch {}
    }
    try {
      const b = await fetchWallet(userId);
      if (mounted && mounted.current !== false) {
        setBalance(b);
        try { localStorage.setItem('wf_balance', String(b)); } catch {}
      }
    } catch {}
  }

  useEffect(() => {
    const m = { current: true };
    // Sync profileRef with the value already loaded from localStorage cache.
    try {
      if (!profileRef.current) {
        const cached = JSON.parse(localStorage.getItem('wf_profile') || 'null');
        if (cached) profileRef.current = cached;
      }
    } catch {}

    // onAuthStateChange is the single source of truth for auth state.
    //
    // CRITICAL: the callback body is deferred to a fresh tick via setTimeout.
    // supabase-js fires this callback (especially INITIAL_SESSION on page load)
    // while holding its internal auth lock. Any Supabase call made directly in
    // the callback — REST reads (they call getSession() internally to attach
    // the access token), setSession(), refreshSession() — waits on that same
    // lock and deadlocks. The visible symptom: after a page refresh, every DB
    // query in the app hangs forever (leaderboards stuck, score submits and
    // token grants silently dropped) while cached profile/balance still render.
    const handleAuthEvent = async (event, s) => {
      if (!m.current) return;
      if (event === "PASSWORD_RECOVERY") { setRecovery(true); return; }

      if (s?.user) {
        try { localStorage.setItem('wf_sb', JSON.stringify({ at: s.access_token, rt: s.refresh_token })); } catch {}
        sessionRef.current = s;
        setSession(s);
        // If we already have cached profile data, stop the spinner immediately and
        // refresh in the background. Otherwise wait for the first load to finish.
        if (profileRef.current) {
          if (m.current) setLoading(false);
          await loadProfile(s.user.id, m);
        } else {
          await loadProfile(s.user.id, m);
          if (m.current) setLoading(false);
        }
        return;
      }

      if (event === "SIGNED_OUT") {
        if (explicitSignOut.current) {
          explicitSignOut.current = false;
          try { localStorage.removeItem('wf_sb'); } catch {}
        } else {
          const backup = (() => { try { return JSON.parse(localStorage.getItem('wf_sb') || 'null'); } catch { return null; } })();
          if (backup?.rt) {
            const { error } = await getSB().auth.setSession({ access_token: backup.at || '', refresh_token: backup.rt });
            if (!error) {
              if (m.current) setLoading(false);
              return;
            }
            try { localStorage.removeItem('wf_sb'); } catch {}
          }
        }
        // Clear all state and caches on sign-out.
        sessionRef.current = null;
        profileRef.current = null;
        setSession(null);
        setProfile(null);
        setBalance(0);
        try { localStorage.removeItem('wf_profile'); localStorage.removeItem('wf_balance'); } catch {}
      } else {
        sessionRef.current = s;
        setSession(s);
      }

      if (m.current) setLoading(false);
    };
    const { data: { subscription } } = getSB().auth.onAuthStateChange((event, s) => {
      // Defer out of the auth lock (see comment above). Events still process
      // in order — setTimeout callbacks run FIFO.
      setTimeout(() => handleAuthEvent(event, s), 0);
    });

    // Fallback: if no INITIAL_SESSION fires within a tick (no stored session),
    // stop the loading spinner so the app doesn't hang on the splash screen.
    authGetSession().then(s => {
      if (!m.current) return;
      if (!s) setLoading(false); // session exists → onAuthStateChange handles it
    }).catch(() => { if (m.current) setLoading(false); });

    // When the user comes back to the app (PWA foreground), re-attempt profile
    // load if we have a session but the profile is still null. This catches the
    // case where the initial INITIAL_SESSION profile fetch failed because iOS
    // hadn't fully restored network connectivity yet.
    const handleVisibilityChange = async () => {
      if (document.visibilityState !== 'visible') return;
      const s = sessionRef.current;
      if (!s?.user) return;
      // Proactively refresh the token on foreground — iOS freezes the library's
      // background auto-refresh timer, so a day-old session can hold an expired
      // JWT that silently breaks the first score/token write after reopening.
      ensureFreshSession();
      if (profileRef.current) return;
      await loadProfile(s.user.id, m);
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);

    return () => {
      m.current = false;
      subscription.unsubscribe();
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    };
  }, []);

  const refreshProfile = useCallback(async () => {
    const s = sessionRef.current || await authGetSession();
    if (s?.user) {
      try {
        const p = await authGetProfile(s.user.id);
        setProfile(p);
      } catch (err) { console.error("refreshProfile failed:", err); }
    }
  }, [session]);

  const refreshWallet = useCallback(async () => {
    const s = sessionRef.current || await authGetSession();
    if (s?.user) {
      try {
        const b = await fetchWallet(s.user.id);
        setBalance(b);
        try { localStorage.setItem('wf_balance', String(b)); } catch {}
      } catch {}
    }
  }, [session]);

  function signOut() {
    explicitSignOut.current = true;
    profileRef.current = null;
    try { localStorage.removeItem('wf_sb'); } catch {}
    try { localStorage.removeItem('wf_profile'); localStorage.removeItem('wf_balance'); } catch {}
    try { getSB().auth.signOut({ scope: 'local' }); } catch {}
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-'))
        .forEach(k => localStorage.removeItem(k));
    } catch {}
    window.location.reload();
  }

  return { session, profile, loading, refreshProfile, recovery, clearRecovery: () => setRecovery(false), balance, refreshWallet, signOut };
}

// Seeded PRNG — gives every client the same tile layout for a given room
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function buildTilesSeeded(words, seed) {
  const tiles = [];
  words.forEach((word, wi) => word.split('').forEach((letter, li) => {
    tiles.push({ id: `${wi}-${li}`, letter });
  }));
  const rng = mulberry32(seed);
  const a = [...tiles];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function getMyPlayerId() {
  let id = localStorage.getItem('wf_player_id');
  if (!id) {
    // crypto.randomUUID() requires iOS 15.4+ — fallback for older devices
    id = (typeof crypto.randomUUID === 'function')
      ? crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    localStorage.setItem('wf_player_id', id);
  }
  return id;
}

// Daily words: deterministic by date from the 4-word bank
function getDailyWords() {
  const d = new Date();
  const idx = (d.getFullYear() * 500 + (d.getMonth()+1) * 31 + d.getDate()) % ALL_WORDS_4.length;
  return ALL_WORDS_4[idx];
}

function dateKey() {
  const d = new Date();
  return `wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickRandom(pool) {
  return pool[Math.floor(Math.random()*pool.length)];
}

function buildTiles(words) {
  const tiles = [];
  words.forEach((word,wi) => word.split("").forEach((letter,li) => {
    tiles.push({ id:`${wi}-${li}`, letter });
  }));
  return shuffle(tiles);
}

function formatTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,"0")}`;
}

function scoreCalc(ms, wordResults, wrongGuesses, bonusPts = 0) {
  const greenPts = wordResults.filter(r=>r==="green").length * 300;
  const yellowPts = wordResults.filter(r=>r==="yellow").length * 100;
  // "missed" words score 0 — no bonus for unfound words
  const timeBonus = Math.max(0, 600 - Math.floor(ms/1000)); // 600 pts, -1/sec over 6 min
  const guessBonus = Math.max(0, 800 - (wrongGuesses||0) * 50); // 800 pts, -50 per wrong guess
  return greenPts + yellowPts + timeBonus + guessBonus + bonusPts;
}

// ─── localStorage helpers ─────────────────────────────────────────────────────
// ─── Personal history (sorted by date, newest first) ─────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem("wf_history")||"[]"); } catch { return []; }
}
function saveToHistory(entry) {
  const history = getHistory();
  // One entry per day — replace if already played today
  const filtered = history.filter(e => e.dayKey !== entry.dayKey);
  filtered.unshift(entry); // newest first
  localStorage.setItem("wf_history", JSON.stringify(filtered.slice(0, 365)));
}
function getPersonalBest() {
  const h = getHistory();
  return h.length ? Math.max(...h.map(e => e.score)) : 0;
}
function getDailyBest() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_best")||"null"); } catch { return null; }
}
function saveDailyBest(score) {
  const best = getDailyBest();
  if (!best || score > best) localStorage.setItem(dateKey()+"_best", JSON.stringify(score));
}
// Keep old leaderboard getter for any legacy data migration
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem("wf_leaderboard")||"[]"); } catch { return []; }
}
function getDailyDone() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_done")||"null"); } catch { return null; }
}
function setDailyDone(result) {
  localStorage.setItem(dateKey()+"_done", JSON.stringify(result));
}

// Persists a started-but-unfinished daily so leaving and returning RESUMES
// mid-game rather than restarting (you can't bail on a bad round and retry).
// Keyed to today's date so it naturally expires at midnight. Cleared on finish.
function getDailyProgress() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_progress")||"null"); } catch { return null; }
}
function saveDailyProgress(data) {
  try { localStorage.setItem(dateKey()+"_progress", JSON.stringify(data)); } catch {}
}
function clearDailyProgress() {
  try { localStorage.removeItem(dateKey()+"_progress"); } catch {}
}

// ─── Streak helpers (no login needed — stored per device) ─────────────────────
// Weekly milestone payout: every 7 consecutive days pays an escalating bonus.
// TUNABLE — week 1: 200, week 2: 400, ... capped at 1000/week.
const streakWeekBonus = (weeks) => Math.min(200 * weeks, 1000);

function getStreak() {
  try { return JSON.parse(localStorage.getItem("wf_streak")||'{"count":0,"lastDate":""}'); }
  catch { return { count:0, lastDate:"" }; }
}
// Longest consecutive run in local history — seeds `best` for players whose
// streak record predates best-tracking. DST-tolerant day diff (20h–28h).
function computeBestFromHistory() {
  const times = getHistory()
    .map(e => String(e.dayKey||'').replace('wf_',''))
    .filter(Boolean)
    .map(k => { const [y,m,d] = k.split('-').map(Number); return new Date(y, m-1, d).getTime(); })
    .sort((a,b) => a-b);
  let best = 0, run = 0, prev = null;
  for (const t of times) {
    const diff = prev === null ? null : t - prev;
    run = (diff !== null && diff > 72e6 && diff < 108e6) ? run + 1 : 1;
    best = Math.max(best, run);
    prev = t;
  }
  return best;
}
function parseDayKey(k) {
  const [y, m, d] = String(k || '').replace('wf_', '').split('-').map(Number);
  return (y && m && d) ? new Date(y, m - 1, d) : null;
}
// Whole calendar days from dayKey k until today (0 = today, 1 = yesterday…).
// Math.round absorbs DST hour shifts.
function daysSinceKey(k) {
  const d = parseDayKey(k);
  if (!d) return Infinity;
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((today0 - d) / 86400000);
}

// The stored count can be stale (streak silently broken days ago) — this
// returns what the streak actually IS right now. A gap of missed days still
// counts as alive if the player owns enough Streak Freezes to cover it
// (they're consumed when the next daily is actually played).
function getLiveStreak() {
  const s = getStreak();
  const gap = s.lastDate ? daysSinceKey(s.lastDate) - 1 : Infinity; // missed days
  const alive = gap <= 0 || (gap !== Infinity && getInv('wf_inv_freeze') >= gap);
  return {
    count: alive ? (s.count || 0) : 0,
    best: Math.max(s.best || 0, s.count || 0, computeBestFromHistory()),
    playedToday: s.lastDate === dateKey(),
    lastDate: s.lastDate || null,
    frozen: s.frozen || [],
  };
}
function updateStreak() {
  const today = dateKey();
  const s = getStreak();
  const prevCount = s.count || 0;
  if (s.lastDate === today) return { ...s, prevCount }; // already counted today
  const gap = s.lastDate ? daysSinceKey(s.lastDate) - 1 : Infinity; // missed days
  const frozen = (s.frozen || []).slice(-30);
  let newCount;
  if (gap === 0) {
    newCount = prevCount + 1; // played yesterday — normal continuation
  } else if (gap > 0 && gap !== Infinity && getInv('wf_inv_freeze') >= gap) {
    // Streak Freeze: burn one per missed day; those days join the chain as
    // "frozen" (blue flame in the strip) and the streak survives.
    const last = parseDayKey(s.lastDate);
    for (let j = 1; j <= gap; j++) {
      addInv('wf_inv_freeze', -1);
      syncUseItem('freeze'); // account-level consume (no-op for guests)
      const d = new Date(last); d.setDate(last.getDate() + j);
      frozen.push(`wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`);
    }
    newCount = prevCount + gap + 1; // frozen days keep their place in the chain
  } else {
    newCount = 1; // broken (no freezes wasted on an unsalvageable gap)
  }
  const best = Math.max(s.best || 0, computeBestFromHistory(), newCount);
  const updated = { count: newCount, lastDate: today, best, frozen };
  localStorage.setItem("wf_streak", JSON.stringify(updated));
  return { ...updated, prevCount };
}

// ─── Share helper ─────────────────────────────────────────────────────────────
function buildShareText(turns, ms, score, wordResults, totalWords) {
  const d = new Date();
  const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  // wordResults array may be shorter than totalWords if player ran out of turns
  const blocks = Array.from({length: totalWords || wordResults.length}, (_,i) => {
    const r = wordResults[i];
    if (r === "green") return "\u{1F7E9}";
    if (r === "yellow") return "\u{1F7E8}";
    return "\u{1F7E5}"; // 🟥 not found
  }).join("");
  return "WordFlip Daily \u00B7 " + date + "\n"
    + blocks + "\n"
    + turns + " guess" + (turns !== 1 ? "es" : "") + " \u00B7 " + formatTime(ms) + " \u00B7 " + score.toLocaleString() + " pts\n"
    + "https://wordflipgame.netlify.app";
}

// ─── Fireworks ────────────────────────────────────────────────────────────────
function Fireworks({ active }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particles = useRef([]);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const colors = ["#00F5C4","#FFB703","#FF5E5B","#9B5DE5","#F5EDD6","#00BBF9"];
    particles.current = [];
    for (let b=0; b<8; b++) {
      const x=Math.random()*canvas.width, y=Math.random()*canvas.height*0.6+50;
      const color=colors[Math.floor(Math.random()*colors.length)];
      for (let p=0; p<40; p++) {
        const angle=(Math.PI*2*p)/40+Math.random()*0.3, speed=Math.random()*6+2;
        particles.current.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,alpha:1,color,r:Math.random()*3+1});
      }
    }
    function frame() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.current = particles.current.filter(p=>p.alpha>0.02);
      particles.current.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.alpha*=0.96;
        ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (particles.current.length>0) animRef.current=requestAnimationFrame(frame);
    }
    animRef.current=requestAnimationFrame(frame);
    return ()=>cancelAnimationFrame(animRef.current);
  },[active]);
  if (!active) return null;
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999}} />;
}

// ─── Sound Manager ────────────────────────────────────────────────────────────
const soundManager = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, dur, type="sine", vol=0.25, delay=0) {
    try {
      const c = ac(), osc = c.createOscillator(), g = c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      g.gain.setValueAtTime(0, c.currentTime + delay);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }
  // Haptic feedback via Web Vibration API (Android/Chrome; silent fallback on iOS)
  function vibe(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
  }
  return {
    flip()       { tone(520,0.05,"triangle",0.12); tone(280,0.08,"triangle",0.07,0.03); vibe(8); },
    select()     { tone(880,0.04,"sine",0.1); vibe(5); },
    wordGreen()  { [523,659,784,1047].forEach((f,i)=>tone(f,0.22,"sine",0.22,i*0.08)); vibe([30,15,60]); },
    wordYellow() { [523,659,784].forEach((f,i)=>tone(f,0.18,"sine",0.14,i*0.09)); vibe([20,10,30]); },
    wrong()      { tone(180,0.12,"sawtooth",0.18); tone(140,0.18,"triangle",0.1,0.06); vibe([15,20,15]); },
    complete()   { [523,659,784,1047,1319,784,1047].forEach((f,i)=>tone(f,0.28,"sine",0.2,i*0.07)); vibe([40,20,40,20,80]); },
    bonus()      { [659,784,1047].forEach((f,i)=>tone(f,0.18,"sine",0.18,i*0.07)); vibe([10,10,40]); },
  };
})();

// ─── Tile ─────────────────────────────────────────────────────────────────────
function Tile({ tile, isFlipped, isFound, foundInOrder, isSelected, isError, onClick, orderNum, remoteColor, isHint, isXray }) {
  const label = isFound
    ? `${tile.letter} — word found`
    : isFlipped
    ? `${tile.letter} — selected, position ${(orderNum??0)+1}`
    : "Hidden tile — tap to flip";
  return (
    <button
      onClick={isFound?undefined:()=>{ soundManager.select(); onClick(); }}
      disabled={isFound}
      aria-label={label}
      aria-pressed={isFlipped && !isFound}
      style={{
        width:"100%",aspectRatio:"1",perspective:"600px",
        cursor:isFound?"default":"pointer",
        background:"none",border:"none",padding:0,
        borderRadius:10,
        outline:"none",
        transition:"box-shadow 0.15s",
      }}
      onFocus={e => { if(!isFound) e.currentTarget.style.boxShadow="0 0 0 3px #00F5C4"; }}
      onBlur={e => { e.currentTarget.style.boxShadow="none"; }}
    >
      <div style={{
        position:"relative",width:"100%",height:"100%",transformStyle:"preserve-3d",
        animation: isFound?"tileVanish 0.5s cubic-bezier(.4,0,.2,1) 0.15s both":isHint?"hintWiggle 0.4s ease 4":"none",
        transition: isFound?"none":"transform 0.22s cubic-bezier(.4,2,.6,1)",
        transform: isFlipped?"rotateY(180deg)":"rotateY(0deg)",
        boxShadow: isHint?"0 0 16px #00F5C4AA":"none",
        borderRadius:10,
      }}>
        <div style={{
          position:"absolute",inset:0,backfaceVisibility:"hidden",
          // X-ray: the card doesn't flip — it goes dark like radiograph film
          // and the letter glows through in pale blue, like a bone.
          // NOTE: gradient + dots all live in backgroundImage layers. Mixing the
          // `background` shorthand with backgroundImage makes React drop the dot
          // layer when the shorthand changes (tiles stayed "flat" after x-ray).
          borderRadius:10,border: isXray?"2px solid #4FC3F7":"2px solid #2a4060",
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow: isXray?"0 0 16px #4FC3F766, inset 0 0 22px #4FC3F722":"0 2px 8px #00000066",
          backgroundImage:`radial-gradient(circle at 30% 30%, #1e3048 1px, transparent 1px),radial-gradient(circle at 70% 70%, #1e3048 1px, transparent 1px),${isXray?"linear-gradient(135deg,#050f1c 0%,#03111f 100%)":"linear-gradient(135deg,#162030 0%,#0D1B2A 100%)"}`,
          backgroundSize:"12px 12px, 12px 12px, 100% 100%",
          transition:"border 0.25s, box-shadow 0.25s",
        }}>
          {isXray ? (
            <span style={{
              fontFamily:"'JetBrains Mono',monospace",
              fontSize:"clamp(1.1rem,3.5vw,1.8rem)",fontWeight:800,letterSpacing:"0.05em",
              color:"#9BE8FF",
              textShadow:"0 0 8px #4FC3F7, 0 0 20px #4FC3F788",
              filter:"blur(0.3px)",
              animation:"xrayPulse 1.3s ease both",
            }}>{tile.letter}</span>
          ) : (
            <span style={{color:"#1e3048",fontSize:"1.4em",fontWeight:900}}>✦</span>
          )}
        </div>
        <div style={{
          position:"absolute",inset:0,backfaceVisibility:"hidden",
          transform:"rotateY(180deg)",borderRadius:10,
          background: isError?"#FF5E5B":remoteColor&&isFlipped&&!isFound?remoteColor+"28":isSelected?"linear-gradient(135deg,#FFB703,#ffcf40)":isFound&&foundInOrder?"linear-gradient(135deg,#00c49f,#00F5C4)":isFound?"linear-gradient(135deg,#c9a800,#FFB703)":"#F5EDD6",
          border: remoteColor&&isFlipped&&!isFound?`2.5px solid ${remoteColor}`:isSelected?"2.5px solid #FFB703":isFound&&foundInOrder?"2.5px solid #00F5C4":isFound?"2.5px solid #FFB703":"2px solid #c8bca0",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          boxShadow:remoteColor&&isFlipped&&!isFound?`0 0 14px ${remoteColor}55`:isSelected?"0 0 16px #FFB70388":"0 2px 8px #00000044",
          transition:"background 0.2s,box-shadow 0.2s,border 0.2s",
        }}>
          <span style={{
            fontFamily:"'JetBrains Mono',monospace",
            fontSize:"clamp(1.1rem,3.5vw,1.8rem)",fontWeight:800,
            color:isError?"#fff":isSelected?"#3d2800":isFound&&!foundInOrder?"#3d2800":"#0D1B2A",letterSpacing:"0.05em",
          }}>{tile.letter}</span>
          {isFlipped&&!isFound&&orderNum!==undefined&&(
            <span style={{position:"absolute",bottom:4,right:6,fontSize:"0.55em",fontWeight:700,opacity:0.4,color:isSelected?"#3d2800":"#0D1B2A"}}>{orderNum+1}</span>
          )}
        </div>
      </div>
    </button>
  );
}

// ─── Reveal Phase (daily challenge intro) ────────────────────────────────────
function RevealGrid({ words, tiles, maxTurns, onDone }) {
  const [phase, setPhase] = useState('show'); // show | flip | shuffle
  const SHUFFLE_MS = 650;

  // Shuffled position of each tile in the final 4×4 grid
  const shuffledPos = useMemo(() => {
    const m = {};
    tiles.forEach((t, i) => { m[t.id] = { r: Math.floor(i / 4), c: i % 4 }; });
    return m;
  }, [tiles]);

  // Show words (face up, in order) → flip face down in place → shuffle while
  // face down → done. The board is never face-up while scrambled, so there's
  // no frame to screenshot for the answers.
  useEffect(() => {
    const t = setTimeout(() => setPhase('flip'), 1100);
    return () => clearTimeout(t);
  }, []);
  useEffect(() => {
    if (phase !== 'flip') return;
    const t = setTimeout(() => setPhase('shuffle'), 520); // let the flip finish
    return () => clearTimeout(t);
  }, [phase]);
  useEffect(() => {
    if (phase !== 'shuffle') return;
    const t = setTimeout(onDone, SHUFFLE_MS + 120);
    return () => clearTimeout(t);
  }, [phase]);

  // If user switches away (e.g. to screenshot on Android), skip reveal immediately
  useEffect(() => {
    const skip = () => { if (document.visibilityState !== 'visible') onDone(); };
    document.addEventListener('visibilitychange', skip);
    return () => document.removeEventListener('visibilitychange', skip);
  }, []);

  // Tiles appear in word order during show + flip, then slide to shuffled spots.
  const sorted = phase === 'show' || phase === 'flip';
  const faceDown = phase === 'flip' || phase === 'shuffle';

  return (
    <div style={{width:"100%",maxWidth:480,margin:"0 auto"}}>
      {/* Score header — static initial values, matches GameBoard exactly */}
      <div style={{marginBottom:8}}>
        <div style={{position:"relative",textAlign:"center",marginBottom:6}}>
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(1.4rem,5vw,2rem)",fontWeight:900,color:"#FFB703",display:"inline-block"}}>0</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#3a5570",fontSize:"0.7rem",marginLeft:4}}>pts</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
            Turns: <strong style={{color:"#FFB703"}}>{maxTurns}</strong> left
          </span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
            Found: <strong style={{color:"#00F5C4"}}>0/{words.length}</strong>
          </span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:"#7a9cc0"}}>⏱ 0:00</span>
        </div>
      </div>
      <FoundWordBanner words={words} wordResults={{}} />
      {/* Empty flash message area — same height as real board */}
      <div style={{height:28,marginBottom:4}} />
      {/* Tile board — same container as real game board */}
      <div style={{
        padding:"clamp(4px,2vw,12px)",
        background:"#0a1520",borderRadius:16,border:"1.5px solid #1e3048",
        boxShadow:"0 4px 32px #00000055",
      }}>
        <div style={{position:'relative',paddingBottom:'100%',userSelect:'none',WebkitUserSelect:'none'}}>
          <div style={{position:'absolute',inset:0}}>
            {tiles.map(tile => {
              const [wi, li] = tile.id.split('-').map(Number);
              const sp = shuffledPos[tile.id];
              // During 'show': tile visually appears at sorted pos (row=wi, col=li)
              // but is laid out at its shuffled pos (sp.r, sp.c).
              // Offset via transform so it looks sorted; removing it = scramble.
              const dC = li - sp.c;
              const dR = wi - sp.r;
              return (
                <div key={tile.id} style={{
                  position:'absolute',
                  left:`${sp.c * 25}%`, top:`${sp.r * 25}%`,
                  width:'25%', height:'25%',
                  padding:'clamp(2px,0.75vw,5px)',
                  boxSizing:'border-box',
                  transform: sorted ? `translate(${dC*100}%,${dR*100}%)` : 'translate(0,0)',
                  transition: phase==='shuffle'
                    ? `transform ${SHUFFLE_MS}ms cubic-bezier(.4,0,.6,1)`
                    : 'none',
                }}>
                  <div style={{width:'100%',height:'100%',perspective:'600px'}}>
                    <div style={{
                      width:'100%',height:'100%',
                      transformStyle:'preserve-3d',
                      transition: phase==='flip' ? 'transform 0.45s cubic-bezier(.4,0,.2,1)' : 'none',
                      transform: faceDown ? 'rotateY(180deg)' : 'rotateY(0deg)',
                    }}>
                      {/* Face-up: gold selected-tile look, same as tapped tiles in game */}
                      <div style={{
                        position:'absolute',inset:0,backfaceVisibility:'hidden',
                        background:'linear-gradient(135deg,#FFB703,#ffcf40)',
                        borderRadius:10,border:'2.5px solid #FFB703',
                        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                        boxShadow:'0 0 16px #FFB70388',
                      }}>
                        <span style={{
                          fontFamily:"'JetBrains Mono',monospace",
                          fontSize:'clamp(1.1rem,3.5vw,1.8rem)',fontWeight:800,
                          color:'#3d2800',letterSpacing:'0.05em',
                        }}>{tile.letter}</span>
                        <span style={{
                          position:'absolute',bottom:4,right:6,
                          fontSize:'0.55em',fontWeight:700,opacity:0.4,color:'#3d2800',
                        }}>{li+1}</span>
                      </div>
                      {/* Face-down: identical to real tile card back */}
                      <div style={{
                        position:'absolute',inset:0,backfaceVisibility:'hidden',
                        transform:'rotateY(180deg)',borderRadius:10,
                        background:'linear-gradient(135deg,#162030 0%,#0D1B2A 100%)',
                        border:'2px solid #2a4060',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        boxShadow:'0 2px 8px #00000066',
                        backgroundImage:`radial-gradient(circle at 30% 30%, #1e3048 1px, transparent 1px),radial-gradient(circle at 70% 70%, #1e3048 1px, transparent 1px)`,
                        backgroundSize:'12px 12px',
                      }}>
                        <span style={{color:'#1e3048',fontSize:'1.4em',fontWeight:900}}>✦</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Game Board ───────────────────────────────────────────────────────────────
function GameBoard({ words, onWin, timeLimit, onTimeUp, maxTurns, isDaily }) {
  const cols = words.length===4?4:6;
  // Resume an in-progress daily so leaving mid-game continues instead of restarting.
  const savedProg = isDaily ? getDailyProgress() : null;
  const [tiles] = useState(()=> savedProg ? savedProg.tiles : buildTiles(words));
  // A resumed game already showed its reveal — skip straight to the board.
  const [showReveal, setShowReveal] = useState(!!isDaily && !savedProg);
  const [flipped, setFlipped] = useState([]);
  const [found, setFound] = useState(()=> savedProg ? savedProg.found : []);
  const [foundTileIds, setFoundTileIds] = useState(()=> savedProg ? new Set(savedProg.foundTileIds) : new Set());
  const [error, setError] = useState([]);
  const [turns, setTurns] = useState(()=> savedProg ? savedProg.turns : 0);
  const [hadError, setHadError] = useState(false);
  const [wrongGuesses, setWrongGuesses] = useState(()=> savedProg ? savedProg.wrongGuesses : 0);
  const [wordResults, setWordResults] = useState(()=> savedProg ? savedProg.wordResults : {});
  const [foundInOrderSet, setFoundInOrderSet] = useState(()=> savedProg ? new Set(savedProg.foundInOrderSet) : new Set());
  const [foundBonusWords, setFoundBonusWords] = useState(()=> savedProg ? savedProg.foundBonusWords : []);
  const [lastBonusWord, setLastBonusWord] = useState("");
  const [bonusPts, setBonusPts] = useState(()=> savedProg ? savedProg.bonusPts : 0);
  const [elapsed, setElapsed] = useState(()=> savedProg ? savedProg.elapsed : 0);
  const [started, setStarted] = useState(()=> savedProg ? savedProg.started : false);
  const [flash, setFlash] = useState(null);
  const [outOfTurns, setOutOfTurns] = useState(false);
  const [floatingScores, setFloatingScores] = useState([]);
  const [scorePop, setScorePop] = useState(false);
  // Shop power-ups (bought in the Token Shop, counts held per-device)
  const [invHint, setInvHint] = useState(() => getInv('wf_inv_hint'));
  const [invXray, setInvXray] = useState(() => getInv('wf_inv_xray'));
  const [hintTileId, setHintTileId] = useState(null);   // tile currently wiggling
  const [xrayArmed, setXrayArmed] = useState(false);    // next tap peeks instead of flips
  const [xrayTiles, setXrayTiles] = useState(new Set()); // tiles briefly revealed
  const timerRef = useRef(null);
  const startRef = useRef(null);
  const floatIdRef = useRef(0);
  const hasEndedRef = useRef(false); // prevents double onWin calls
  const stateRef = useRef({});       // always holds latest state values
  const processingRef = useRef(false); // hard lock during 4-tile processing
  const flippedRef = useRef([]);       // always-current mirror of flipped state
  const foundTileIdsRef = useRef(new Set()); // always-current mirror
  const dismissTimerRef = useRef(null);    // auto-flip-back timer for a wrong guess
  const awaitingDismissRef = useRef(false); // true while a wrong guess lingers (tap to dismiss)

  useEffect(()=>{
    if (!started) return;
    startRef.current = Date.now()-elapsed;
    timerRef.current = setInterval(()=>{
      const e = Date.now()-startRef.current;
      setElapsed(e);
      if (timeLimit && e>=timeLimit*1000) { clearInterval(timerRef.current); onTimeUp&&onTimeUp(); }
    },200);
    return ()=>clearInterval(timerRef.current);
  },[started]);

  // Auto-save daily progress on every meaningful change so a mid-game exit resumes.
  // Gated on `started` (first flip) so merely peeking at the challenge and backing
  // out doesn't commit you — but once you've begun guessing, you can't restart.
  useEffect(()=>{
    if (!isDaily || !started || hasEndedRef.current) return;
    saveDailyProgress({
      tiles, found, foundTileIds:[...foundTileIds], turns, wrongGuesses,
      wordResults, foundInOrderSet:[...foundInOrderSet],
      foundBonusWords, bonusPts, elapsed:stateRef.current.elapsed||elapsed, started,
    });
  },[found, foundTileIds, turns, wrongGuesses, wordResults, foundInOrderSet, foundBonusWords, bonusPts, started]);

  // Keep the saved elapsed time roughly current (within ~5s) while playing.
  useEffect(()=>{
    if (!isDaily || !started) return;
    const t = setInterval(()=>{
      if (hasEndedRef.current) return;
      const prog = getDailyProgress();
      if (prog) saveDailyProgress({...prog, elapsed:stateRef.current.elapsed||elapsed});
    }, 5000);
    return ()=>clearInterval(t);
  },[isDaily, started]);

  // safeOnWin: can only fire once per game, always uses fresh state from stateRef
  function safeOnWin(extraProps={}) {
    if (hasEndedRef.current) return;
    hasEndedRef.current = true;
    clearInterval(timerRef.current);
    if (isDaily) clearDailyProgress(); // game finished — no resume next time
    setFlipped([]);
    setError([]);
    setFlash(null);
    const s = stateRef.current;
    setTimeout(()=>onWin({
      turns:s.turns, elapsed:s.elapsed, words:s.words,
      wordResults:s.wordResults, wrongGuesses:s.wrongGuesses,
      bonusPts:s.bonusPts, bonusWords:s.foundBonusWords, ...extraProps
    }), 600);
  }

  useEffect(()=>{
    if (found.length===words.length) {
      soundManager.complete();
      safeOnWin();
    }
  },[found]);

  useEffect(()=>{
    // Only trigger if words remain unfound (found effect handles the win case)
    if (maxTurns && turns >= maxTurns && stateRef.current.found.length < words.length) {
      setOutOfTurns(true);
      safeOnWin({outOfTurns:true});
    }
  },[turns]);

  // Keep refs fresh — these are used in handleTileClick guards (never stale)
  stateRef.current = {turns,elapsed,words,wordResults,wrongGuesses,bonusPts,found,foundBonusWords};
  foundTileIdsRef.current = foundTileIds;
  const timeLeft = timeLimit ? Math.max(0,timeLimit-Math.floor(elapsed/1000)) : null;

  function unlock() {
    processingRef.current = false;
    awaitingDismissRef.current = false;
    clearTimeout(dismissTimerRef.current);
    flippedRef.current = [];
    setFlipped([]);
    setError([]);
    setFlash(null);
  }

  // Tap anywhere to flip a lingering wrong guess back early.
  function dismissGuess() {
    if (!awaitingDismissRef.current) return;
    unlock();
  }

  // Daily challenge allows DAILY_HELP_LIMIT combined helps per day; solo is unlimited.
  const [dailyHelpsUsed, setDailyHelpsUsed] = useState(() => isDaily ? getDailyHelps() : 0);
  const helpsLeft = isDaily ? Math.max(0, DAILY_HELP_LIMIT - dailyHelpsUsed) : Infinity;

  // 💡 Hint: infer which word you're building from the letters you've flipped
  // (order doesn't matter), then wiggle a tile for that word's next missing letter.
  //   B flipped, BOWL unfound   → wiggles an O (next letter in order)
  //   O+W flipped, any order    → still infers BOWL, wiggles the B
  //   B flipped, BOWL AND BANK  → either is a fair answer; first match wins
  //   nothing flipped           → first unsolved word's first letter
  function useHint() {
    if (getInv('wf_inv_hint') < 1 || helpsLeft < 1) return;
    if (processingRef.current || hasEndedRef.current) return;
    const s = stateRef.current;
    const unfound = words.map((_, i) => i).filter(i => !s.found.includes(i));
    if (!unfound.length) return;
    const flippedNow = flippedRef.current;
    const flippedLetters = flippedNow.map(id => tiles.find(t => t.id === id)?.letter).filter(Boolean);

    // Candidate: first unfound word whose letters contain the flipped selection
    // as a sub-multiset. If the selection matches nothing, fall back to the
    // first unsolved word so the hint is still useful.
    const containsSelection = (word) => {
      const pool = {};
      flippedLetters.forEach(l => { pool[l] = (pool[l] || 0) + 1; });
      let unmatched = flippedLetters.length;
      [...word].forEach(l => { if (pool[l] > 0) { pool[l]--; unmatched--; } });
      return unmatched === 0;
    };
    const targetWi = unfound.find(i => containsSelection(words[i])) ?? unfound[0];
    const word = words[targetWi];

    // Next missing letter: walk the word in order, crossing off letters the
    // player already has flipped; the first letter not covered is the hint.
    const pool = {};
    flippedLetters.forEach(l => { pool[l] = (pool[l] || 0) + 1; });
    let hintPos = -1;
    for (let p = 0; p < word.length; p++) {
      if (pool[word[p]] > 0) pool[word[p]]--;
      else { hintPos = p; break; }
    }
    if (hintPos === -1) return; // selection already covers the whole word — no hint needed

    // Wiggle the target word's own tile for that letter, skipping any position
    // that's already face-up (duplicate letters can sit at several positions).
    let tid = null;
    for (let q = 0; q < word.length; q++) {
      if (word[q] === word[hintPos] && !flippedNow.includes(`${targetWi}-${q}`)) { tid = `${targetWi}-${q}`; break; }
    }
    if (!tid) return;
    setInvHint(addInv('wf_inv_hint', -1));
    syncUseItem('hint'); // account-level consume (no-op for guests)
    if (isDaily) setDailyHelpsUsed(addDailyHelps(1));
    setHintTileId(tid);
    setTimeout(() => setHintTileId(null), 1600);
  }

  function handleTileClick(tile) {
    // 🔍 X-ray peek: when armed, this tap reveals the tile briefly instead of
    // flipping it. Pure early-return — does not count as a flip or a turn.
    if (xrayArmed) {
      setXrayArmed(false);
      if (processingRef.current || hasEndedRef.current) return;
      if (foundTileIdsRef.current.has(tile.id) || flippedRef.current.includes(tile.id)) return;
      if (getInv('wf_inv_xray') < 1 || helpsLeft < 1) return;
      setInvXray(addInv('wf_inv_xray', -1));
      syncUseItem('xray'); // account-level consume (no-op for guests)
      if (isDaily) setDailyHelpsUsed(addDailyHelps(1));
      setXrayTiles(new Set([tile.id]));
      setTimeout(() => setXrayTiles(new Set()), 1300);
      return;
    }

    // Ref-based guards — always current, never stale, immune to React batching
    if (processingRef.current) return;
    if (hasEndedRef.current) return;
    if (foundTileIdsRef.current.has(tile.id)) return;
    if (flippedRef.current.length >= 4) return;
    if (flippedRef.current.includes(tile.id)) return;

    if (!started) setStarted(true);

    // Update ref immediately (sync) then state (async for render)
    flippedRef.current = [...flippedRef.current, tile.id];
    const newFlipped = flippedRef.current;
    setFlipped([...newFlipped]);
    soundManager.flip();

    if (newFlipped.length === 4) {
      // Lock immediately — prevents ANY further input until we unlock
      processingRef.current = true;
      setTurns(t=>t+1);

      const ft = newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters = ft.map(t=>t.letter);
      const sorted = [...letters].sort().join("");
      const s = stateRef.current;
      const matchIdx = words.findIndex((w,i)=>!s.found.includes(i)&&[...w].sort().join("")===sorted);

      if (matchIdx===-1) {
        // Check for bonus word
        const bonusWord = ALL_WORDS_4.flat().find(w=>
          !words.includes(w) && [...w].sort().join("")===sorted
        );
        if (bonusWord && !foundBonusWords.includes(bonusWord)) {
          soundManager.bonus();
          const bfid = ++floatIdRef.current;
          setFloatingScores(prev=>[...prev,{id:bfid,pts:50,color:"#9B5DE5"}]);
          setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==bfid)),1500);
          setFoundBonusWords(b=>[...b,bonusWord]);
          setLastBonusWord(bonusWord);
          setBonusPts(p=>p+50);
          setFlash("bonus");
          setTimeout(()=>unlock(), 1200);
          return;
        }
        // Bad guess — linger so the player can read the four letters, then flip
        // back. They can tap anywhere to dismiss sooner (see dismissGuess).
        setError(newFlipped); setFlash("bad"); setHadError(true); setWrongGuesses(g=>g+1);
        soundManager.wrong();
        // Arm tap-to-dismiss after a short grace period so the tap that made
        // this 4th flip doesn't instantly dismiss it.
        setTimeout(()=>{ awaitingDismissRef.current = true; }, 400);
        dismissTimerRef.current = setTimeout(()=>unlock(), 2200);
        return;
      }

      // Valid word found!
      const inOrder = letters.join("") === words[matchIdx];
      const pts = inOrder ? 300 : 100;
      const floatColor = inOrder ? "#00F5C4" : "#FFB703";
      inOrder ? soundManager.wordGreen() : soundManager.wordYellow();
      const fid = ++floatIdRef.current;
      setFloatingScores(prev=>[...prev,{id:fid,pts,color:floatColor}]);
      setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==fid)),1150);
      setFlash(inOrder ? "good" : "goodYellow");
      setTimeout(()=>{
        setFound(f=>[...f,matchIdx]);
        setWordResults(prev=>({...prev,[matchIdx]:inOrder?"green":"yellow"}));
        if (inOrder) setFoundInOrderSet(prev=>new Set([...prev,...newFlipped]));
        // Add to found tile ids ref so future guards block them immediately
        const newFoundIds = new Set([...foundTileIdsRef.current,...newFlipped]);
        foundTileIdsRef.current = newFoundIds;
        setFoundTileIds(newFoundIds);
        setHadError(false);
        setScorePop(true); setTimeout(()=>setScorePop(false),400);
        unlock(); // clears flipped, error, flash, releases lock
      },420);
    }
  }

  if (showReveal) {
    return <RevealGrid words={words} tiles={tiles} maxTurns={maxTurns} onDone={() => setShowReveal(false)} />;
  }

  return (
    <div style={{width:"100%",maxWidth:480,margin:"0 auto"}} onClick={dismissGuess}>
      {(() => {
        const turnsLeft = maxTurns ? maxTurns - turns : null;
        const turnsDanger = turnsLeft !== null && turnsLeft <= 3;
        const wr = Object.values(wordResults);
        const liveScore = wr.filter(r=>r==="green").length*300 + wr.filter(r=>r==="yellow").length*100 + bonusPts;
        return (
          <div style={{marginBottom:8}}>
            {/* Score row — prominent center with floating animation target */}
            <div style={{position:"relative", textAlign:"center", marginBottom:6}}>
              <FloatingScore items={floatingScores} />
              <span style={{
                fontFamily:"'Fraunces',serif",
                fontSize:"clamp(1.4rem,5vw,2rem)",
                fontWeight:900,
                color:"#FFB703",
                animation: scorePop ? "scorePop 0.4s cubic-bezier(.4,2,.6,1)" : "none",
                display:"inline-block",
                transition:"color 0.2s",
              }}>
                {liveScore.toLocaleString()}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#3a5570",fontSize:"0.7rem",marginLeft:4}}>pts</span>
            </div>
            {/* Stats row */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
                {maxTurns ? (
                  <>Turns: <strong aria-live={turnsDanger?"assertive":"off"} style={{color:turnsLeft<=3?"#FF5E5B":"#FFB703",transition:"color 0.3s"}}>{turnsLeft}</strong> left</>
                ) : (
                  <>Guesses: <strong style={{color:"#FFB703"}}>{turns}</strong></>
                )}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
                Found: <strong style={{color:"#00F5C4"}}>{found.length}/{words.length}</strong>
              </span>
              <span
                aria-live={timeLeft!==null&&timeLeft<15?"assertive":"off"}
                style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:timeLeft!==null&&timeLeft<15?"#FF5E5B":"#7a9cc0"}}
              >
                {timeLeft!==null?`⏱ ${timeLeft}s`:`⏱ ${formatTime(elapsed)}`}
              </span>
            </div>
          </div>
        );
      })()}
      <FoundWordBanner words={words} wordResults={wordResults} />
      <div
        aria-live="polite"
        aria-atomic="true"
        style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:4}}
      >
        {flash&&(
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"0.95rem",fontWeight:700,animation:"fadeInOut 0.5s ease",
            color:flash==="good"?"#00F5C4":flash==="goodYellow"?"#FFB703":flash==="bonus"?"#9B5DE5":"#FF5E5B"}}>
            {flash==="good"&&"🟩 Nice — bonus points!"}
            {flash==="goodYellow"&&"🟨 Found! Try in order for more pts"}
            {flash==="bonus"&&`✨ Bonus word: ${lastBonusWord.toUpperCase()}! +50 pts`}
            {flash==="bad"&&"✗ Not a valid word here"}
          </span>
        )}
      </div>
      {/* Power-up row — only shows when the player owns items (bought in the shop) */}
      {(invHint>0||invXray>0||xrayArmed)&&(()=>{
        const hintOk = invHint>0 && helpsLeft>0;
        const xrayOk = invXray>0 && helpsLeft>0;
        return (
          <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center",marginBottom:6}}>
            <button onClick={useHint} disabled={!hintOk}
              style={{...btnStyle(hintOk?"#0e2a3a":"#0a1520",hintOk?"#00F5C4":"#2a4060"),padding:"6px 12px",fontSize:"0.72rem",border:`1.5px solid ${hintOk?"#00F5C455":"#1e3048"}`,borderRadius:10}}>
              💡 Hint ×{invHint}
            </button>
            <button onClick={()=>setXrayArmed(a=>!a)} disabled={!xrayOk&&!xrayArmed}
              style={{...btnStyle(xrayArmed?"#2a1a3e":xrayOk?"#0e2a3a":"#0a1520",xrayArmed?"#9B5DE5":xrayOk?"#00F5C4":"#2a4060"),padding:"6px 12px",fontSize:"0.72rem",border:`1.5px solid ${xrayArmed?"#9B5DE5":xrayOk?"#00F5C455":"#1e3048"}`,borderRadius:10}}>
              {xrayArmed?"🔍 Tap a tile…":`🔍 X-ray ×${invXray}`}
            </button>
            {isDaily&&(
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.62rem",color:helpsLeft>0?"#3a5570":"#FF5E5B"}}>
                {helpsLeft>0?`${helpsLeft} left today`:"daily limit reached"}
              </span>
            )}
          </div>
        );
      })()}
      <div
        role="grid"
        aria-label="WordFlip game board"
        style={{
          display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,
          gap:"clamp(4px,1.5vw,10px)",padding:"clamp(4px,2vw,12px)",
          background:"#0a1520",borderRadius:16,border:"1.5px solid #1e3048",
          boxShadow:"0 4px 32px #00000055",
        }}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile}
            isFlipped={flipped.includes(tile.id)}
            isFound={foundTileIds.has(tile.id)}
            foundInOrder={foundInOrderSet.has(tile.id)}
            isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)}
            isError={error.includes(tile.id)}
            isHint={hintTileId===tile.id}
            isXray={xrayTiles.has(tile.id)}
            onClick={()=>handleTileClick(tile)}
            orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined}
          />
        ))}
      </div>
      <p style={{textAlign:"center",color:"#2a4060",fontSize:"0.75rem",marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>{maxTurns?`${maxTurns} turns max · `:""}🟩 +300 · 🟨 +100 · time & accuracy bonus revealed at end</p>
    </div>
  );
}

// ─── Count-up number animation ──────────────────────────────────────────────────────
function CountUp({ to, active, color, large, unit = "pts" }) {
  const [val, setVal] = useState(0);
  const [big, setBig] = useState(false);
  const started = useRef(false);
  useEffect(() => {
    if (!active || started.current) return;
    started.current = true;
    if (to === 0) { setVal(0); return; }
    const DURATION = large ? 800 : 620;
    const FRAMES  = large ? 32 : 26;
    let frame = 0;
    const id = setInterval(() => {
      frame++;
      const p = 1 - Math.pow(1 - frame / FRAMES, 3); // cubic ease-out
      setVal(frame >= FRAMES ? to : Math.round(p * to));
      if (frame >= FRAMES) {
        clearInterval(id);
        setBig(true);
        setTimeout(() => setBig(false), large ? 400 : 300);
      }
    }, Math.round(DURATION / FRAMES));
    return () => clearInterval(id);
  }, [active]);
  const popScale = large ? 1.45 : 1.38;
  return (
    <span style={{
      fontFamily: large ? "'Fraunces',serif" : "'JetBrains Mono',monospace",
      fontWeight: 900, color,
      fontSize: large ? "1.6rem" : "0.88rem",
      display: "inline-block",
      transform: big ? `scale(${popScale})` : "scale(1)",
      transition: "transform 0.22s cubic-bezier(.4,2,.6,1)",
    }}>
      +{val.toLocaleString()}{large && unit && <span style={{fontSize:"0.85rem",fontWeight:700}}> {unit}</span>}
    </span>
  );
}

// ─── Firework burst helper ────────────────────────────────────────────────────
function Firework({ color, trigger, large }) {
  const [particles, setParticles] = useState([]);
  const fired = useRef(false);
  useEffect(() => {
    if (!trigger || fired.current) return;
    fired.current = true;
    const count = large ? 22 : 12;
    setParticles(Array.from({ length: count }, (_, i) => {
      const angle = (i / count) * 2 * Math.PI;
      const dist = (large ? 58 : 32) + Math.random() * (large ? 28 : 14);
      return { id: i, tx: Math.cos(angle) * dist, ty: Math.sin(angle) * dist };
    }));
    const t = setTimeout(() => setParticles([]), 900);
    return () => clearTimeout(t);
  }, [trigger]);
  const sz = large ? 9 : 5;
  return particles.map(p => (
    <div key={p.id} style={{
      position:"absolute", width:sz, height:sz, borderRadius:"50%",
      background:color, boxShadow:`0 0 ${sz+2}px ${color}`,
      top:"50%", right:0, marginTop:-(sz/2),
      "--fw-tx":p.tx+"px", "--fw-ty":p.ty+"px",
      animation:"fwParticle 0.72s ease-out forwards", pointerEvents:"none", zIndex:20,
    }} />
  ));
}

// ─── Score Receipt ─────────────────────────────────────────────────────────────────────────────────
function ScoreReceipt({ wordResults, elapsed, wrongGuesses, turns, score, bonusPts = 0, bonusWords = [], coins = 0, coinsFormula = "" }) {
  const greens = wordResults.filter(r=>r==="green").length;
  const yellows = wordResults.filter(r=>r==="yellow").length;
  const wordPts  = greens*300 + yellows*100;
  const timePts  = Math.max(0, 600 - Math.floor(elapsed/1000));
  const guessPts = Math.max(0, 800 - wrongGuesses*50);

  const timeFormula  = timePts > 0 ? `${timePts}s to spare` : "just in time!";
  const accuracyCredits = Math.round(guessPts / 50);
  const guessFormula = `${accuracyCredits} remaining guesses × 50 pts`;

  const rows = [
    { icon:"🔤", label:`Words (${greens}🟩 ${yellows}🟨)`,
      formula: yellows > 0 ? `${greens}×300 + ${yellows}×100` : `${greens}×300`,
      pts:wordPts,  color:"#00F5C4" },
    ...(bonusPts > 0 ? [
      { icon:"✨", label:"Bonus words",
        formula: (bonusWords && bonusWords.length)
          ? `${bonusWords.map(w=>w.toUpperCase()).join(", ")} · ${bonusWords.length}×50`
          : `${Math.round(bonusPts/50)}×50`,
        pts:bonusPts, color:"#FFB703" },
    ] : []),
    { icon:"⏱", label:"Time bonus",
      formula:timeFormula,
      pts:timePts,  color:"#9B5DE5" },
    { icon:"🎯", label:"Accuracy bonus",
      formula:guessFormula,
      pts:guessPts, color:"#00BBF9" },
  ];

  const ROW_MS   = 1200;
  const FW_AFTER = 700;
  const [visibleCount, setVisibleCount] = useState(0);
  const [firedSet,     setFiredSet]     = useState(new Set());

  useEffect(() => {
    const timers = [];
    const fire = key => setFiredSet(s => { const n = new Set(s); n.add(key); return n; });
    rows.forEach((_, i) => {
      timers.push(setTimeout(() => setVisibleCount(v => Math.max(v, i+1)), 300 + i*ROW_MS));
      timers.push(setTimeout(() => fire(i),                                300 + i*ROW_MS + FW_AFTER));
    });
    const totalShow = 300 + rows.length * ROW_MS;
    timers.push(setTimeout(() => setVisibleCount(rows.length + 1), totalShow));
    timers.push(setTimeout(() => fire("total"),                    totalShow + 900));
    // Coins earned reveals last, after the total has landed
    if (coins > 0) {
      timers.push(setTimeout(() => setVisibleCount(rows.length + 2), totalShow + 1400));
      timers.push(setTimeout(() => fire("coins"),                    totalShow + 2100));
    }
    return () => timers.forEach(clearTimeout);
  }, []);

  const totalVisible = visibleCount > rows.length;
  const coinsVisible = visibleCount > rows.length + 1;

  return (
    <div style={{background:"#0a1520", border:"1.5px solid #1e3048", borderRadius:14, padding:"16px 18px", marginBottom:20, textAlign:"left"}}>
      {rows.map((row, i) => {
        const visible = visibleCount > i;
        return (
          <div key={row.label} style={{
            marginBottom:10, opacity:visible?1:0,
            transform:visible?"translateX(0)":"translateX(-10px)",
            transition:"opacity 0.35s ease, transform 0.35s ease",
          }}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#7a9cc0", fontSize:"0.78rem"}}>
                {row.icon} {row.label}
              </span>
              <div style={{position:"relative", display:"flex", alignItems:"center", flexShrink:0, marginLeft:12}}>
                <Firework color={row.color} trigger={firedSet.has(i)} />
                <CountUp to={row.pts} active={visible} color={row.color} />
              </div>
            </div>
            <div style={{fontFamily:"'JetBrains Mono',monospace", color:"#3a5570", fontSize:"0.68rem", marginTop:3, paddingLeft:"1.4em"}}>
              {row.formula}
            </div>
          </div>
        );
      })}
      <div style={{
        borderTop:"1.5px dashed #1e3048", marginTop:10, paddingTop:10,
        display:"flex", justifyContent:"space-between", alignItems:"center",
        opacity:totalVisible?1:0,
        transform:totalVisible?"scale(1)":"scale(0.88)",
        transition:"opacity 0.4s cubic-bezier(.4,2,.6,1), transform 0.4s cubic-bezier(.4,2,.6,1)",
      }}>
        <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#7a9cc0", fontSize:"0.78rem", fontWeight:700}}>TOTAL</span>
        <div style={{position:"relative", display:"flex", alignItems:"center"}}>
          <Firework color="#FFB703" trigger={firedSet.has("total")} large />
          <CountUp to={score} active={totalVisible} color="#FFB703" large />
        </div>
      </div>
      {coins > 0 && (
        <div style={{
          marginTop:12, paddingTop:12, borderTop:"1.5px solid #1e304833",
          display:"flex", justifyContent:"space-between", alignItems:"center",
          opacity:coinsVisible?1:0,
          transform:coinsVisible?"scale(1)":"scale(0.88)",
          transition:"opacity 0.4s cubic-bezier(.4,2,.6,1), transform 0.4s cubic-bezier(.4,2,.6,1)",
        }}>
          <div>
            <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#00F5C4", fontSize:"0.78rem", fontWeight:700}}>🪙 COINS EARNED</span>
            {coinsFormula && (
              <div style={{fontFamily:"'JetBrains Mono',monospace", color:"#3a5570", fontSize:"0.66rem", marginTop:3}}>{coinsFormula}</div>
            )}
          </div>
          <div style={{position:"relative", display:"flex", alignItems:"center"}}>
            <Firework color="#00F5C4" trigger={firedSet.has("coins")} large />
            <CountUp to={coins} active={coinsVisible} color="#00F5C4" large unit="🪙" />
          </div>
        </div>
      )}
    </div>
  );
}


// ─── Win Screen ───────────────────────────────────────────────────────────────
function WinScreen({ result, mode, onPlayAgain, onMenu, isDaily, streak, streakBonus = 0, isNewBest, signedIn }) {
  const wordResultsArr = result.words.map((_,i) => result.wordResults?.[i] || (result.outOfTurns ? "missed" : "yellow"));
  const score = scoreCalc(result.elapsed, wordResultsArr, result.wrongGuesses, result.bonusPts||0);
  // Coins are only granted server-side when signed in, so only advertise them then.
  // streakBonus comes from handleWin (week-boundary crossing) so it matches the grant.
  const coins = !signedIn ? 0 : mode==="daily" ? dailyTokens(score) + streakBonus : mode==="solo" ? TOKENS.SOLO : 0;
  const coinsFormula = mode==="daily"
    ? (streakBonus ? `10% of ${score.toLocaleString()} pts + ${streakBonus} streak bonus` : `10% of ${score.toLocaleString()} pts`)
    : "win bonus";
  // Start the streak animation right after the receipt's coins row lands
  const receiptRows = 3 + ((result.bonusPts||0) > 0 ? 1 : 0);
  const streakDelay = 300 + receiptRows * 1200 + (coins > 0 ? 2600 : 1000);
  const prevBest = getPersonalBest();
  const computedNewBest = isDaily && score > prevBest;
  const showNewBest = isNewBest || computedNewBest;
  const [copied, setCopied] = useState(false);

  function handleShare() {
    const text = buildShareText(result.turns, result.elapsed, score, wordResultsArr, result.words.length);
    const shareData = { title:"WordFlip Daily", text };
    const tryClipboard = () => navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
      navigator.share(shareData).catch(tryClipboard);
    } else { tryClipboard(); }
  }

  return (
    <div role="main" aria-label="Game results" style={{textAlign:"center",maxWidth:400,margin:"0 auto",padding:20}}>
      <div aria-hidden="true" style={{fontSize:"3rem",marginBottom:8}}>{result.outOfTurns?"😬":"🎉"}</div>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"2rem",margin:"0 0 4px"}}>
        {result.outOfTurns?"Out of turns!":mode==="daily"?"Daily Complete!":"You Win!"}
      </h2>
      <p style={{color:"#7a9cc0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.9rem",marginBottom:16}}>
        {result.words.join(" · ")}
      </p>
      {isDaily&&showNewBest&&(
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0a2e24",border:"1.5px solid #00F5C4",borderRadius:20,padding:"5px 14px"}}>
            <span>🏆</span>
            <span style={{fontFamily:"'Fraunces',serif",color:"#00F5C4",fontWeight:700,fontSize:"0.9rem"}}>New personal best!</span>
          </div>
        </div>
      )}
      <ScoreReceipt
        wordResults={wordResultsArr}
        elapsed={result.elapsed}
        wrongGuesses={result.wrongGuesses||0}
        turns={result.turns}
        score={score}
        bonusPts={result.bonusPts||0}
        bonusWords={result.bonusWords||[]}
        coins={coins}
        coinsFormula={coinsFormula}
      />
      {isDaily&&(
        <div style={{marginBottom:20}}>
          <StreakCard animate delay={streakDelay} />
        </div>
      )}
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        {isDaily&&(
          <button onClick={handleShare} style={{...btnStyle(copied?"#00c49f":"#1e3048",copied?"#0a2e24":"#F5EDD6"),padding:"10px 20px"}}>
            {copied?"✓ Copied!":"📤 Share"}
          </button>
        )}
        {!isDaily&&(
          <button onClick={onPlayAgain} style={btnStyle("#00F5C4","#0a2e24")}>Play Again</button>
        )}
        <button onClick={onMenu} style={btnStyle("#1e3048","#F5EDD6")}>Menu</button>
      </div>
    </div>
  );
}

                    <div style={{fontFamily:"'JetBrains Mono',monospace",color:isMe?"#9B5DE5":"#F5EDD6",fontSize:"0.82rem",fontWeight:isMe?700:400}}>
