// Route REST/Auth fetches through a same-origin Netlify proxy so Edge/Safari
// tracking prevention doesn't treat them as third-party. Realtime uses a
// WebSocket (not fetch), so it stays on the direct SUPABASE_URL and is untouched.
function sbProxyFetch(input, init) {
  let url = typeof input === 'string' ? input : (input && input.url);
  if (url && url.startsWith(SUPABASE_URL)) {
    const proxied = '/sb-proxy' + url.slice(SUPABASE_URL.length);
    input = typeof input === 'string' ? proxied : new Request(proxied, input);
  }
  return fetch(input, init);
}
function getSB() {
  if (typeof supabase === 'undefined') throw new Error('Supabase SDK not loaded');
  if (!_sbClient) _sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: { fetch: sbProxyFetch },
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: false,
    },
  });
  return _sbClient;
}

// ─── Auth helpers ─────────────────────────────────────────────────────────────
async function authSignUp(email, password, username) {
  const res = await getSB().auth.signUp({
    email,
    password,
    options: { data: { username, display_name: username } }
  });
  if (res.error) throw res.error;
  if (res.data?.user?.identities?.length === 0) {
    throw new Error("An account with this email already exists");
  }
  // If the user is immediately active (email confirmation disabled in Supabase),
  // create the profile row now. Otherwise the DB trigger handles it on confirm.
  if (res.data?.session && res.data?.user) {
    const { error: pe } = await getSB().from('profiles').upsert(
      { id: res.data.user.id, username, display_name: username },
      { onConflict: 'id' }
    );
    if (pe) console.warn("Profile create on signup (may be handled by trigger):", pe.message);
  }
  return res.data;
}

async function authSignIn(email, password) {
  const { data, error } = await getSB().auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function authResetPassword(email) {
  const { error } = await getSB().auth.resetPasswordForEmail(email, {

async function authUpdatePassword(newPassword) {

async function authSignOut() {

  // This avoids Safari stalling on the server-side invalidation request.
  const { error } = await getSB().auth.signOut({ scope: 'local' });
  if (error) throw error;
}

async function authGetSession() {
  const { data: { session } } = await getSB().auth.getSession();
  return session;
}

// Guarantee a non-expired access token before a critical write.
// iOS/WebKit freezes background timers, so the library's hourly auto-refresh
// often hasn't run when the user reopens a day-old session and plays. Without
// this, score/token writes go out with an expired JWT and are silently rejected
// until the next sign-in. Returns the (possibly refreshed) session, or null.
async function ensureFreshSession() {
  try {
    const sb = getSB();
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return null;
    const expiresAtMs = (session.expires_at || 0) * 1000;
    // Refresh if already expired or expiring within the next 2 minutes.
    if (Date.now() > expiresAtMs - 120000) {
      const { data, error } = await sb.auth.refreshSession();
      if (!error && data?.session) return data.session;
    }
    return session;
  } catch { return null; }
}

async function authGetProfile(userId) {
  // maybeSingle (not single) so a transient 0-row response doesn't throw; retry once
  let { data, error } = await getSB().from('profiles').select('*').eq('id', userId).maybeSingle();
  if (error) throw error;
  if (!data) {
    await new Promise(r => setTimeout(r, 600));
    ({ data, error } = await getSB().from('profiles').select('*').eq('id', userId).maybeSingle());
    if (error) throw error;
  }
  return data;
}

async function authCheckUsername(username) {

}

// ─── Leaderboard helpers ──────────────────────────────────────────────────────
async function submitDailyScore(userId, score, dayKey, turns, elapsed, wrongGuesses, blocks, helps) {
  // ignoreDuplicates: the FIRST score of the day wins. Replaying the daily on a
  // second browser (before it syncs) can no longer overwrite the real score.
  const { error } = await getSB().from('daily_scores').upsert({
    user_id: userId, score, day_key: dayKey, turns, elapsed, wrong_guesses: wrongGuesses, blocks,
    helps: helps == null ? null : helps, // power-ups used; 0 = clean run (earns the "no hints" badge)
  }, { onConflict: 'user_id,day_key', ignoreDuplicates: true });
  if (error) console.error("Score submit error:", error);
}

async function fetchLeaderboard(mode, dayKey) {
  let query = getSB()
    .from('daily_scores')
    .select('user_id, score, day_key, turns, elapsed, wrong_guesses, blocks, helps, created_at, profiles(username)')
    .order('score', { ascending: false })
    .limit(50);
  if (mode === 'daily') {
    query = query.eq('day_key', dayKey);
  }
  const { data, error } = await query;
  if (error) { console.error("Leaderboard fetch error:", error); return []; }
  return data;
}

async function fetchMyScores(userId) {
  const { data, error } = await getSB()
    .from('daily_scores')
    .select('score, day_key, turns, elapsed, wrong_guesses, blocks, helps, created_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });
  if (error) { console.error("My scores fetch error:", error); return []; }
  return data;
}

// Convert a stored day_key ("2026-6-17") into display date strings
function dayKeyToDates(dayKey) {
  const [y, m, d] = String(dayKey || "").split('-').map(Number);
  const dt = (y && m && d) ? new Date(y, m - 1, d) : new Date();
  return {
    date: dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }),
    shortDate: dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
  };
}

// One daily per ACCOUNT, not per device: if this account already submitted a
// score today (played on another browser/device), reconstruct the local
// "done" marker from the server row so this device also shows Already Played.
async function syncDailyDoneFromServer(userId) {
  if (getDailyDone()) return false;
  try {
    await ensureFreshSession();
    const dk = dateKey().replace('wf_', '');
    const { data } = await getSB().from('daily_scores').select('*')
      .eq('user_id', userId).eq('day_key', dk).maybeSingle();
    if (!data) return false;
    const wordResults = {};
    [...(data.blocks || '')].forEach((ch, i) => {
      if (ch === '🟩') wordResults[i] = 'green';
      else if (ch === '🟨') wordResults[i] = 'yellow';
    });
    const missed = [...(data.blocks || '')].some(ch => ch === '🟥');
    setDailyDone({
      turns: data.turns, elapsed: data.elapsed, score: data.score,
      wordResults, wrongGuesses: data.wrong_guesses || 0,
      outOfTurns: missed, bonusPts: null, bonusWords: [],
    });
    clearDailyProgress(); // finished elsewhere — discard any local in-progress game
    return true;
  } catch (e) { return false; }
}

async function retroSubmitTodayScore(userId) {
  const done = getDailyDone();
  if (!done || !done.score) return;
  const dk = dateKey().replace('wf_', '');
  const wordResultsArr = getDailyWords().map((_,i) => done?.wordResults?.[i] || (done?.outOfTurns ? "missed" : "yellow"));
  const blocks = getDailyWords().map((_,i) => {
    const r = done?.wordResults?.[i];
    return r==="green" ? "🟩" : r==="yellow" ? "🟨" : "🟥";
  }).join("");
  await submitDailyScore(userId, done.score, dk, done.turns, done.elapsed, done.wrongGuesses||0, blocks, getDailyHelps());
}

async function fetchWallet(userId) {
  const { data, error } = await getSB().from('wallets').select('balance').eq('user_id', userId).maybeSingle();
  if (error) { console.error("Wallet fetch error:", error); return 0; }

}

// Idempotent grant via the secure RPC. Returns the new balance (or null on failure).
async function grantTokens(amount, reason) {
  const { data, error } = await getSB().rpc('add_tokens', { p_amount: amount, p_reason: reason });
  if (error) { console.error("Grant tokens error:", error); return null; }
  return data;
}

// Grant all tokens the signed-in user has earned but not yet received.
// Safe to call repeatedly — each reason is idempotent server-side.
async function grantEarnedTokens(userId) {
  await grantTokens(TOKENS.SIGNUP, 'signup-bonus');
  const done = getDailyDone();
  if (done && done.score) {
    await grantTokens(dailyTokens(done.score), 'daily-' + dateKey().replace('wf_', ''));
  }
}

function getInv(invKey) {
  try { return Math.max(0, parseInt(localStorage.getItem(invKey) || '0', 10) || 0); } catch { return 0; }
}
function addInv(invKey, delta) {
  const n = Math.max(0, getInv(invKey) + delta);
  try { localStorage.setItem(invKey, String(n)); } catch {}
  return n;
}
// Grant tokens only when signed in (the RPC uses auth.uid server-side).
// Refreshes a stale JWT first so the grant can't 401 on a day-old session.
async function grantIfSignedIn(amount, reason, refreshWallet) {
  const s = await ensureFreshSession();
  if (!s?.user) return;
  await grantTokens(amount, reason);
  if (refreshWallet) refreshWallet();
}

}
function addDailyHelps(n) {

// Atomic server-side spend via the spend_tokens RPC (see supabase-migrations.sql).
// The RPC rejects overdrafts, so the balance can never go negative.
// (Kept for future non-inventory purchases; item buys go through buyItem below.)
async function spendTokens(amount, reason) {
  const { data, error } = await getSB().rpc('spend_tokens', { p_amount: amount, p_reason: reason });
  if (error) {
    console.error('Spend tokens error:', error);
    const m = String(error.message || '');
    if (/insufficient/i.test(m)) return { ok:false, msg:'Not enough coins.' };
    if (/find the function|does not exist|404/i.test(m)) return { ok:false, msg:'Shop is not set up yet — try again later.' };
    return { ok:false, msg:'Purchase failed — please try again.' };
  }
  return { ok:true, balance:data };
}

// Buy a power-up: one atomic RPC charges the wallet AND increments the
// account-level inventory (see migration section 7). Returns the new count.
async function buyItem(itemKey, price) {
  const { data, error } = await getSB().rpc('buy_item', { p_item: itemKey, p_price: price });
  if (error) {
    console.error('Buy item error:', error);
    const m = String(error.message || '');
    if (/insufficient/i.test(m)) return { ok:false, msg:'Not enough coins.' };
    if (/find the function|does not exist|schema cache|404/i.test(m)) return { ok:false, msg:'Shop upgrade pending — one more migration to run.' };
    return { ok:false, msg:'Purchase failed — please try again.' };
  }
  return { ok:true, count:data };
}

// Pull the account's inventory into the local cache (wf_inv_*) so power-ups
// follow the account across browsers/devices. First sync for an account
// imports any pre-existing local purchases (bought before inventories existed).
async function syncInventoryFromServer(userId) {
  try {
    const db = getSB();
    // Column is `freezes` (plural) — FREEZE is a reserved word in Postgres.
    const { data, error } = await db.from('inventories').select('hint,xray,freezes,megahint').eq('user_id', userId).maybeSingle();
    if (error) return; // table/column missing (migration not run) — keep local behavior
    if (!data) {
      const lh = getInv('wf_inv_hint'), lx = getInv('wf_inv_xray'), lf = getInv('wf_inv_freeze'), lm = getInv('wf_inv_megahint');
      for (let i = 0; i < lh; i++) await db.rpc('buy_item', { p_item:'hint', p_price:0 });
      for (let i = 0; i < lx; i++) await db.rpc('buy_item', { p_item:'xray', p_price:0 });
      for (let i = 0; i < lf; i++) await db.rpc('buy_item', { p_item:'freeze', p_price:0 });
      for (let i = 0; i < lm; i++) await db.rpc('buy_item', { p_item:'megahint', p_price:0 });
      return; // local cache already reflects the imported counts
    }
    try {
      localStorage.setItem('wf_inv_hint', String(data.hint || 0));
      localStorage.setItem('wf_inv_xray', String(data.xray || 0));
      localStorage.setItem('wf_inv_freeze', String(data.freezes || 0));
      localStorage.setItem('wf_inv_megahint', String(data.megahint || 0));
    } catch {}
  } catch (e) {}
}

// Consume one item server-side (fire-and-forget). The local cache was already
// decremented for instant UI; the server response re-syncs it exactly.
function syncUseItem(itemKey) {
  ensureFreshSession().then(s => {
    if (!s?.user) return; // guests play off the local count
    getSB().rpc('use_item', { p_item: itemKey }).then(({ data, error }) => {
      if (!error && typeof data === 'number') {
        try { localStorage.setItem('wf_inv_' + itemKey, String(data)); } catch {}
      }
    });
  }).catch(() => {});
}

function useAuth() {
  const [session, setSession] = useState(null);
  // Initialize profile and balance from localStorage immediately — no network needed.
  // This is the primary fix for the "?" avatar on iOS cold start: the cached value
  // shows instantly while the background refresh confirms/updates it.
  const [profile, setProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem('wf_profile') || 'null'); } catch { return null; }
  });
  const [loading, setLoading] = useState(true);
  const [recovery, setRecovery] = useState(false);
  const explicitSignOut = useRef(false);
  const [balance, setBalance] = useState(() => {
    try { return parseInt(localStorage.getItem('wf_balance') || '0', 10); } catch { return 0; }
  });
  const sessionRef = useRef(null);
  const profileRef = useRef(null);

  async function loadProfile(userId, mounted) {
    let p = null;
    for (let attempt = 0; attempt < 4; attempt++) {
      try {
        if (attempt > 0) await new Promise(r => setTimeout(r, 1000 * attempt));
        p = await authGetProfile(userId);
        if (!p || !p.username) {
          const { data: { user } } = await getSB().auth.getUser();
          const meta = user?.user_metadata || {};
          const uname = meta.username
            || (user?.email || '').split('@')[0].replace(/[^a-zA-Z0-9_]/g, '').slice(0, 20)
            || 'player';
          const { data: created, error: ce } = await getSB()
            .from('profiles')
            .upsert({ id: userId, username: uname, display_name: uname }, { onConflict: 'id' })
            .select('*')
            .maybeSingle();
          if (ce) console.error("Profile auto-create failed:", ce.message);
          else p = created;
        }
        break;
      } catch (err) {
        console.warn(`loadProfile attempt ${attempt + 1} failed:`, err.message || err);
      }
    }
    if (!mounted || (mounted.current === false)) return;
    if (p) {
      profileRef.current = p;
      setProfile(p);
      try { localStorage.setItem('wf_profile', JSON.stringify(p)); } catch {}
    }
    try {
      const b = await fetchWallet(userId);
      if (mounted && mounted.current !== false) {
        setBalance(b);
        try { localStorage.setItem('wf_balance', String(b)); } catch {}
      }
    } catch {}
  }

  useEffect(() => {
    const m = { current: true };
    // Sync profileRef with the value already loaded from localStorage cache.
    try {
      if (!profileRef.current) {
        const cached = JSON.parse(localStorage.getItem('wf_profile') || 'null');
        if (cached) profileRef.current = cached;
      }
    } catch {}

    // onAuthStateChange is the single source of truth for auth state.
    //
    // CRITICAL: the callback body is deferred to a fresh tick via setTimeout.
    // supabase-js fires this callback (especially INITIAL_SESSION on page load)
    // while holding its internal auth lock. Any Supabase call made directly in
    // the callback — REST reads (they call getSession() internally to attach
    // the access token), setSession(), refreshSession() — waits on that same
    // lock and deadlocks. The visible symptom: after a page refresh, every DB
    // query in the app hangs forever (leaderboards stuck, score submits and
    // token grants silently dropped) while cached profile/balance still render.
    const handleAuthEvent = async (event, s) => {
      if (!m.current) return;
      if (event === "PASSWORD_RECOVERY") { setRecovery(true); return; }

      if (s?.user) {
        try { localStorage.setItem('wf_sb', JSON.stringify({ at: s.access_token, rt: s.refresh_token })); } catch {}
        sessionRef.current = s;
        setSession(s);
        // If we already have cached profile data, stop the spinner immediately and
        // refresh in the background. Otherwise wait for the first load to finish.
        if (profileRef.current) {
          if (m.current) setLoading(false);
          await loadProfile(s.user.id, m);
        } else {
          await loadProfile(s.user.id, m);
          if (m.current) setLoading(false);
        }
        return;
      }

      if (event === "SIGNED_OUT") {
        if (explicitSignOut.current) {
          explicitSignOut.current = false;
          try { localStorage.removeItem('wf_sb'); } catch {}
        } else {
          const backup = (() => { try { return JSON.parse(localStorage.getItem('wf_sb') || 'null'); } catch { return null; } })();
          if (backup?.rt) {
            const { error } = await getSB().auth.setSession({ access_token: backup.at || '', refresh_token: backup.rt });
            if (!error) {
              if (m.current) setLoading(false);
              return;
            }
            try { localStorage.removeItem('wf_sb'); } catch {}
          }
        }
        // Clear all state and caches on sign-out.
        sessionRef.current = null;
        profileRef.current = null;
        setSession(null);
        setProfile(null);
        setBalance(0);
        try { localStorage.removeItem('wf_profile'); localStorage.removeItem('wf_balance'); } catch {}
      } else {
        sessionRef.current = s;
        setSession(s);
      }

      if (m.current) setLoading(false);
    };
    const { data: { subscription } } = getSB().auth.onAuthStateChange((event, s) => {
      // Defer out of the auth lock (see comment above). Events still process
      // in order — setTimeout callbacks run FIFO.
      setTimeout(() => handleAuthEvent(event, s), 0);
    });

    // Fallback: if no INITIAL_SESSION fires within a tick (no stored session),
    // stop the loading spinner so the app doesn't hang on the splash screen.
    authGetSession().then(s => {
      if (!m.current) return;
      if (!s) setLoading(false); // session exists → onAuthStateChange handles it
    }).catch(() => { if (m.current) setLoading(false); });

    // When the user comes back to the app (PWA foreground), re-attempt profile
    // load if we have a session but the profile is still null. This catches the
    // case where the initial INITIAL_SESSION profile fetch failed because iOS
    // hadn't fully restored network connectivity yet.
    const handleVisibilityChange = async () => {
      if (document.visibilityState !== 'visible') return;
      const s = sessionRef.current;
      if (!s?.user) return;
      // Proactively refresh the token on foreground — iOS freezes the library's
      // background auto-refresh timer, so a day-old session can hold an expired
      // JWT that silently breaks the first score/token write after reopening.
      ensureFreshSession();
      if (profileRef.current) return;
      await loadProfile(s.user.id, m);
    };
    document.addEventListener('visibilitychange', handleVisibilityChange);

    return () => {
      m.current = false;
      subscription.unsubscribe();
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    };
  }, []);

  const refreshProfile = useCallback(async () => {
    const s = sessionRef.current || await authGetSession();
    if (s?.user) {
      try {
        const p = await authGetProfile(s.user.id);
        setProfile(p);
      } catch (err) { console.error("refreshProfile failed:", err); }
    }
  }, [session]);

  const refreshWallet = useCallback(async () => {
    const s = sessionRef.current || await authGetSession();
    if (s?.user) {
      try {
        const b = await fetchWallet(s.user.id);
        setBalance(b);
        try { localStorage.setItem('wf_balance', String(b)); } catch {}
      } catch {}
    }
  }, [session]);

  function signOut() {
    explicitSignOut.current = true;
    profileRef.current = null;
    try { localStorage.removeItem('wf_sb'); } catch {}
    try { localStorage.removeItem('wf_profile'); localStorage.removeItem('wf_balance'); } catch {}
    try { getSB().auth.signOut({ scope: 'local' }); } catch {}
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-'))
        .forEach(k => localStorage.removeItem(k));
    } catch {}
    window.location.reload();
  }

  return { session, profile, loading, refreshProfile, recovery, clearRecovery: () => setRecovery(false), balance, refreshWallet, signOut };
}

// Seeded PRNG — gives every client the same tile layout for a given room
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function buildTilesSeeded(words, seed) {
  const tiles = [];
  words.forEach((word, wi) => word.split('').forEach((letter, li) => {
    tiles.push({ id: `${wi}-${li}`, letter });
  }));
  const rng = mulberry32(seed);
  const a = [...tiles];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function getMyPlayerId() {
  let id = localStorage.getItem('wf_player_id');
  if (!id) {
    // crypto.randomUUID() requires iOS 15.4+ — fallback for older devices
    id = (typeof crypto.randomUUID === 'function')
      ? crypto.randomUUID()
      : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
    localStorage.setItem('wf_player_id', id);
  }
  return id;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickRandom(pool) {
  return pool[Math.floor(Math.random()*pool.length)];
}

function buildTiles(words) {
  const tiles = [];
  words.forEach((word,wi) => word.split("").forEach((letter,li) => {
    tiles.push({ id:`${wi}-${li}`, letter });
  }));
  return shuffle(tiles);
}

function formatTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,"0")}`;
}

function scoreCalc(ms, wordResults, wrongGuesses, bonusPts = 0) {
  const greenPts = wordResults.filter(r=>r==="green").length * 300;
  const yellowPts = wordResults.filter(r=>r==="yellow").length * 100;
  // "missed" words score 0 — no bonus for unfound words
  const timeBonus = Math.max(0, 600 - Math.floor(ms/1000)); // 600 pts, -1/sec over 6 min
  const guessBonus = Math.max(0, 800 - (wrongGuesses||0) * 50); // 800 pts, -50 per wrong guess
  return greenPts + yellowPts + timeBonus + guessBonus + bonusPts;
}

// ─── Streak helpers (no login needed — stored per device) ─────────────────────
// Weekly streak milestone payout: every 7 consecutive days pays a bonus.
// Week 1: 200, week 2: 450, week 3: 500, week 4 and every week after: 600.
// Re-earnable: the bonus depends on your CURRENT streak length, so losing your
// streak and climbing back from day 1 earns each milestone again. TUNABLE.
const STREAK_WEEK_BONUS = [200, 450, 500, 600];
const streakWeekBonus = (weeks) => STREAK_WEEK_BONUS[Math.min(Math.max(weeks, 1), 4) - 1];

function getStreak() {
  try { return JSON.parse(localStorage.getItem("wf_streak")||'{"count":0,"lastDate":""}'); }
  catch { return { count:0, lastDate:"" }; }
}
// Longest consecutive run in local history — seeds `best` for players whose
// streak record predates best-tracking. DST-tolerant day diff (20h–28h).
function computeBestFromHistory() {
  const times = getHistory()
    .map(e => String(e.dayKey||'').replace('wf_',''))
    .filter(Boolean)
    .map(k => { const [y,m,d] = k.split('-').map(Number); return new Date(y, m-1, d).getTime(); })
    .sort((a,b) => a-b);
  let best = 0, run = 0, prev = null;
  for (const t of times) {
    const diff = prev === null ? null : t - prev;
    run = (diff !== null && diff > 72e6 && diff < 108e6) ? run + 1 : 1;
    best = Math.max(best, run);
    prev = t;
  }
  return best;
}
function parseDayKey(k) {
  const [y, m, d] = String(k || '').replace('wf_', '').split('-').map(Number);
  return (y && m && d) ? new Date(y, m - 1, d) : null;
}
// Whole calendar days from dayKey k until today (0 = today, 1 = yesterday…).
// Math.round absorbs DST hour shifts.
function daysSinceKey(k) {
  const d = parseDayKey(k);
  if (!d) return Infinity;
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((today0 - d) / 86400000);
}

// The stored count can be stale (streak silently broken days ago) — this
// returns what the streak actually IS right now. A gap of missed days still
// counts as alive if the player owns enough Streak Freezes to cover it
// (they're consumed when the next daily is actually played).
function getLiveStreak() {
  const s = getStreak();
  const gap = s.lastDate ? daysSinceKey(s.lastDate) - 1 : Infinity; // missed days
  const alive = gap <= 0 || (gap !== Infinity && getInv('wf_inv_freeze') >= gap);
  return {
    count: alive ? (s.count || 0) : 0,
    best: Math.max(s.best || 0, s.count || 0, computeBestFromHistory()),
    playedToday: s.lastDate === dateKey(),
    lastDate: s.lastDate || null,
    frozen: s.frozen || [],
  };
}
function updateStreak() {
  const today = dateKey();
  const s = getStreak();
  const prevCount = s.count || 0;
  if (s.lastDate === today) return { ...s, prevCount }; // already counted today
  const gap = s.lastDate ? daysSinceKey(s.lastDate) - 1 : Infinity; // missed days
  const frozen = (s.frozen || []).slice(-30);
  let newCount;
  if (gap === 0) {
    newCount = prevCount + 1; // played yesterday — normal continuation
  } else if (gap > 0 && gap !== Infinity && getInv('wf_inv_freeze') >= gap) {
    // Streak Freeze: burn one per missed day; those days join the chain as
    // "frozen" (blue flame in the strip) and the streak survives.
    const last = parseDayKey(s.lastDate);
    for (let j = 1; j <= gap; j++) {
      addInv('wf_inv_freeze', -1);
      syncUseItem('freeze'); // account-level consume (no-op for guests)
      const d = new Date(last); d.setDate(last.getDate() + j);
      frozen.push(`wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`);
    }
    newCount = prevCount + gap + 1; // frozen days keep their place in the chain
  } else {
    newCount = 1; // broken (no freezes wasted on an unsalvageable gap)
  }
  const best = Math.max(s.best || 0, computeBestFromHistory(), newCount);
  const updated = { count: newCount, lastDate: today, best, frozen };
  localStorage.setItem("wf_streak", JSON.stringify(updated));
  return { ...updated, prevCount };
}

// Mark ids unlocked; returns only those newly unlocked this call (for the toast).
function unlockAchievements(ids) {
  if (!ids || !ids.length) return [];
  const have = getAchievements();
  const fresh = ids.filter(id => !have[id] && ACHIEVEMENTS.some(a => a.id === id));
  if (!fresh.length) return [];
  fresh.forEach(id => { have[id] = dateKey().replace('wf_', ''); });
  try { localStorage.setItem('wf_achievements', JSON.stringify(have)); } catch {}
  return fresh;
}
// Tracks which achievement rewards have been paid, so we don't spam the RPC.
// (grantTokens is idempotent by reason too — this just avoids redundant calls.)
function getAchPaid() {
  try { return JSON.parse(localStorage.getItem('wf_ach_paid') || '{}'); } catch { return {}; }
}
// Pay the token reward for each given achievement id (skips already-paid ones).
// Idempotent server-side via the 'ach-<id>' reason. Signed-in only.
async function grantAchievementRewards(ids) {
  if (!ids || !ids.length) return;
  const paid = getAchPaid();
  for (const id of ids) {
    const a = achById(id);
    if (!a || !(a.reward > 0) || paid[id]) continue;
    const res = await grantTokens(a.reward, 'ach-' + id);
    if (res != null) paid[id] = true; // grantTokens returns new balance, or null on error
  }
  try { localStorage.setItem('wf_ach_paid', JSON.stringify(paid)); } catch {}
}

// Evaluate the game-derived achievements. ctx.wordResults is an array of
// 'green' | 'yellow' | 'missed'. Returns the ids that qualify (unlock filters).
function evaluateAchievements(ctx) {
  const out = [];
  const r = ctx.wordResults || [];
  const complete = r.length > 0 && r.every(x => x === 'green' || x === 'yellow');
  const allGreen = complete && r.every(x => x === 'green');
  const noHints = (ctx.helpsUsed || 0) === 0;

  // Legendary — all 4 words in 4 guesses (0 wrong by definition) with no hints.
  // Perfect (all in order) is the 10k; the "any order" version is the 5k.
  // Mutually exclusive so a perfect run pays the top prize, not both.
  if (complete && r.length === 4 && ctx.turns <= 4 && noHints) {
    out.push(allGreen ? 'perfect_nohints' : 'lucky4');
  }

  // Skill
  if (allGreen) out.push('all_green');
  if (complete && r.every(x => x === 'yellow')) out.push('all_yellow');
  if (complete && ctx.wrongGuesses === 0) out.push('no_wrong');
  if (complete && ctx.isDaily && noHints) out.push('no_hints');

  // Efficiency (guesses)
  if (complete && ctx.turns <= 4)  out.push('turns_4');
  if (complete && ctx.turns <= 6)  out.push('turns_6');
  if (complete && ctx.turns <= 8)  out.push('turns_8');
  if (complete && ctx.turns <= 10) out.push('turns_10');
  if (complete && ctx.turns <= 12) out.push('turns_12');

  // Speed (time) — completed games only
  if (complete && ctx.elapsed > 0) {
    if (ctx.elapsed < 300000) out.push('time_5m');
    if (ctx.elapsed < 180000) out.push('time_3m');
    if (ctx.elapsed < 90000)  out.push('time_90s');
  }

  // Just for Fun — the hall of shame
  if ((ctx.wrongGuesses || 0) >= 10) out.push('butterfingers');
  if (ctx.outOfTurns && r.length > 0 && r.every(x => x === 'missed')) out.push('blank_slate');
  if (complete && ctx.elapsed > 600000) out.push('scenic_route');
  if (ctx.usedHint && ctx.usedXray) out.push('kitchen_sink');

  // Streak badges are evaluated dynamically from the live streak (re-earnable),
  // not unlocked here — see AchievementsScreen.

  // Game modes (play). Daily/solo here; multiplayer unlocks from its own screens.
  if (ctx.mode === 'daily') out.push('play_daily');
  if (ctx.mode === 'solo')  out.push('play_solo');

  // Dedication
  if (ctx.gamesPlayed >= 10)  out.push('games_10');
  if (ctx.gamesPlayed >= 50)  out.push('games_50');
  if (ctx.gamesPlayed >= 100) out.push('games_100');

  return out;
}

// Redeem a promo code. The code and its value live SERVER-SIDE (redeem_code
// RPC + promo_codes table), so valid codes aren't discoverable in the client.
// Idempotent per (user, code) — a code can only be redeemed once per account.
async function redeemCode(code) {
  try {
    const { data, error } = await getSB().rpc('redeem_code', { p_code: code });
    if (error) {
      const m = String(error.message || '');
      if (/already redeemed/i.test(m)) return { ok:false, msg:'You’ve already used that code.' };
      if (/invalid code/i.test(m))    return { ok:false, msg:'That code isn’t valid.' };
      if (/not signed in/i.test(m))   return { ok:false, msg:'Sign in to redeem a code.' };
      if (/function|does not exist|schema cache|404/i.test(m)) return { ok:false, msg:'Code redemption isn’t set up yet.' };
      return { ok:false, msg:'Couldn’t redeem — please try again.' };
    }
    return { ok:true, balance:data };
  } catch (e) { return { ok:false, msg:'Couldn’t redeem — please try again.' }; }
}

// Which platform are we running on? Capacitor injects window.Capacitor in the

async function purchaseCoins(packId) {

// Ask the edge function for a Stripe Checkout URL, then hand off to Stripe.

// ─── Push notifications (daily / streak reminders) ────────────────────────────
// Web push works on Android + desktop, and on iOS 16.4+ ONLY for a PWA added to
// the home screen. Set VAPID_PUBLIC_KEY (and the matching private key in the
// send-reminders edge function) to turn it on — see NOTIFICATIONS_SETUP.md.
const VAPID_PUBLIC_KEY = 'BLjSCATF0ka97EErUjD15dsBDI-q8-DP1YMjf1eyv-fZo4yKZNAjXkEibhzGNMQOt4nYzmHlwPwFzrO-A2YFvXA'; // VAPID public key (base64url); empty = feature hidden
function notifSupported() {
  return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
}
function notifReady() { return notifSupported() && !!VAPID_PUBLIC_KEY; }
function urlB64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const b64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
async function getPushSubscription() {
  if (!notifSupported()) return null;
  const reg = await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}
// Request permission, subscribe, and store the subscription against the account.
async function enableNotifications(userId) {
  if (!notifReady()) return { ok:false, msg:'Reminders aren’t set up yet.' };
  if (!userId) return { ok:false, msg:'Sign in to get reminders.' };
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') return { ok:false, msg:'Reminders are blocked — enable notifications in your settings.' };
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY) });
  }
  const j = sub.toJSON();
  const { error } = await getSB().from('push_subscriptions').upsert({
    user_id: userId, endpoint: sub.endpoint, p256dh: j.keys.p256dh, auth: j.keys.auth,
  }, { onConflict: 'endpoint' });
  if (error) { console.error('save push sub:', error); return { ok:false, msg:'Couldn’t save your reminder settings.' }; }
  try { localStorage.setItem('wf_notif', '1'); } catch {}
  return { ok:true };
}
async function disableNotifications() {
  try {
    const sub = await getPushSubscription();
    if (sub) {
      await getSB().from('push_subscriptions').delete().eq('endpoint', sub.endpoint);
      await sub.unsubscribe();
    }
  } catch (e) {}
  try { localStorage.removeItem('wf_notif'); } catch {}
  return { ok:true };
}

// ─── Share helper ─────────────────────────────────────────────────────────────
// Share: always copy to the clipboard (guaranteed to work everywhere) AND
// attempt the native share sheet where supported. So even if iOS's known
// standalone-PWA bug leaves the share sheet blank, the result is already on
// the clipboard to paste. Only `text` is passed (a `title` breaks the iOS sheet).
function shareOrCopy(text, onDone) {
  if (!text) return;
  // Try the native sheet first, while the user activation is freshest.
  try {
    const data = { text };
    if (navigator.share && (!navigator.canShare || navigator.canShare(data))) {
      navigator.share(data).catch(() => {}); // cancelled / unsupported — ignore
    }
  } catch (e) {}
  // Always copy too.
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text);
  } catch (e) {}
  onDone && onDone(true);
}

function buildShareText(turns, ms, score, wordResults, totalWords) {
  const d = new Date();
  const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  // wordResults array may be shorter than totalWords if player ran out of turns
  const blocks = Array.from({length: totalWords || wordResults.length}, (_,i) => {
    const r = wordResults[i];
    if (r === "green") return "\u{1F7E9}";
    if (r === "yellow") return "\u{1F7E8}";
    return "\u{1F7E5}"; // 🟥 not found
  }).join("");
  return "WordFlip Daily \u00B7 " + date + "\n"
    + blocks + "\n"
    + turns + " guess" + (turns !== 1 ? "es" : "") + " \u00B7 " + formatTime(ms) + " \u00B7 " + score.toLocaleString() + " pts\n"
    + "https://wordflipgame.netlify.app";
}

// ─── Fireworks ────────────────────────────────────────────────────────────────
function Fireworks({ active }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particles = useRef([]);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    // Lowercased on purpose: a fixed celebratory palette that must stay literal
    // (canvas can't read CSS vars), kept distinct from the themed "var(--wf-accent)" etc.
    const colors = ["#00f5c4","#ffb703","#ff5e5b","#9b5de5","#f5edd6","#00bbf9"];
    particles.current = [];
    for (let b=0; b<8; b++) {
      const x=Math.random()*canvas.width, y=Math.random()*canvas.height*0.6+50;
      const color=colors[Math.floor(Math.random()*colors.length)];
      for (let p=0; p<40; p++) {
        const angle=(Math.PI*2*p)/40+Math.random()*0.3, speed=Math.random()*6+2;
        particles.current.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,alpha:1,color,r:Math.random()*3+1});
      }
    }
    function frame() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.current = particles.current.filter(p=>p.alpha>0.02);
      particles.current.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.alpha*=0.96;
        ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (particles.current.length>0) animRef.current=requestAnimationFrame(frame);
    }
    animRef.current=requestAnimationFrame(frame);
    return ()=>cancelAnimationFrame(animRef.current);
  },[active]);
  if (!active) return null;
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999}} />;
}

// ─── Score Info Tooltip ───────────────────────────────────────────────────────
function ScoreInfoTip({ words, wordResults, elapsed, wrongGuesses }) {
  const [open, setOpen] = useState(false);
  const results = wordResults || [];
  const greens = results.filter(r=>r==="green").length;
  const yellows = results.filter(r=>r==="yellow").length;
  const secs = Math.floor(elapsed/1000);
  const timeBonus = Math.max(0, 600 - secs);
  const guessBonus = Math.max(0, 800 - (wrongGuesses||0)*50);
  const current = greens*300 + yellows*100 + timeBonus + guessBonus;
  return (
    <span style={{ position:"relative", display:"inline-flex", alignItems:"center", marginLeft:4 }}>
      <button onClick={e=>{ e.stopPropagation(); setOpen(o=>!o); }}
        style={{
          background:"var(--wf-border)", border:"1.5px solid #2a4060", borderRadius:"50%",
          width:22, height:22, cursor:"pointer", padding:0,

// ─── Sound Manager ────────────────────────────────────────────────────────────
const soundManager = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, dur, type="sine", vol=0.25, delay=0) {
    try {
      const c = ac(), osc = c.createOscillator(), g = c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      g.gain.setValueAtTime(0, c.currentTime + delay);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }
  // Haptic feedback via Web Vibration API (Android/Chrome; silent fallback on iOS)
  function vibe(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
  }
  return {
    flip()       { tone(520,0.05,"triangle",0.12); tone(280,0.08,"triangle",0.07,0.03); vibe(8); },
    select()     { tone(880,0.04,"sine",0.1); vibe(5); },
    wordGreen()  { [523,659,784,1047].forEach((f,i)=>tone(f,0.22,"sine",0.22,i*0.08)); vibe([30,15,60]); },
    wordYellow() { [523,659,784].forEach((f,i)=>tone(f,0.18,"sine",0.14,i*0.09)); vibe([20,10,30]); },
    wrong()      { tone(180,0.12,"sawtooth",0.18); tone(140,0.18,"triangle",0.1,0.06); vibe([15,20,15]); },
    complete()   { [523,659,784,1047,1319,784,1047].forEach((f,i)=>tone(f,0.28,"sine",0.2,i*0.07)); vibe([40,20,40,20,80]); },
    bonus()      { [659,784,1047].forEach((f,i)=>tone(f,0.18,"sine",0.18,i*0.07)); vibe([10,10,40]); },
  };
})();

// ─── Tile ─────────────────────────────────────────────────────────────────────
function Tile({ tile, isFlipped, isFound, foundInOrder, isSelected, isError, onClick, orderNum, remoteColor, isHint, isXray }) {
  const P = activePalette(); // current theme's tile palette
  const B = activeTileBack(); // face-down card design (shop cosmetic)
  // Which face state applies (order matters — error > remote > selected > found)
  const faceBg = isError ? P.error.bg
    : remoteColor && isFlipped && !isFound ? remoteColor + "28"
    : isSelected ? P.sel.bg
    : isFound && foundInOrder ? P.green.bg
    : isFound ? P.yellow.bg
    : P.face.bg;
  const faceBorder = remoteColor && isFlipped && !isFound ? `2.5px solid ${remoteColor}`
    : isSelected ? `2.5px solid ${P.sel.border}`
    : isFound && foundInOrder ? `2.5px solid ${P.green.border}`
    : isFound ? `2.5px solid ${P.yellow.border}`
    : `2px solid ${P.face.border}`;
  const faceText = isError ? P.error.text
    : isSelected ? P.sel.text
    : isFound && foundInOrder ? P.green.text
    : isFound ? P.yellow.text
    : P.face.text;
  const selGlow = (isSelected ? P.sel.border : "var(--wf-accent2)") + "88";
  const label = isFound
    ? `${tile.letter} — word found`
    : isFlipped
    ? `${tile.letter} — selected, position ${(orderNum??0)+1}`
    : "Hidden tile — tap to flip";
  return (
    <button
      onClick={isFound?undefined:()=>{ soundManager.select(); onClick(); }}
      disabled={isFound}
      aria-label={label}
      aria-pressed={isFlipped && !isFound}
      style={{
        width:"100%",aspectRatio:"1",perspective:"600px",
        cursor:isFound?"default":"pointer",
        background:"none",border:"none",padding:0,
        borderRadius:10,
        outline:"none",
        transition:"box-shadow 0.15s",
      }}
      onFocus={e => { if(!isFound) e.currentTarget.style.boxShadow="0 0 0 3px #00F5C4"; }}
      onBlur={e => { e.currentTarget.style.boxShadow="none"; }}
    >
      <div style={{
        position:"relative",width:"100%",height:"100%",transformStyle:"preserve-3d",
        animation: isFound?"tileVanish 0.5s cubic-bezier(.4,0,.2,1) 0.15s both":isHint?"hintWiggle 0.4s ease 4":"none",
        transition: isFound?"none":"transform 0.22s cubic-bezier(.4,2,.6,1)",
        transform: isFlipped?"rotateY(180deg)":"rotateY(0deg)",
        boxShadow: isHint?"0 0 0 3px var(--wf-accent), 0 0 20px 4px var(--wf-accent)":"none",
        borderRadius:10,
        zIndex: isHint?5:"auto",
      }}>
        <div style={{
          position:"absolute",inset:0,backfaceVisibility:"hidden",
          // X-ray: the card doesn't flip — it goes dark like radiograph film
          // and the letter glows through in pale blue, like a bone.
          // NOTE: gradient + dots all live in backgroundImage layers. Mixing the
          // `background` shorthand with backgroundImage makes React drop the dot
          // layer when the shorthand changes (tiles stayed "flat" after x-ray).
          borderRadius:10,border: isXray?"2px solid #4FC3F7":`2px solid ${B.border}`,
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow: isXray?"0 0 16px #4FC3F766, inset 0 0 22px #4FC3F722":"0 2px 8px #00000066",
          backgroundImage:`radial-gradient(circle at 30% 30%, ${B.dot} 1px, transparent 1px),radial-gradient(circle at 70% 70%, ${B.dot} 1px, transparent 1px),${isXray?"linear-gradient(135deg,#050f1c 0%,#03111f 100%)":B.bg}`,
          backgroundSize:"12px 12px, 12px 12px, 100% 100%",
          transition:"border 0.25s, box-shadow 0.25s",
        }}>
          {isXray ? (
            <span style={{
              fontFamily:"'JetBrains Mono',monospace",
              fontSize:"clamp(1.1rem,3.5vw,1.8rem)",fontWeight:800,letterSpacing:"0.05em",
              color:"#9BE8FF",
              textShadow:"0 0 8px #4FC3F7, 0 0 20px #4FC3F788",
              filter:"blur(0.3px)",
              animation:"xrayPulse 1.3s ease both",
            }}>{tile.letter}</span>
          ) : (
            <span style={{color:B.symbolColor,fontSize:"1.4em",fontWeight:900}}>{B.symbol}</span>
          )}
        </div>
        <div style={{
          position:"absolute",inset:0,backfaceVisibility:"hidden",
          transform:"rotateY(180deg)",borderRadius:10,
          background: faceBg,
          border: faceBorder,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          boxShadow:remoteColor&&isFlipped&&!isFound?`0 0 14px ${remoteColor}55`:isSelected?`0 0 16px ${selGlow}`:"0 2px 8px #00000044",
          transition:"background 0.2s,box-shadow 0.2s,border 0.2s",
        }}>
          <span style={{
            fontFamily:"'JetBrains Mono',monospace",
            fontSize:"clamp(1.1rem,3.5vw,1.8rem)",fontWeight:800,
            color:faceText,letterSpacing:"0.05em",
          }}>{tile.letter}</span>
          {isFlipped&&!isFound&&orderNum!==undefined&&(
            <span style={{position:"absolute",bottom:4,right:6,fontSize:"0.55em",fontWeight:700,opacity:0.5,color:faceText}}>{orderNum+1}</span>
          )}
        </div>
      </div>
    </button>
  );
}
