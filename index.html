// ─── Rewards Screen — the "earn by playing" progression ladder ────────────────
function RewardsScreen({ onBack, career, activeThemeId, activeTileBackId, onApplyTheme, onApplyTileBack }) {
  const nextIdx = REWARD_LADDER.findIndex(r => career < r.points); // first locked (-1 = all done)
  const unlockedCount = nextIdx === -1 ? REWARD_LADDER.length : nextIdx;
  // Capture which rewards are freshly unlocked (earned but not yet seen) so we
  // can pop them in celebration — captured once at mount, before we mark seen.
  const [freshKeys] = useState(()=> new Set(newRewardKeys(career)));
  const freshOrder = REWARD_LADDER.filter(r => freshKeys.has(r.key)).map(r => r.key);
  useEffect(()=>{ markRewardsSeen(unlockedRewardKeys(career)); }, []); // clear the "new" glow
  return (
    <div style={{width:"100%", maxWidth:440, margin:"0 auto"}}>
      <button onClick={onBack} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),marginBottom:14,fontSize:"0.8rem"}}>← Menu</button>
      <div style={{textAlign:"center", marginBottom:18}}>
        <div style={{fontSize:"2.2rem"}}>🎁</div>
        <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"1.6rem",margin:"4px 0 4px"}}>Rewards</h2>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.72rem",margin:0,lineHeight:1.5}}>
          Earn themes &amp; tile backs just by playing — every point you score counts.
        </p>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-accent)",fontSize:"0.9rem",fontWeight:800,margin:"10px 0 0"}}>
          {career.toLocaleString()} career points
        </p>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.66rem",margin:"2px 0 0"}}>
          {unlockedCount} of {REWARD_LADDER.length} unlocked
        </p>
      </div>
      {REWARD_LADDER.map((entry, idx) => {
        const unlocked = career >= entry.points;
        const isNext = idx === nextIdx;
        const name = entry.type==='theme' ? themeById(entry.key).name : tileBackById(entry.key).name;
        const active = entry.type==='theme' ? activeThemeId===entry.key : activeTileBackId===entry.key;
        const pct = Math.min(100, Math.round(career / entry.points * 100));
        const fresh = freshKeys.has(entry.key);
        return (
          <div key={entry.key} style={{
            background:'var(--wf-surface)',
            border:`1.5px solid ${fresh?'var(--wf-accent2)':active?'#00F5C455':isNext?'var(--wf-accent2)':'var(--wf-border)'}`,
            borderRadius:14, padding:'12px 14px', marginBottom:12, opacity: unlocked||isNext ? 1 : 0.55,
            animation: fresh ? `rewardPop 0.85s ease ${0.25 + freshOrder.indexOf(entry.key)*0.18}s both` : 'none',
          }}>
            <div style={{display:'flex', alignItems:'center', gap:12}}>
              <div style={{filter: unlocked ? 'none' : 'grayscale(0.7)', position:'relative'}}>
                <RewardPreview entry={entry} />
                {!unlocked && <span style={{position:'absolute',top:-4,right:-4,fontSize:'0.85rem'}}>🔒</span>}
              </div>
              <div style={{flex:1, textAlign:'left'}}>
                <div style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', fontWeight:700, fontSize:'1.0rem'}}>
                  {name} <span style={{fontFamily:"'JetBrains Mono',monospace",color:'var(--wf-text-mute)',fontSize:'0.6rem',fontWeight:400}}>{entry.type==='theme'?'THEME':'TILE BACK'}</span>
                  {fresh && <span style={{fontFamily:"'JetBrains Mono',monospace",color:'var(--wf-accent2)',fontSize:'0.58rem',fontWeight:800,marginLeft:6,letterSpacing:'0.08em'}}>✨ NEW</span>}
                </div>
                <div style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-dim)', fontSize:'0.68rem', marginTop:2}}>
                  {entry.points.toLocaleString()} pts
                </div>
              </div>
              {active ? (
                <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.75rem', fontWeight:700, color:'var(--wf-accent)', padding:'8px 12px', flexShrink:0}}>✓ Active</span>
              ) : unlocked ? (
                <button onClick={() => entry.type==='theme' ? onApplyTheme(entry.key) : onApplyTileBack(entry.key)}
                  style={{...btnStyle('#0e2a3a','var(--wf-accent)'), padding:'9px 14px', fontSize:'0.78rem', flexShrink:0, border:'1.5px solid #00F5C455'}}>Use</button>
              ) : (
                <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.7rem', color:'var(--wf-text-mute)', flexShrink:0}}>{Math.max(0,entry.points-career).toLocaleString()} to go</span>
              )}
            </div>
            {isNext && (
              <div style={{marginTop:10, height:7, borderRadius:4, background:'var(--wf-border)', overflow:'hidden'}}>
                <div style={{width:`${pct}%`, height:'100%', background:'linear-gradient(90deg,#FFB703,#ff9f1c)', transition:'width 0.4s'}} />
              </div>
            )}
          </div>
        );
      })}
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.66rem', textAlign:'center', margin:'6px 0 20px', lineHeight:1.5}}>
        Bolder themes &amp; backs live in the 🛍️ Shop for coins.
      </p>
    </div>
  );
}

// ─── Achievements Screen ──────────────────────────────────────────────────────
function AchievementsScreen({ onBack }) {
  const have = getAchievements();
  const liveStreak = getLiveStreak().count;
  // Streak badges are dynamic: lit while the current streak meets the threshold.
  const isGot = (a) => a.streakDays ? liveStreak >= a.streakDays : !!have[a.id];
  const unlockedCount = ACHIEVEMENTS.filter(isGot).length;
  const tiers = [...new Set(ACHIEVEMENTS.map(a => a.tier))];
  return (
    <div style={{maxWidth:440,margin:"0 auto",width:"100%"}}>
      <button onClick={onBack} style={{...btnStyle('#1e3048','#7a9cc0'),marginBottom:16,fontSize:'0.8rem'}}>← Back</button>
      <div style={{textAlign:"center",marginBottom:18}}>
        <div style={{fontSize:"2rem",marginBottom:4}}>🏆</div>
        <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 4px"}}>Achievements</h2>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-accent2)",fontSize:"0.8rem",margin:0}}>
          {unlockedCount} / {ACHIEVEMENTS.length} unlocked
        </p>
      </div>
      {tiers.map(tier => (
        <div key={tier} style={{marginBottom:16}}>
          <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.66rem",letterSpacing:"0.1em",fontWeight:700,margin:"0 0 8px"}}>{tier.toUpperCase()}</p>
          {ACHIEVEMENTS.filter(a => a.tier === tier).map(a => {
            const got = isGot(a);
            return (
              <div key={a.id} style={{
                display:"flex",alignItems:"center",gap:12,marginBottom:8,
                background:"var(--wf-surface)",border:`1.5px solid ${got?"#FFB70355":"var(--wf-border)"}`,borderRadius:12,padding:"11px 14px",
                opacity:got?1:0.6,
              }}>
                <span style={{fontSize:"1.6rem",flexShrink:0,filter:got?"none":"grayscale(1)"}}>{got?a.icon:"🔒"}</span>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{fontFamily:"'Fraunces',serif",color:got?"#F5EDD6":"var(--wf-text-dim)",fontWeight:700,fontSize:"0.95rem"}}>{a.name}</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.7rem",marginTop:2}}>{a.desc}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                  {a.reward > 0 && <span style={{fontFamily:"'JetBrains Mono',monospace",color:got?"var(--wf-accent2)":"var(--wf-text-mute)",fontSize:"0.72rem",fontWeight:700}}>{a.reward}🪙</span>}
                  {got && <span style={{color:"var(--wf-accent)",fontSize:"1.05rem"}}>✓</span>}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function ShopScreen({ onBack, balance, refreshWallet, session, activeThemeId, ownedThemes, onApplyTheme, onOwnTheme, activeTileBackId, ownedTileBacks, onApplyTileBack, onOwnTileBack }) {
  const [inv, setInv] = useState(() => {
    const m = {};
    SHOP_ITEMS.forEach(it => { m[it.key] = getInv(it.invKey); });
    return m;
  });
  const [buying, setBuying] = useState(null);  // item key while a purchase is in flight
  const [msg, setMsg] = useState(null);        // { key, text, good }
  const [themeMsg, setThemeMsg] = useState(null); // { id, text, good }
  const [backMsg, setBackMsg] = useState(null);   // { id, text, good }
  const [buyingCoins, setBuyingCoins] = useState(null); // pack id mid-checkout
  const [coinMsg, setCoinMsg] = useState(null);
  const [codeInput, setCodeInput] = useState('');
  const [redeeming, setRedeeming] = useState(false);
  const [redeemMsg, setRedeemMsg] = useState(null); // { text, good }

  async function redeem() {
    const code = codeInput.trim();
    if (!code || redeeming) return;
    if (!session?.user) { setRedeemMsg({ text:'Sign in to redeem a code.' }); return; }
    setRedeeming(true); setRedeemMsg(null);
    await ensureFreshSession();
    const res = await redeemCode(code);
    if (res.ok) {
      setRedeemMsg({ text:'✓ Code redeemed — coins added!', good:true });
      setCodeInput('');
      await refreshWallet();
    } else {
      setRedeemMsg({ text:res.msg });
    }
    setRedeeming(false);
  }

  async function buyCoins(packId) {
    if (buyingCoins) return;
    if (!session?.user) { setCoinMsg('Sign in to buy coins.'); return; }
    setBuyingCoins(packId); setCoinMsg(null);
    await ensureFreshSession();
    const res = await purchaseCoins(packId); // platform-aware (web=Stripe, native=IAP)
    if (!res.ok) { setCoinMsg(res.msg); setBuyingCoins(null); }
    // On success the browser redirects to Stripe, so no need to reset state.
  }

  async function buyTileBackFlow(t) {
    if (buying) return;
    if (!session?.user) { setBackMsg({ id:t.id, text:'Sign in to buy tile backs.' }); return; }
    if (balance < t.price) { setBackMsg({ id:t.id, text:'Not enough coins yet!' }); return; }
    setBuying('back-'+t.id); setBackMsg(null);
    await ensureFreshSession();
    const res = await buyTileBack(t.id, t.price);
    if (res.ok) {
      onOwnTileBack(t.id); onApplyTileBack(t.id);
      setBackMsg({ id:t.id, text:`✓ ${t.name} unlocked & applied!`, good:true });
      await refreshWallet();
    } else {
      setBackMsg({ id:t.id, text:res.msg });
    }
    setBuying(null);
  }

  async function buyThemeFlow(t) {
    if (buying) return;
    if (!session?.user) { setThemeMsg({ id:t.id, text:'Sign in to buy themes.' }); return; }
    if (balance < t.price) { setThemeMsg({ id:t.id, text:'Not enough coins yet!' }); return; }
    setBuying('theme-'+t.id); setThemeMsg(null);
    await ensureFreshSession();
    const res = await buyTheme(t.id, t.price);
    if (res.ok) {
      onOwnTheme(t.id); onApplyTheme(t.id);
      setThemeMsg({ id:t.id, text:`✓ ${t.name} unlocked & applied!`, good:true });
      await refreshWallet();
    } else {
      setThemeMsg({ id:t.id, text:res.msg });
    }
    setBuying(null);
  }

  // Show purchases made on other devices: pull the account inventory on open.
  useEffect(() => {
    markShopSeen(); // opening the shop clears the "new items" pulse
    ensureFreshSession().then(s => {
      if (!s?.user) return;
      syncInventoryFromServer(s.user.id).then(() => {
        // Rebuild from every shop item (was hardcoded to hint+xray, which
        // dropped the freeze count — its "owned" badge vanished on re-sync).
        setInv(Object.fromEntries(SHOP_ITEMS.map(it => [it.key, getInv(it.invKey)])));
      });
    }).catch(() => {});
  }, []);

  async function buy(item) {
    if (buying) return;
    if (balance < item.price) {
      setMsg({ key:item.key, text:'Not enough coins yet — play to earn more!' });
      return;
    }
    setBuying(item.key); setMsg(null);
    await ensureFreshSession();
    // One atomic RPC: charges the wallet AND grants the item account-wide.
    const res = await buyItem(item.key, item.price);
    if (res.ok) {
      try { localStorage.setItem(item.invKey, String(res.count)); } catch {}
      setInv(prev => ({ ...prev, [item.key]: res.count }));
      setMsg({ key:item.key, text:`✓ ${item.name} added to your kit!`, good:true });
      await refreshWallet(); // pull the new balance into the app + wf_balance cache
    } else {
      setMsg({ key:item.key, text:res.msg });
    }
    setBuying(null);
  }

  return (
    <div style={{maxWidth:440, margin:'0 auto', width:'100%'}}>
      <button onClick={onBack} style={{...btnStyle('var(--wf-border)','var(--wf-text-dim)'), marginBottom:16, fontSize:'0.8rem'}}>← Back</button>

      {/* Balance header — same source of truth as the menu pill */}
      <div style={{
        background:'linear-gradient(135deg,#0e2a3a,#0a1520)', border:'1.5px solid #00F5C4',
        borderRadius:14, padding:'14px 18px', marginBottom:18,
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.7rem', letterSpacing:'0.08em', marginBottom:4}}>YOUR COINS</div>
          <div style={{fontFamily:"'Fraunces',serif", color:'var(--wf-accent)', fontWeight:900, fontSize:'1.8rem'}}>🪙 {balance.toLocaleString()}</div>
        </div>
        <div style={{fontSize:'2rem'}}>🛍️</div>
      </div>

      {/* ── Get Coins (real money) ── */}
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.72rem', margin:'0 0 10px', letterSpacing:'0.08em'}}>GET COINS</p>
      <div style={{display:'flex', gap:8, marginBottom:6}}>
        {TOKEN_PACKS.map(p => {
          const busyPack = buyingCoins === p.id;
          return (
            <button key={p.id} onClick={() => buyCoins(p.id)} disabled={!!buyingCoins}
              style={{flex:1, background:p.best?'linear-gradient(135deg,#0e2a3a,#12253a)':'var(--wf-surface)', border:`1.5px solid ${p.best?'#FFB70366':'var(--wf-border)'}`, borderRadius:12, padding:'12px 8px', cursor:'pointer', position:'relative', opacity:busyPack?0.6:1}}>
              {p.best && <span style={{position:'absolute', top:-8, left:'50%', transform:'translateX(-50%)', background:'var(--wf-accent2)', color:'#0D1B2A', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.52rem', fontWeight:800, padding:'2px 8px', borderRadius:8, whiteSpace:'nowrap'}}>BEST VALUE</span>}
              <div style={{fontSize:'1.3rem', marginBottom:2}}>🪙</div>
              <div style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', fontWeight:800, fontSize:'0.95rem'}}>{p.coins.toLocaleString()}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-accent)', fontWeight:700, fontSize:'0.8rem', marginTop:2}}>{busyPack?'…':p.price}</div>
            </button>
          );
        })}
      </div>
      {coinMsg && (
        <p style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.7rem', margin:'0 0 6px', color:'var(--wf-accent2)'}}>{coinMsg}</p>
      )}
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.6rem', margin:'0 0 20px', lineHeight:1.5}}>
        Secure checkout via Stripe. Coins are added to your account after payment.
      </p>

      {/* ── Redeem a code ── */}
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.72rem', margin:'0 0 10px', letterSpacing:'0.08em'}}>REDEEM A CODE</p>
      <div style={{display:'flex', gap:8, marginBottom:6}}>
        <input value={codeInput} onChange={e=>setCodeInput(e.target.value)} placeholder="Enter code"
          onKeyDown={e=>e.key==='Enter'&&redeem()}
          style={{flex:1, padding:'10px 12px', borderRadius:10, border:'1.5px solid var(--wf-border)', background:'var(--wf-surface)', color:'#F5EDD6', fontFamily:"'JetBrains Mono',monospace", fontSize:'0.85rem', outline:'none'}} />
        <button onClick={redeem} disabled={redeeming || !codeInput.trim()}
          style={{...btnStyle('#0e2a3a','var(--wf-accent)'), padding:'10px 16px', fontSize:'0.8rem', flexShrink:0, border:'1.5px solid #00F5C455', opacity:(redeeming||!codeInput.trim())?0.6:1}}>
          {redeeming?'…':'Redeem'}
        </button>
      </div>
      {redeemMsg && (
        <p style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.72rem', margin:'0 0 20px', color:redeemMsg.good?'#00F5C4':'var(--wf-accent2)'}}>{redeemMsg.text}</p>
      )}
      {!redeemMsg && <div style={{marginBottom:20}} />}

      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.72rem', margin:'0 0 10px', letterSpacing:'0.08em'}}>POWER-UPS</p>

      {SHOP_ITEMS.map(item => {
        const canAfford = balance >= item.price;
        const isBuying = buying === item.key;
        return (
          <div key={item.key} style={{
            background:'var(--wf-surface)', border:'1.5px solid #1e3048', borderRadius:14,
            padding:'14px 16px', marginBottom:12,
          }}>
            <div style={{display:'flex', alignItems:'center', gap:12}}>
              <div style={{fontSize:'1.9rem', flexShrink:0}}>{item.icon}</div>
              <div style={{flex:1, textAlign:'left'}}>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', fontWeight:700, fontSize:'1.05rem'}}>{item.name}</span>
                  {inv[item.key] > 0 && (
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.65rem', fontWeight:700, background:'#00F5C422', color:'var(--wf-accent)', borderRadius:6, padding:'2px 7px'}}>
                      ×{inv[item.key]} owned
                    </span>
                  )}
                </div>
                <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-dim)', fontSize:'0.72rem', margin:'4px 0 0', lineHeight:1.4}}>{item.desc}</p>
              </div>
              <button onClick={() => buy(item)} disabled={isBuying || !canAfford}
                style={{
                  ...btnStyle(canAfford ? 'linear-gradient(90deg,#FFB703,#ff9f1c)' : 'var(--wf-border)', canAfford ? '#0D1B2A' : 'var(--wf-text-mute)'),
                  padding:'10px 14px', fontSize:'0.8rem', flexShrink:0,
                  opacity:isBuying ? 0.6 : 1, cursor:canAfford ? 'pointer' : 'default',
                }}>
                {isBuying ? '…' : `🪙 ${item.price}`}
              </button>
            </div>
            {msg?.key === item.key && (
              <p style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.72rem', margin:'10px 0 0', color:msg.good ? 'var(--wf-accent)' : 'var(--wf-accent2)'}}>
                {msg.text}
              </p>
            )}
          </div>
        );
      })}

      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'#2a4060', fontSize:'0.68rem', textAlign:'center', margin:'14px 0 0', lineHeight:1.5}}>
        Power-ups are used during a game — look for the 💡 and 🔍 buttons above the board.
      </p>

      {/* ── Themes ── */}
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.72rem', margin:'22px 0 10px', letterSpacing:'0.08em'}}>THEMES</p>
      {THEMES.filter(t => !REWARD_THEME_IDS.has(t.id)).map(t => {
        const owned = ownedThemes.has(t.id);
        const active = activeThemeId === t.id;
        const isBuying = buying === 'theme-'+t.id;
        const canAfford = balance >= t.price;
        return (
          <div key={t.id} style={{background:'var(--wf-surface)', border:`1.5px solid ${active?'#00F5C455':'var(--wf-border)'}`, borderRadius:14, padding:'12px 14px', marginBottom:12}}>
            <div style={{display:'flex', alignItems:'center', gap:12}}>
              {/* Swatch preview */}
              <div style={{width:44, height:44, borderRadius:10, flexShrink:0, background:t.bg, border:'1.5px solid #2a4060', position:'relative', overflow:'hidden'}}>
                <div style={{position:'absolute', bottom:5, left:5, display:'flex', gap:3}}>
                  <span style={{width:9, height:9, borderRadius:'50%', background:t.swatch[1]}} />
                  <span style={{width:9, height:9, borderRadius:'50%', background:t.swatch[2]}} />
                </div>
              </div>
              <div style={{flex:1, textAlign:'left'}}>
                <span style={{fontFamily:"'Fraunces',serif", color:'#F5EDD6', fontWeight:700, fontSize:'1.02rem'}}>{t.name}</span>
                {owned && <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.62rem', color:'var(--wf-text-mute)', marginLeft:8}}>owned</span>}
              </div>
              {active ? (
                <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.75rem', fontWeight:700, color:'var(--wf-accent)', padding:'8px 12px', flexShrink:0}}>✓ Active</span>
              ) : owned ? (
                <button onClick={() => onApplyTheme(t.id)} style={{...btnStyle('#0e2a3a','var(--wf-accent)'), padding:'9px 14px', fontSize:'0.78rem', flexShrink:0, border:'1.5px solid #00F5C455'}}>Use</button>
              ) : (
                <button onClick={() => buyThemeFlow(t)} disabled={isBuying || !canAfford}
                  style={{...btnStyle(canAfford?'linear-gradient(90deg,#FFB703,#ff9f1c)':'var(--wf-border)', canAfford?'#0D1B2A':'var(--wf-text-mute)'), padding:'9px 14px', fontSize:'0.78rem', flexShrink:0, opacity:isBuying?0.6:1, cursor:canAfford?'pointer':'default'}}>
                  {isBuying ? '…' : `🪙 ${t.price}`}
                </button>
              )}
            </div>
            {themeMsg?.id === t.id && (
              <p style={{fontFamily:"'JetBrains Mono',monospace", fontSize:'0.72rem', margin:'10px 0 0', color:themeMsg.good ? 'var(--wf-accent)' : 'var(--wf-accent2)'}}>
                {themeMsg.text}
              </p>
            )}
          </div>
        );
      })}

      {/* ── Tile Backs ── */}
      <p style={{fontFamily:"'JetBrains Mono',monospace", color:'var(--wf-text-mute)', fontSize:'0.72rem', margin:'22px 0 10px', letterSpacing:'0.08em'}}>TILE BACKS</p>
      {TILE_BACKS.filter(t => !REWARD_BACK_IDS.has(t.id)).map(t => {
        const owned = ownedTileBacks.has(t.id);
        const active = activeTileBackId === t.id;
        const isBuying = buying === 'back-'+t.id;
        const canAfford = balance >= t.price;
        const prev = t.themed ? activeTileBack() : { bg:t.bg, dot:t.dot, symbol:t.symbol, symbolColor:t.symbolColor };
        return (
          <div key={t.id} style={{background:'var(--wf-surface)', border:`1.5px solid ${active?'#00F5C455':'var(--wf-border)'}`, borderRadius:14, padding:'12px 14px', marginBottom:12}}>
            <div style={{display:'flex', alignItems:'center', gap:12}}>
              {/* Mini tile-back preview */}
              <div style={{width:44, height:44, borderRadius:9, flexShrink:0, border:'1.5px solid #2a4060',
                display:'flex', alignItems:'center', justifyContent:'center',
                backgroundImage:`radial-gradient(circle at 30% 30%, ${prev.dot} 1px, transparent 1px),radial-gradient(circle at 70% 70%, ${prev.dot} 1px, transparent 1px),${prev.bg}`,
                backgroundSize:'10px 10px, 10px 10px, 100% 100%'}}>
                <span style={{color:prev.symbolColor, fontSize:'1.2rem', fontWeight:900}}>{prev.symbol}</span>

function WordFlip() {
  // Deep link: opening an invite link (?room=CODE) lands directly in Online Play,
  // where the room code is pre-filled and auto-join fires if a name is saved.
  const [screen,setScreen] = useState(() =>
    new URLSearchParams(window.location.search).get('room') ? "multi-online" : "menu");
  const [soloLarge,setSoloLarge] = useState(false);
  const [authMode,setAuthMode] = useState("signin");
  const openAuth = (m) => { setAuthMode(m || "signin"); setScreen("auth"); };
  const [winResult,setWinResult] = useState(null);
  const [winMode,setWinMode] = useState("");
  const [winStreak,setWinStreak] = useState(0);
  const [winStreakBonus,setWinStreakBonus] = useState(0); // milestone tokens earned this win
  const [purchaseMsg,setPurchaseMsg] = useState(null); // coin-purchase return banner
  const [achToast,setAchToast] = useState([]); // achievement ids currently toasting
  function showAchievements(ids) {
    if (!ids || !ids.length) return;
    setAchToast(ids);
    setTimeout(() => setAchToast([]), 4800);
    // Pay the token rewards (signed-in only; idempotent per achievement).
    if (session?.user) {
      ensureFreshSession().then(() => grantAchievementRewards(ids).then(refreshWallet));
    }
  }
  // Career progression (earn cosmetics by playing). Local total; reward-unlock
  // toasts fire when a game pushes the total past a ladder milestone.
  const [career,setCareer] = useState(()=>getCareerPoints());
  const [rewardToast,setRewardToast] = useState([]);
  function showRewardToast(entries) {
    if (!entries || !entries.length) return;
    setRewardToast(entries);
    setTimeout(() => setRewardToast([]), 4800);
  }
  // Does the Rewards button deserve a glow? (Unlocked-but-unseen rewards exist.)
  // Recomputed each render; opening the Rewards screen marks them seen.
  const rewardsNew = rewardsHasNew(career);
  // Cosmetic theme (accent + background). Selection is local; ownership is
  // account-level (derived from token_transactions).
  const [activeThemeId,setActiveThemeIdState] = useState(()=>getActiveThemeId());
  const [ownedThemes,setOwnedThemes] = useState(()=>new Set(FREE_THEMES));
  const theme = themeById(activeThemeId);
  function applyTheme(id) { setActiveThemeId(id); setActiveThemeIdState(id); }
  // Tile back (face-down card design) — selection local, ownership account-level.
  const [activeTileBackId,setActiveTileBackIdState] = useState(()=>getActiveTileBackId());
  const [ownedTileBacks,setOwnedTileBacks] = useState(()=>new Set(FREE_TILEBACKS));
  function applyTileBack(id) { setActiveTileBackId(id); setActiveTileBackIdState(id); }
  useEffect(() => {
    const t = themeById(activeThemeId);
    const chrome = THEME_CHROME[activeThemeId] || THEME_CHROME.default;
    try { document.body.style.background = t.bg; } catch {}
    // Paint the root + the PWA status-bar tint so the strip above the app
    // (the notch / browser top bar) matches the theme instead of staying navy.
    try { document.documentElement.style.background = chrome.top; } catch {}
    try {
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', chrome.top);
    } catch {}
  }, [activeThemeId]);
  const [winIsNewBest,setWinIsNewBest] = useState(false);
  const [showTutorial,setShowTutorial] = useState(()=>{
    try { return !localStorage.getItem(TUTORIAL_KEY); } catch { return true; }
  });
  function closeTutorial() {
    try { localStorage.setItem(TUTORIAL_KEY,"1"); } catch {}
    setShowTutorial(false);
  }
  const [soloWords,setSoloWords] = useState(null);
  const [fireworks,setFireworks] = useState(false);
  const { session, profile, loading: authLoading, refreshProfile, recovery, clearRecovery, balance, refreshWallet, signOut } = useAuth();

  // Bumped when the server says today's daily was played on another device —
  // forces a re-render so the menu button flips to "✓ Done today".
  const [, setDailySyncTick] = useState(0);

  useEffect(() => {
    if (session?.user) {
      if (getDailyDone()) {
        retroSubmitTodayScore(session.user.id);
      } else {
        syncDailyDoneFromServer(session.user.id).then(found => {
          if (found) {
            setDailySyncTick(t => t + 1);
            // If they'd already wandered into the daily on this device, bounce
            // them to the Already Played screen instead of letting a replay run.
            setScreen(sc => sc === "daily" ? "daily-done" : sc);
          }
        });
      }
      grantEarnedTokens(session.user.id).then(refreshWallet);
      syncInventoryFromServer(session.user.id); // power-ups follow the account
      fetchOwnedThemes(session.user.id).then(setOwnedThemes); // themes follow the account
      fetchOwnedTileBacks(session.user.id).then(setOwnedTileBacks); // tile backs too
      // Career points follow the account: migrate any guest-earned points once,
      // then treat the server total as the source of truth. Fails soft to local
      // if section 13 hasn't been applied yet.
      (async () => {
        const uid = session.user.id;
        const server = await fetchCareerRemote(uid);
        if (server == null) return; // table/RPC not there yet — stay local-only
        const local = getCareerPoints();
        const migKey = 'wf_career_migrated_' + uid;
        let total = server;
        if (!localStorage.getItem(migKey) && local > server) {
          const merged = await addCareerRemote(local - server); // one-time guest → account
          if (merged != null) total = merged;
        }
        try { localStorage.setItem(migKey, '1'); } catch (e) {}
        try { localStorage.setItem('wf_career', String(total)); } catch (e) {}
        setCareer(total);
      })();
      // Reconcile achievement rewards: pays any unlocked-but-unpaid badges
      // (e.g. earned while signed out, or a grant that failed earlier).
      ensureFreshSession().then(() => grantAchievementRewards(Object.keys(getAchievements())).then(refreshWallet));
    }
  }, [session?.user?.id]);

  useEffect(() => {
    if (recovery) setScreen("reset-password");
  }, [recovery]);

  // Returning from Stripe Checkout (?purchase=success|cancel). Coins are credited
  // server-side by the webhook, so just refresh the wallet a few times to catch
  // the async credit, show a banner, and clean the URL.
  useEffect(() => {
    const p = new URLSearchParams(window.location.search).get('purchase');
    if (!p) return;
    if (p === 'success') {
      refreshWallet();
      setTimeout(refreshWallet, 2500);
      setTimeout(refreshWallet, 6000);
      setPurchaseMsg('🪙 Payment complete — your coins are on the way!');
      setTimeout(() => setPurchaseMsg(null), 6000);
    }
    try { window.history.replaceState({}, '', window.location.pathname); } catch(e) {}
  }, []);

  const dailyBest = getDailyBest();

  function startSolo(large) {
    setSoloLarge(large);
    setSoloWords(shuffle([...pickRandom(large?ALL_WORDS_9:ALL_WORDS_4)]));
    setScreen("solo");
  }

  // Daily Nine bonus solved: pay the flat reward once per day (idempotent by
  // date-keyed reason). Guests can play, but only signed-in users get paid.
  function handleNineSolve() {
    setNineDoneLS({ solved:true });
    if (session?.user) {
      ensureFreshSession().then(()=> grantTokens(NINE_REWARD, nineReason()).then(refreshWallet));
    }
  }

  function handleWin(result,mode) {
    setWinResult(result); setWinMode(mode);
    setFireworks(true); setTimeout(()=>setFireworks(false),4000);
    let dailyStreakCount = 0;
    const wordResultsArr = result.words.map((_,i) => result.wordResults?.[i] || (result.outOfTurns ? "missed" : "yellow"));
    const score = scoreCalc(result.elapsed, wordResultsArr, result.wrongGuesses, result.bonusPts||0);
    // Career progression: every point counts toward the rewards ladder. Fire a
    // toast for any cosmetic milestone this game just crossed.
    {
      const before = getCareerPoints();
      const after = addCareerPoints(score); // optimistic local update
      setCareer(after);
      const crossed = REWARD_LADDER.filter(r => before < r.points && after >= r.points);
      if (crossed.length) showRewardToast(crossed);
      // Sync to the account; the authoritative server total wins if it differs
      // (e.g. points earned on another device). Fails soft to the local total.
      if (session?.user) {
        ensureFreshSession().then(() => addCareerRemote(score)).then(total => {
          if (total != null) { try { localStorage.setItem('wf_career', String(total)); } catch (e) {} setCareer(total); }
        });
      }
    }
    if (mode==="daily") {
      saveDailyBest(score);
      setDailyDone({turns:result.turns,elapsed:result.elapsed,score,wordResults:result.wordResults||{},wrongGuesses:result.wrongGuesses||0,outOfTurns:result.outOfTurns||false,bonusPts:result.bonusPts||0,bonusWords:result.bonusWords||[]});
      const s = updateStreak();
      setWinStreak(s.count);
      // Milestone bonus = value of any week-boundary crossed this play (0 if none).
      const weekBefore = Math.floor((s.prevCount || 0) / 7);
      const weekNow = Math.floor(s.count / 7);
      const streakMilestoneBonus = weekNow > weekBefore ? streakWeekBonus(weekNow) : 0;
      setWinStreakBonus(streakMilestoneBonus);
      setWinIsNewBest(score > getPersonalBest());
      const d = new Date();
      const blocks = result.words.map((_,i) => {
        const r = result.wordResults?.[i];
        return r==="green" ? "🟩" : r==="yellow" ? "🟨" : "🟥";
      }).join("");
      if (session?.user) {
        // Refresh the token first so a day-old session's expired JWT doesn't
        // cause the write to be silently rejected (it would only land on next sign-in).
        ensureFreshSession().then(() => {
          submitDailyScore(session.user.id, score, dateKey().replace('wf_',''), result.turns, result.elapsed, result.wrongGuesses||0, blocks, getDailyHelps());
          grantTokens(dailyTokens(score), 'daily-' + dateKey().replace('wf_','')).then(refreshWallet);
          // Weekly streak milestone: pay when the streak crosses a multiple of
          // 7. Uses week-boundary crossing (not exact %7) so a Streak Freeze
          // that jumps the count over a milestone (e.g. 6 -> 8) still pays it.
          // Reason keyed to today's date — idempotent, can't double-pay.
          if (streakMilestoneBonus > 0) {
            grantTokens(streakMilestoneBonus, 'streakwk-' + dateKey().replace('wf_','')).then(refreshWallet);
          }
        });
      }
      saveToHistory({
        dayKey: dateKey(),
        helps: getDailyHelps(), // power-up uses today (0 = clean score; indicator TBD)
        date: d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
        shortDate: d.toLocaleDateString("en-US",{month:"short",day:"numeric"}),
        isoDate: d.toISOString(),
        score,
        turns: result.turns,
        elapsed: result.elapsed,
        blocks,
        wrongGuesses: result.wrongGuesses||0,
        outOfTurns: result.outOfTurns||false,
      });
      dailyStreakCount = s.count;
    } else if (mode==="solo") {
      // Repeatable grant — unique reason each game so it always pays out.
      // 50 + 1% of score, so bigger/better games earn a bit more.
      if (session?.user) {
        ensureFreshSession().then(() =>
          grantTokens(soloTokens(score), 'solo-' + Date.now()).then(refreshWallet));
      }
    }
    // Achievements (daily + solo). Evaluated from the finished game plus running
    // counters; unlock-once, and any freshly unlocked ones raise a toast.
    const gamesPlayed = bumpGamesPlayed();
    // No-hints truth: daily counts every help used today (survives resume);
    // solo uses this game's own flag.
    const helpsUsed = mode==="daily" ? getDailyHelps() : (result.usedHelp ? 1 : 0);
    const earned = evaluateAchievements({
      wordResults: wordResultsArr,
      turns: result.turns,
      elapsed: result.elapsed,
      wrongGuesses: result.wrongGuesses || 0,
      helpsUsed,
      usedHint: result.usedHint, usedXray: result.usedXray,
      outOfTurns: result.outOfTurns,
      streak: mode==="daily" ? dailyStreakCount : getLiveStreak().count,
      gamesPlayed,
      isDaily: mode==="daily",
      mode,
    });
    showAchievements(unlockAchievements(earned));
    setScreen("win");
  }

  return (
    <div style={{minHeight:"100dvh",overflowY:"auto",overflowX:"hidden",background:theme.bg,transition:"background 0.4s ease",display:"flex",flexDirection:"column",alignItems:"center",padding:"clamp(12px,4vw,32px)",paddingTop:"calc(clamp(12px,4vw,32px) + env(safe-area-inset-top))",fontFamily:"sans-serif",...themeCssVars(activeThemeId)}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,700&family=JetBrains+Mono:wght@400;700;800&display=swap');
        @keyframes fadeInOut{0%{opacity:0;transform:translateY(-4px)}20%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
        @keyframes menuIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        @keyframes receiptIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

        @keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
        @keyframes fwParticle{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--fw-tx),var(--fw-ty)) scale(0);opacity:0}}

        .tokenPill:hover{box-shadow:0 0 12px #00F5C455;opacity:1;}
        .tokenPill:active{transform:scale(0.93);}
        @keyframes hintWiggle{0%,100%{transform:rotate(0) scale(1)}15%{transform:rotate(-9deg) scale(1.1)}35%{transform:rotate(9deg) scale(1.1)}55%{transform:rotate(-6deg) scale(1.06)}75%{transform:rotate(6deg) scale(1.04)}}

        @keyframes achIn{from{opacity:0;transform:translateY(-16px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes shopPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 transparent)}50%{transform:scale(1.09);filter:drop-shadow(0 0 6px var(--wf-accent))}}

          </button>
        )}
        <button onClick={()=>setShowTutorial(true)} style={{position:"fixed",top:"calc(16px + env(safe-area-inset-top))",right:16,background:"var(--wf-border)",border:"1.5px solid #2a4060",borderRadius:"50%",width:32,height:32,cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",color:"var(--wf-text-dim)",fontSize:"0.8rem",fontWeight:700,padding:0,zIndex:50}} aria-label="How to play">?</button>
      </>)}
      {/* On the menu, push the title below the fixed top controls (avatar + token
          pill on the left, help on the right) so a wide balance can't overlap it */}
      <div style={{marginTop:screen==="menu"?40:0,marginBottom:screen==="menu"?28:16,textAlign:"center",animation:"menuIn 0.5s ease"}}>
        <h1 style={{fontFamily:"'Fraunces',serif",fontWeight:900,fontStyle:"italic",fontSize:"clamp(2rem,6vw,3.2rem)",background:theme.title,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:0,letterSpacing:"-0.02em"}}>WordFlip</h1>
        {screen==="menu"&&(
          <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginTop:4}}>
            <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.8rem",margin:0}}>remember · flip · spell</p>
          </div>
        )}
      </div>

      {screen==="menu"&&(
        <div style={{width:"100%",maxWidth:360,animation:"menuIn 0.5s ease"}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button onClick={()=>{ if(getDailyDone()){setScreen("daily-done");}else{setScreen("daily");}}} style={{...btnStyle("linear-gradient(90deg,#FFB703,#ff9f1c)","#0D1B2A"),padding:"14px 24px",fontSize:"1rem",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>⚡ Daily Challenge</span>
              <span style={{fontSize:"0.75rem",opacity:0.7}}>
                {getDailyDone()?"✓ Done today":getDailyProgress()?"▶ Resume":dailyBest?`Best: ${dailyBest.toLocaleString()}`:"Play today!"}
              </span>
            </button>
            {getLiveStreak().count > 0 && (
              <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-accent2)",fontSize:"0.74rem",textAlign:"center",margin:"-2px 0 0"}}>
                Current streak: {getLiveStreak().count}🔥
              </p>
            )}
            <button onClick={()=>setScreen("solo-setup")} style={{...btnStyle("#162030","#F5EDD6"),padding:"13px 24px",fontSize:"0.95rem",borderRadius:12,border:"1.5px solid var(--wf-border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>🔤 Solo Play</span><span style={{fontSize:"0.75rem",color:"var(--wf-text-dim)"}}>→</span>
            </button>
            <button onClick={()=>setScreen("multi-setup")} style={{...btnStyle("#162030","#F5EDD6"),padding:"13px 24px",fontSize:"0.95rem",borderRadius:12,border:"1.5px solid #00F5C444",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>👥 Multiplayer</span><span style={{fontSize:"0.75rem",color:"var(--wf-accent)"}}>→</span>
            </button>
            {!session && (
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>openAuth("signup")} style={{...btnStyle("linear-gradient(90deg,#00c49f,#00F5C4)","#0a2e24"),flex:1,padding:"12px",fontSize:"0.9rem",borderRadius:12}}>Sign Up</button>
                <button onClick={()=>openAuth("signin")} style={{...btnStyle("#162030","#F5EDD6"),flex:1,padding:"12px",fontSize:"0.9rem",borderRadius:12,border:"1.5px solid var(--wf-border)"}}>Sign In</button>
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>setScreen("leaderboard")} style={{...btnStyle("transparent","var(--wf-text-dim)"),padding:"10px 16px",fontSize:"0.85rem",border:"none",textDecoration:"underline"}}>
                🏆 Scores {getPersonalBest()>0?`· ${getPersonalBest().toLocaleString()}`:""}
              </button>
              <button onClick={()=>setScreen("achievements")} style={{...btnStyle("transparent","var(--wf-text-dim)"),padding:"10px 16px",fontSize:"0.85rem",border:"none",textDecoration:"underline"}}>
                🏅 Achievements
              </button>
              <button onClick={()=>setScreen("rewards")} style={{
                ...btnStyle("transparent", rewardsNew?"var(--wf-accent)":"var(--wf-text-dim)"),
                padding:"10px 16px",fontSize:"0.85rem",border:"none",textDecoration:"underline",
                fontWeight: rewardsNew?800:700,
                animation: rewardsNew?"shopPulse 1.5s ease-in-out infinite":"none",
              }}>
                🎁 Rewards{rewardsNew?" ✨":""}
              </button>
              {session && (
                <button onClick={()=>setScreen("shop")} style={{
                  ...btnStyle("transparent", shopHasNew()?"var(--wf-accent)":"var(--wf-text-dim)"),
                  padding:"10px 16px",fontSize:"0.85rem",border:"none",textDecoration:"underline",
                  fontWeight: shopHasNew()?800:700,
                  animation: shopHasNew()?"shopPulse 1.5s ease-in-out infinite":"none",
                }}>
                  🛍️ Shop{shopHasNew()?" ✨":""}
                </button>
              )}
            </div>
          </div>
          <div style={{marginTop:24,padding:14,background:"var(--wf-surface)",borderRadius:12,border:"1.5px solid var(--wf-border)"}}>
            <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.75rem",margin:0,lineHeight:1.7}}>
              <strong style={{color:"var(--wf-text-dim)"}}>How to play:</strong> Flip 4 tiles to spell a word. 🟩 In order = +300, 🟨 any order = +100. Bonus points for speed (600) and accuracy (1200)!
            </p>
          </div>
          <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.66rem",textAlign:"center",marginTop:18}}>
            <a href="/privacy.html" style={{color:"var(--wf-text-mute)",textDecoration:"underline"}}>Privacy</a>
            {" · "}
            <a href="/terms.html" style={{color:"var(--wf-text-mute)",textDecoration:"underline"}}>Terms</a>
          </p>
        </div>
      )}

      {screen==="solo-setup"&&<SoloSetup onBack={()=>setScreen("menu")} onStart={(l)=>startSolo(l)} />}
      {screen==="multi-setup"&&<MultiSetup onBack={()=>setScreen("menu")} onLocal={()=>setScreen("multi-local")} onOnline={()=>setScreen("multi-online")} />}

      {screen==="solo"&&soloWords&&(
        <div style={{width:"100%",animation:"menuIn 0.3s ease"}}>
          <button onClick={()=>setScreen("solo-setup")} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),marginBottom:14,fontSize:"0.8rem"}}>← Back</button>
          <GameBoard words={soloWords} onWin={r=>handleWin(r,"solo")} timeLimit={null} />
        </div>
      )}

      {screen==="daily"&&(
        <div style={{width:"100%",animation:"menuIn 0.3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <button onClick={()=>setScreen("menu")} style={{...btnStyle("var(--wf-border)","var(--wf-text-dim)"),fontSize:"0.8rem"}}>← Menu</button>
            <span style={{fontFamily:"'Fraunces',serif",color:"var(--wf-accent2)",fontSize:"0.9rem"}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
          </div>
          <GameBoard words={getDailyWords()} onWin={r=>handleWin(r,"daily")} timeLimit={null} maxTurns={16} isDaily />
        </div>
      )}

      {screen==="daily-done"&&<DailyAlreadyDone onMenu={()=>setScreen("menu")} session={session} onAuth={openAuth} onNine={()=>setScreen("daily-nine")} />}

      {screen==="daily-nine"&&<DailyNine onBack={()=>setScreen(getDailyDone()?"daily-done":"menu")} onSolve={handleNineSolve} signedIn={!!session} />}

      {screen==="win"&&winResult&&(
        <div style={{width:"100%",animation:"menuIn 0.4s ease"}}>
          <WinScreen result={winResult} mode={winMode} onPlayAgain={()=>startSolo(soloLarge)} onMenu={()=>setScreen("menu")} isDaily={winMode==="daily"} streak={winStreak} streakBonus={winStreakBonus} isNewBest={winIsNewBest} signedIn={!!session} onShop={()=>setScreen("shop")} />
          {!session && (winMode==="daily"||winMode==="solo") && (()=>{
            const wr = winResult.words.map((_,i)=>winResult.wordResults?.[i]||(winResult.outOfTurns?"missed":"yellow"));
            const wscore = scoreCalc(winResult.elapsed, wr, winResult.wrongGuesses, winResult.bonusPts||0);
            const daily = winMode==="daily";
            const wouldEarn = daily ? dailyTokens(wscore)+(winStreakBonus||0) : soloTokens(wscore);
            return (
              <div style={{
                maxWidth:380,margin:"14px auto 0",padding:"14px 16px",borderRadius:12,
                background:"linear-gradient(135deg,#0e2a3a,#1a1200)",border:"1.5px solid #FFB70366",
              }}>
                <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#F5EDD6",fontSize:"0.82rem",fontWeight:700,margin:"0 0 4px",textAlign:"center"}}>
                  🪙 {daily ? `This game earned ${wouldEarn.toLocaleString()} coins` : `A game like this is worth ${wouldEarn.toLocaleString()} coins`}
                </p>
                <p style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.68rem",margin:"0 0 12px",textAlign:"center",lineHeight:1.5}}>
                  {daily
                    ? <>You're playing as a guest — sign up free to <strong style={{color:"var(--wf-accent2)"}}>claim your coins</strong> and <strong style={{color:"var(--wf-accent)"}}>land on the leaderboard</strong>.</>
                    : <>Sign up free to <strong style={{color:"var(--wf-accent2)"}}>start earning coins</strong> for the shop &amp; power-ups.</>}
                </p>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>openAuth("signup")} style={{...btnStyle("linear-gradient(90deg,#FFB703,#ff9f1c)","#0D1B2A"),flex:1,padding:"10px",fontSize:"0.85rem"}}>{daily?"Sign Up & Claim":"Sign Up Free"}</button>
                  <button onClick={()=>openAuth("signin")} style={{...btnStyle("var(--wf-border)","#F5EDD6"),flex:1,padding:"10px",fontSize:"0.85rem"}}>Sign In</button>
                </div>
              </div>
            );
          })()}
          {winMode==="daily" && <div style={{maxWidth:380,margin:"14px auto 0"}}><DailyNineCard onPlay={()=>setScreen("daily-nine")} signedIn={!!session} /></div>}
        </div>
      )}

      {screen==="multi-local"&&<div style={{width:"100%",animation:"menuIn 0.3s ease"}}><LocalMultiScreen onBack={()=>setScreen("multi-setup")} refreshWallet={refreshWallet} onAchievements={showAchievements} /></div>}
      {screen==="multi-online"&&<div style={{animation:"menuIn 0.3s ease"}}><OnlineScreen onBack={()=>setScreen("multi-setup")} refreshWallet={refreshWallet} onAchievements={showAchievements} /></div>}
      {screen==="leaderboard"&&<div style={{width:"100%",maxWidth:440,animation:"menuIn 0.3s ease"}}><LeaderboardView onBack={()=>setScreen("menu")} session={session} onSignIn={()=>setScreen("auth")} onAchievements={showAchievements} /></div>}
      {screen==="achievements"&&<div style={{width:"100%",maxWidth:440,animation:"menuIn 0.3s ease"}}><AchievementsScreen onBack={()=>setScreen("menu")} /></div>}
      {screen==="rewards"&&<div style={{width:"100%",maxWidth:440,animation:"menuIn 0.3s ease"}}><RewardsScreen onBack={()=>setScreen("menu")} career={career} activeThemeId={activeThemeId} activeTileBackId={activeTileBackId} onApplyTheme={applyTheme} onApplyTileBack={applyTileBack} /></div>}
      {screen==="auth"&&<AuthScreen initialMode={authMode} onBack={()=>setScreen("menu")} onAuth={async ()=>{
        await refreshProfile();
        const s = await authGetSession();
        if (s?.user) retroSubmitTodayScore(s.user.id);
        setScreen("menu");
      }} />}
      {screen==="reset-password"&&<AuthScreen recoveryMode onResetDone={async ()=>{
        clearRecovery();
        await refreshProfile();
        setScreen("menu");
      }} />}
      {screen==="profile"&&<ProfileScreen onBack={()=>setScreen("menu")} profile={profile} onSignOut={signOut} balance={balance} />}
      {screen==="shop"&&<div style={{width:"100%",animation:"menuIn 0.3s ease"}}><ShopScreen onBack={()=>setScreen("menu")} balance={balance} refreshWallet={refreshWallet} session={session} activeThemeId={activeThemeId} ownedThemes={ownedThemes} onApplyTheme={applyTheme} onOwnTheme={(id)=>setOwnedThemes(prev=>new Set([...prev,id]))} activeTileBackId={activeTileBackId} ownedTileBacks={ownedTileBacks} onApplyTileBack={applyTileBack} onOwnTileBack={(id)=>setOwnedTileBacks(prev=>new Set([...prev,id]))} /></div>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<WordFlip />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then(reg => {
          console.log("WordFlip SW registered:", reg.scope);

          // When a new SW is found, prompt the user to update
          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                // Show a subtle update banner
                const banner = document.createElement("div");
                banner.innerHTML = `
                  <div style="
                    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
                    background:#00F5C4; color:#0a2e24; padding:10px 20px; border-radius:20px;
                    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:0.85rem;
                    box-shadow:0 4px 16px #00000055; z-index:9999; white-space:nowrap;
                    cursor:pointer; animation:menuIn 0.3s ease;
                  " onclick="window.location.reload()">
                    ✨ New version available — tap to update
                  </div>`;
                document.body.appendChild(banner);
                // Auto-dismiss after 10 seconds
                setTimeout(() => banner.remove(), 10000);
              }
            });
          });
        }).catch(err => console.log("SW registration failed:", err));

        // SW_UPDATED fires when a new service worker activates.
        // We no longer auto-reload here — the update banner (above) lets
        // the user choose when to reload, so an active session isn't lost silently.
      });
    }
  </script>
