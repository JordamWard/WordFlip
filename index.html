// Daily words: deterministic by date from the 4-word bank
function getDailyWords() {
  const d = new Date();
  const idx = (d.getFullYear() * 500 + (d.getMonth()+1) * 31 + d.getDate()) % ALL_WORDS_4.length;
  return ALL_WORDS_4[idx];
}

function dateKey() {
  const d = new Date();
  return `wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickRandom(pool) {
  return pool[Math.floor(Math.random()*pool.length)];
}

function buildTiles(words) {
  const tiles = [];
  words.forEach((word,wi) => word.split("").forEach((letter,li) => {
    tiles.push({ id:`${wi}-${li}`, letter });
  }));
  return shuffle(tiles);
}

function formatTime(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,"0")}`;
}

function scoreCalc(ms, wordResults, wrongGuesses) {
  const greenPts = wordResults.filter(r=>r==="green").length * 300;
  const yellowPts = wordResults.filter(r=>r==="yellow").length * 100;
  // "missed" words score 0 — no bonus for unfound words
  const timeBonus = Math.max(0, 600 - Math.floor(ms/1000)); // 600 pts, -1/sec over 6 min
  const guessBonus = Math.max(0, 800 - (wrongGuesses||0) * 50); // 800 pts, -50 per wrong guess
  return greenPts + yellowPts + timeBonus + guessBonus;
}

// ─── localStorage helpers ─────────────────────────────────────────────────────
// ─── Personal history (sorted by date, newest first) ─────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem("wf_history")||"[]"); } catch { return []; }
}
function saveToHistory(entry) {
  const history = getHistory();
  // One entry per day — replace if already played today
  const filtered = history.filter(e => e.dayKey !== entry.dayKey);
  filtered.unshift(entry); // newest first
  localStorage.setItem("wf_history", JSON.stringify(filtered.slice(0, 365)));
}
function getPersonalBest() {
  const h = getHistory();
  return h.length ? Math.max(...h.map(e => e.score)) : 0;
}
function getDailyBest() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_best")||"null"); } catch { return null; }
}
function saveDailyBest(score) {
  const best = getDailyBest();
  if (!best || score > best) localStorage.setItem(dateKey()+"_best", JSON.stringify(score));
}
// Keep old leaderboard getter for any legacy data migration
function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem("wf_leaderboard")||"[]"); } catch { return []; }
}
function getDailyDone() {
  try { return JSON.parse(localStorage.getItem(dateKey()+"_done")||"null"); } catch { return null; }
}
function setDailyDone(result) {
  localStorage.setItem(dateKey()+"_done", JSON.stringify(result));
}

// ─── Streak helpers (no login needed — stored per device) ─────────────────────
function getStreak() {
  try { return JSON.parse(localStorage.getItem("wf_streak")||'{"count":0,"lastDate":""}'); }
  catch { return { count:0, lastDate:"" }; }
}
function updateStreak() {
  const today = dateKey();
  const s = getStreak();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate()-1);
    return `wf_${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  })();
  if (s.lastDate === today) return s; // already counted today
  const newCount = s.lastDate === yesterday ? s.count + 1 : 1;
  const updated = { count: newCount, lastDate: today };
  localStorage.setItem("wf_streak", JSON.stringify(updated));
  return updated;
}

// ─── Share helper ─────────────────────────────────────────────────────────────
function buildShareText(turns, ms, score, wordResults, totalWords) {
  const d = new Date();
  const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  // wordResults array may be shorter than totalWords if player ran out of turns
  const blocks = Array.from({length: totalWords || wordResults.length}, (_,i) => {
    const r = wordResults[i];
    if (r === "green") return "\u{1F7E9}";
    if (r === "yellow") return "\u{1F7E8}";
    return "\u{1F7E5}"; // 🟥 not found
  }).join("");
  return "WordFlip Daily \u00B7 " + date + "\n"
    + blocks + "\n"
    + turns + " guess" + (turns !== 1 ? "es" : "") + " \u00B7 " + formatTime(ms) + " \u00B7 " + score.toLocaleString() + " pts\n"
    + "https://wordflipgame.netlify.app";
}

// ─── Fireworks ────────────────────────────────────────────────────────────────
function Fireworks({ active }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particles = useRef([]);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const colors = ["#00F5C4","#FFB703","#FF5E5B","#9B5DE5","#F5EDD6","#00BBF9"];
    particles.current = [];
    for (let b=0; b<8; b++) {
      const x=Math.random()*canvas.width, y=Math.random()*canvas.height*0.6+50;
      const color=colors[Math.floor(Math.random()*colors.length)];
      for (let p=0; p<40; p++) {
        const angle=(Math.PI*2*p)/40+Math.random()*0.3, speed=Math.random()*6+2;
        particles.current.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,alpha:1,color,r:Math.random()*3+1});
      }
    }
    function frame() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.current = particles.current.filter(p=>p.alpha>0.02);
      particles.current.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.alpha*=0.96;
        ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (particles.current.length>0) animRef.current=requestAnimationFrame(frame);
    }
    animRef.current=requestAnimationFrame(frame);
    return ()=>cancelAnimationFrame(animRef.current);
  },[active]);
  if (!active) return null;
  return <canvas ref={canvasRef} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999}} />;
}

// ─── Sound Manager ────────────────────────────────────────────────────────────
const soundManager = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, dur, type="sine", vol=0.25, delay=0) {
    try {
      const c = ac(), osc = c.createOscillator(), g = c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      g.gain.setValueAtTime(0, c.currentTime + delay);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }
  return {
    flip()       { tone(520, 0.05, "triangle", 0.12); tone(280, 0.08, "triangle", 0.07, 0.03); },
    select()     { tone(880, 0.04, "sine", 0.1); },
    wordGreen()  { [523,659,784,1047].forEach((f,i) => tone(f, 0.22, "sine", 0.22, i*0.08)); },
    wordYellow() { [523,659,784].forEach((f,i) => tone(f, 0.18, "sine", 0.14, i*0.09)); },
    wrong()      { tone(180, 0.12, "sawtooth", 0.18); tone(140, 0.18, "triangle", 0.1, 0.06); },
    complete()   { [523,659,784,1047,1319,784,1047].forEach((f,i) => tone(f, 0.28, "sine", 0.2, i*0.07)); },
  };
})();

          position:"absolute",inset:0,backfaceVisibility:"hidden",
          transform:"rotateY(180deg)",borderRadius:10,

// ─── Game Board ───────────────────────────────────────────────────────────────
function GameBoard({ words, onWin, timeLimit, onTimeUp, maxTurns }) {
  const cols = words.length===4?4:6;
  const [tiles] = useState(()=>buildTiles(words));
  const [flipped, setFlipped] = useState([]);
  const [found, setFound] = useState([]);
  const [foundTileIds, setFoundTileIds] = useState(new Set());
  const [error, setError] = useState([]);
  const [turns, setTurns] = useState(0);
  const [hadError, setHadError] = useState(false);
  const [wrongGuesses, setWrongGuesses] = useState(0);
  const [wordResults, setWordResults] = useState({});
  const [foundInOrderSet, setFoundInOrderSet] = useState(new Set());
  const [elapsed, setElapsed] = useState(0);
  const [started, setStarted] = useState(false);
  const [flash, setFlash] = useState(null);
  const [outOfTurns, setOutOfTurns] = useState(false);
  const [floatingScores, setFloatingScores] = useState([]);
  const [scorePop, setScorePop] = useState(false);
  const timerRef = useRef(null);
  const startRef = useRef(null);
  const floatIdRef = useRef(0);

  useEffect(()=>{
    if (!started) return;
    startRef.current = Date.now()-elapsed;
    timerRef.current = setInterval(()=>{
      const e = Date.now()-startRef.current;
      setElapsed(e);
      if (timeLimit && e>=timeLimit*1000) { clearInterval(timerRef.current); onTimeUp&&onTimeUp(); }
    },200);
    return ()=>clearInterval(timerRef.current);
  },[started]);

  useEffect(()=>{
    if (found.length===words.length) {
      clearInterval(timerRef.current);
      soundManager.complete();
      setTimeout(()=>onWin({turns,elapsed,words,wordResults,wrongGuesses,bonusPts}),600);
    }
  },[found]);

  useEffect(()=>{
    if (maxTurns && turns >= maxTurns && found.length < words.length) {
      clearInterval(timerRef.current);
      setOutOfTurns(true);
      setTimeout(()=>onWin({turns,elapsed,words,wordResults,wrongGuesses,outOfTurns:true}),800);
    }
  },[turns]);

  const timeLeft = timeLimit ? Math.max(0,timeLimit-Math.floor(elapsed/1000)) : null;

  function handleTileClick(tile) {
    if (!started) setStarted(true);
    if (outOfTurns||foundTileIds.has(tile.id)||flipped.length>=4||error.length>0||flipped.includes(tile.id)) return;
    soundManager.flip();
    const newFlipped=[...flipped,tile.id];
    setFlipped(newFlipped);
    if (newFlipped.length===4) {
      setTurns(t=>t+1);
      const ft = newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters = ft.map(t=>t.letter);
      const sorted = [...letters].sort().join("");
      const matchIdx = words.findIndex((w,i)=>!found.includes(i)&&[...w].sort().join("")===sorted);
      if (matchIdx===-1) {
        // Check if letters spell a bonus word from the full bank (excluding current targets)
        const bonusWord = ALL_WORDS_4.flat().find(w =>
          !words.includes(w) && [...w].sort().join("") === sorted
        );
        if (bonusWord && !foundBonusWords.includes(bonusWord)) {
          soundManager.wordYellow();
          const bfid = ++floatIdRef.current;
          setFloatingScores(prev=>[...prev,{id:bfid,pts:50,color:"#9B5DE5"}]);
          setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==bfid)),1150);
          setFoundBonusWords(b=>[...b,bonusWord]);
          setBonusPts(p=>p+50);
          setFlash("bonus");
          setTimeout(()=>{setFlipped([]);setFlash(null);},900);
          return;
        }
        setError(newFlipped); setFlash("bad"); setHadError(true); setWrongGuesses(g=>g+1);
        soundManager.wrong();
        const wfid = ++floatIdRef.current;
        setFloatingScores(prev=>[...prev,{id:wfid,pts:-50,color:"#FF5E5B"}]);
        setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==wfid)),1000);
        setTimeout(()=>{setFlipped([]);setError([]);setFlash(null);},900); return;
      }

      const inOrder = letters.join("") === words[matchIdx];
      const pts = inOrder ? 300 : 100;
      const floatColor = inOrder ? "#00F5C4" : "#FFB703";
      inOrder ? soundManager.wordGreen() : soundManager.wordYellow();
      // Spawn floating score label
      const fid = ++floatIdRef.current;
      setFloatingScores(prev=>[...prev,{id:fid, pts, color:floatColor}]);
      setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==fid)), 1150);
      setFlash(inOrder ? "good" : "goodYellow");
      setTimeout(()=>{
        setFound(f=>[...f,matchIdx]);
        setWordResults(prev=>({...prev,[matchIdx]: inOrder?"green":"yellow"}));
        if (inOrder) setFoundInOrderSet(prev=>new Set([...prev,...newFlipped]));
        setFoundTileIds(prev=>new Set([...prev,...newFlipped]));
        setHadError(false);
        setFlipped([]); setFlash(null);
        // Pop the score display
        setScorePop(true); setTimeout(()=>setScorePop(false), 400);
      },420);
    }
  }

  return (
    <div style={{width:"100%",maxWidth:480,margin:"0 auto"}}>
      {(() => {
        const turnsLeft = maxTurns ? maxTurns - turns : null;
        const turnsDanger = turnsLeft !== null && turnsLeft <= 3;
        const liveScore = scoreCalc(elapsed, Object.values(wordResults), wrongGuesses);
        return (
          <div style={{marginBottom:8}}>
            {/* Score row — prominent center with floating animation target */}
            <div style={{position:"relative", textAlign:"center", marginBottom:6}}>
              <FloatingScore items={floatingScores} />
              <span style={{
                fontFamily:"'Fraunces',serif",
                fontSize:"clamp(1.4rem,5vw,2rem)",
                fontWeight:900,
                color:"#FFB703",
                animation: scorePop ? "scorePop 0.4s cubic-bezier(.4,2,.6,1)" : "none",
                display:"inline-block",
                transition:"color 0.2s",
              }}>
                {liveScore.toLocaleString()}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#3a5570",fontSize:"0.7rem",marginLeft:4}}>pts</span>
            </div>
            {/* Stats row */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
                {maxTurns ? (
                  <>Turns: <strong aria-live={turnsDanger?"assertive":"off"} style={{color:turnsLeft<=3?"#FF5E5B":"#FFB703",transition:"color 0.3s"}}>{turnsLeft}</strong> left</>
                ) : (
                  <>Guesses: <strong style={{color:"#FFB703"}}>{turns}</strong></>
                )}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.78rem"}}>
                Found: <strong style={{color:"#00F5C4"}}>{found.length}/{words.length}</strong>
              </span>
              <span
                aria-live={timeLeft!==null&&timeLeft<15?"assertive":"off"}
                style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:timeLeft!==null&&timeLeft<15?"#FF5E5B":"#7a9cc0"}}
              >
                {timeLeft!==null?`⏱ ${timeLeft}s`:`⏱ ${formatTime(elapsed)}`}
              </span>
            </div>
          </div>
        );
      })()}
      <FoundWordBanner words={words} wordResults={wordResults} />
      <div
        aria-live="polite"
        aria-atomic="true"
        style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:4}}
      >
        {flash&&(
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"0.95rem",fontWeight:700,animation:"fadeInOut 0.5s ease",
            color:flash==="good"?"#00F5C4":flash==="goodYellow"?"#FFB703":flash==="bonus"?"#9B5DE5":"#FF5E5B"}}>
            {flash==="good"&&"🟩 Nice — bonus points!"}
            {flash==="goodYellow"&&"🟨 Found! Try in order for more pts"}
            {flash==="bonus"&&"✨ Bonus word! +50 pts"}
            {flash==="bad"&&"✗ Not a valid word here"}
          </span>
        )}
      </div>
      <div
        role="grid"
        aria-label="WordFlip game board"
        style={{
          display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,
          gap:"clamp(4px,1.5vw,10px)",padding:"clamp(4px,2vw,12px)",
          background:"#0a1520",borderRadius:16,border:"1.5px solid #1e3048",
          boxShadow:"0 4px 32px #00000055",
        }}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile}
            isFlipped={flipped.includes(tile.id)}
            isFound={foundTileIds.has(tile.id)}
            foundInOrder={foundInOrderSet.has(tile.id)}
            isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)}
            isError={error.includes(tile.id)}
            onClick={()=>handleTileClick(tile)}
            orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined}
          />
        ))}
      </div>
      <p style={{textAlign:"center",color:"#2a4060",fontSize:"0.75rem",marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>{maxTurns?`${maxTurns} turns max · `:""}🟩 +300 · 🟨 +100 · bonus pts for speed & accuracy</p>
    </div>
  );
}

// ─── Score Receipt ────────────────────────────────────────────────────────────
function ScoreReceipt({ wordResults, elapsed, wrongGuesses, turns, score }) {
  const greens = wordResults.filter(r=>r==="green").length;
  const yellows = wordResults.filter(r=>r==="yellow").length;
  const wordPts = greens*300 + yellows*100;
  const timePts = Math.max(0, 600 - Math.floor(elapsed/1000));
  const guessPts = Math.max(0, 1200 - wrongGuesses*100);

  const rows = [
    { icon:"\u{1F524}", label:`Words (${greens}\u{1F7E9} ${yellows}\u{1F7E8})`, pts:wordPts, color:"#00F5C4" },
    { icon:"\u23F1", label:`Time (${formatTime(elapsed)})`, pts:timePts, color:"#9B5DE5" },
    { icon:"\u{1F3AF}", label:`Guesses (${wrongGuesses} missed)`, pts:guessPts, color:"#00BBF9" },
  ];

  return (
    <div style={{
      background:"#0a1520", border:"1.5px solid #1e3048", borderRadius:14,
      padding:"16px 18px", marginBottom:20, textAlign:"left",
    }}>
      {rows.map((row,i)=>(
        <div key={row.label} style={{
          display:"flex", justifyContent:"space-between", alignItems:"baseline",
          marginBottom:8, opacity:0,
          animation:`receiptIn 0.3s ease ${0.15*(i+1)}s forwards`,
        }}>
          <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#7a9cc0", fontSize:"0.78rem"}}>
            {row.icon} {row.label}
          </span>
          <span style={{
            fontFamily:"'JetBrains Mono',monospace", fontWeight:800,
            color:row.color, fontSize:"0.88rem", flexShrink:0, marginLeft:12,
          }}>
            +{row.pts.toLocaleString()}
          </span>
        </div>
      ))}
      <div style={{
        borderTop:"1.5px dashed #1e3048", marginTop:10, paddingTop:10,
        display:"flex", justifyContent:"space-between", alignItems:"baseline",
        opacity:0, animation:"receiptTotal 0.4s cubic-bezier(.4,2,.6,1) 0.65s forwards",
      }}>
        <span style={{fontFamily:"'JetBrains Mono',monospace", color:"#7a9cc0", fontSize:"0.78rem", fontWeight:700}}>
          TOTAL
        </span>
        <span style={{fontFamily:"'Fraunces',serif", fontWeight:900, color:"#FFB703", fontSize:"1.6rem"}}>
          {score.toLocaleString()} <span style={{fontSize:"0.85rem", fontWeight:700}}>pts</span>
        </span>
      </div>
    </div>
  );
}

// ─── Win Screen ───────────────────────────────────────────────────────────────
function WinScreen({ result, mode, onPlayAgain, onMenu, isDaily, streak, isNewBest }) {
  const wordResultsArr = result.words.map((_,i) => result.wordResults?.[i] || (result.outOfTurns ? "missed" : "yellow"));
  const score = scoreCalc(result.elapsed, wordResultsArr, result.wrongGuesses, result.bonusPts||0);
  const prevBest = getPersonalBest();
  const computedNewBest = isDaily && score > prevBest;
  const showNewBest = isNewBest || computedNewBest;
  const [copied, setCopied] = useState(false);

  function handleShare() {
    const text = buildShareText(result.turns, result.elapsed, score, wordResultsArr, result.words.length);
    const shareData = { title:"WordFlip Daily", text };
    const tryClipboard = () => navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
      navigator.share(shareData).catch(tryClipboard);
    } else { tryClipboard(); }
  }

  return (
    <div role="main" aria-label="Game results" style={{textAlign:"center",maxWidth:400,margin:"0 auto",padding:20}}>
      <div aria-hidden="true" style={{fontSize:"3rem",marginBottom:8}}>{result.outOfTurns?"😬":"🎉"}</div>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"2rem",margin:"0 0 4px"}}>
        {result.outOfTurns?"Out of turns!":mode==="daily"?"Daily Complete!":"You Win!"}
      </h2>
      <p style={{color:"#7a9cc0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.9rem",marginBottom:16}}>
        {result.words.join(" · ")}
      </p>
      {isDaily&&(
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          {streak>0&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#1a1200",border:"1.5px solid #FFB703",borderRadius:20,padding:"5px 14px"}}>
              <span>🔥</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontWeight:700,fontSize:"0.9rem"}}>{streak} day streak</span>
            </div>
          )}
          {showNewBest&&(
            <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0a2e24",border:"1.5px solid #00F5C4",borderRadius:20,padding:"5px 14px"}}>
              <span>🏆</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"#00F5C4",fontWeight:700,fontSize:"0.9rem"}}>New personal best!</span>
            </div>
          )}
        </div>
      )}
      <ScoreReceipt
        wordResults={wordResultsArr}
        elapsed={result.elapsed}
        wrongGuesses={result.wrongGuesses||0}
        turns={result.turns}
        score={score}
      />
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        {isDaily&&(
          <button onClick={handleShare} style={{...btnStyle(copied?"#00c49f":"#1e3048",copied?"#0a2e24":"#F5EDD6"),padding:"10px 20px"}}>
            {copied?"✓ Copied!":"📤 Share"}
          </button>
        )}
        {!isDaily&&(
          <button onClick={onPlayAgain} style={btnStyle("#00F5C4","#0a2e24")}>Play Again</button>
        )}
        <button onClick={onMenu} style={btnStyle("#1e3048","#F5EDD6")}>Menu</button>
      </div>
    </div>
  );
}

// ─── Local Multiplayer ────────────────────────────────────────────────────────
function LocalMultiScreen({ onBack }) {
  const [playerCount,setPlayerCount] = useState(2);
  const [started,setStarted] = useState(false);
  const [scores,setScores] = useState([0,0]);
  const [inOrderMap,setInOrderMap] = useState({});
  const [currentPlayer,setCurrentPlayer] = useState(0);
  const [gameOver,setGameOver] = useState(false);
  const [words] = useState(()=>pickRandom(ALL_WORDS_9));
  const [foundWords,setFoundWords] = useState([]);
  const [tiles] = useState(()=>buildTiles(words));
  const [flipped,setFlipped] = useState([]);
  const [error,setError] = useState([]);
  const [flash,setFlash] = useState(null);
  const [turns,setTurns] = useState(0);
  const [foundTileIdsMulti,setFoundTileIdsMulti] = useState(new Set());
  const COLORS=["#00F5C4","#FFB703","#FF5E5B","#9B5DE5"];
  const playerNames=Array.from({length:playerCount},(_,i)=>`Player ${i+1}`);

  useEffect(()=>{ if (!started) setScores(Array(playerCount).fill(0)); },[playerCount]);

  if (!started) return (
    <div style={{textAlign:"center",maxWidth:360,margin:"0 auto"}}>
      <button onClick={onBack} style={{...btnStyle("#1e3048","#7a9cc0"),marginBottom:20,fontSize:"0.8rem"}}>← Back</button>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 20px"}}>Local Multiplayer</h2>
      <p style={{color:"#7a9cc0",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.85rem",marginBottom:8}}>Players</p>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:20}}>
        {[2,3,4].map(n=>(
          <button key={n} onClick={()=>setPlayerCount(n)} style={{...btnStyle(playerCount===n?"#FFB703":"#1e3048",playerCount===n?"#0D1B2A":"#7a9cc0"),padding:"8px 18px"}}>{n}</button>
        ))}
      </div>
      <div style={{background:"#0a1520",border:"1px solid #1e3048",borderRadius:12,padding:"12px 14px",marginBottom:16}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#3a5570",fontSize:"0.72rem",margin:0,lineHeight:1.8}}>⭐ Flip in order → <strong style={{color:"#F5EDD6"}}>300 pts</strong> · ✓ Any order → <strong style={{color:"#F5EDD6"}}>100 pts</strong> · ✗ Wrong → passes turn</p>
      </div>
      <button onClick={()=>setStarted(true)} style={{...btnStyle("#00F5C4","#0a2e24"),width:"100%",padding:"14px",borderRadius:12}}>Start Game</button>
    </div>
  );

  if (gameOver) {
    const maxScore=Math.max(...scores);
    const winners=scores.map((s,i)=>s===maxScore?i:-1).filter(i=>i>=0);
    return (
      <div style={{textAlign:"center",maxWidth:360,margin:"0 auto"}}>
        <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",margin:"0 0 20px"}}>
          {winners.length===1?`${playerNames[winners[0]]} Wins!`:"It's a Tie!"}
        </h2>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          {scores.map((s,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",background:"#0a1520",borderRadius:10,padding:"10px 16px",border:`1.5px solid ${s===maxScore?COLORS[i]:"#1e3048"}`}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:COLORS[i],fontWeight:700}}>{playerNames[i]}</span>
              <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontWeight:700}}>{s.toLocaleString()} pts</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>{ setGameOver(false); setStarted(false); setFoundWords([]); setFoundTileIdsMulti(new Set()); setFlipped([]); setScores(Array(playerCount).fill(0)); setCurrentPlayer(0); setTurns(0); }} style={btnStyle("#00F5C4","#0a2e24")}>Rematch</button>
          <button onClick={onBack} style={btnStyle("#1e3048","#F5EDD6")}>Menu</button>
        </div>
      </div>
    );
  }

  const foundWordSet=new Set(foundWords.map(f=>f.wordIndex));

  function handleTileClick(tile) {
    if (foundTileIdsMulti.has(tile.id)||flipped.length>=4||error.length>0||flipped.includes(tile.id)) return;
    const newFlipped=[...flipped,tile.id];
    setFlipped(newFlipped);
    if (newFlipped.length===4) {
      setTurns(t=>t+1);
      const ft=newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters=ft.map(t=>t.letter);
      const sorted=[...letters].sort().join("");
      const matchIdx=words.findIndex((w,i)=>!foundWordSet.has(i)&&[...w].sort().join("")===sorted);
      if (matchIdx===-1) {
        setError(newFlipped); setFlash("bad");
        setTimeout(()=>{setFlipped([]);setError([]);setFlash(null);setCurrentPlayer(p=>(p+1)%playerCount);},700); return;
      }
      const multiInOrder = letters.join("") === words[matchIdx];
      const multiPts = multiInOrder ? 300 : 100;
      soundManager.wordGreen();
      setFlash(multiInOrder ? "goodOrder" : "good");
      setTimeout(()=>{
        const newFW=[...foundWords,{wordIndex:matchIdx,player:currentPlayer,inOrder:multiInOrder}];
        setFoundWords(newFW);
        setInOrderMap(prev=>({...prev,[matchIdx]:multiInOrder}));
        setFoundTileIdsMulti(prev=>new Set([...prev,...newFlipped]));
        const ns=[...scores]; ns[currentPlayer]+=multiPts; setScores(ns);
        setFlipped([]); setFlash(null);
        if (newFW.length===words.length) { soundManager.complete(); setGameOver(true); }
      },400);
    }
  }

  return (
    <div style={{width:"100%",maxWidth:500,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:10,flexWrap:"wrap"}}>
        {playerNames.map((name,i)=>(
          <div key={i} style={{padding:"4px 14px",borderRadius:20,background:i===currentPlayer?COLORS[i]+"22":"#0a1520",border:`1.5px solid ${i===currentPlayer?COLORS[i]:"#1e3048"}`,fontFamily:"'JetBrains Mono',monospace",fontSize:"0.8rem",color:i===currentPlayer?COLORS[i]:"#2a4060",fontWeight:i===currentPlayer?700:400,transition:"all 0.2s"}}>
            {name}: {scores[i].toLocaleString()}pts
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:10}}>
        {words.map((word,i)=>{
          const fw=foundWords.find(f=>f.wordIndex===i);
          return <div key={i} style={{padding:"3px 12px",borderRadius:20,background:fw?COLORS[fw.player]+"33":"#0e1f30",border:fw?`1.5px solid ${COLORS[fw.player]}`:"1.5px solid #1e3048",fontFamily:"'JetBrains Mono',monospace",fontWeight:fw?.inOrder?900:700,fontSize:"0.8rem",color:fw?COLORS[fw.player]:"#3a5570",letterSpacing:"0.15em",transition:"all 0.3s cubic-bezier(.4,2,.6,1)",transform:fw?"scale(1.06)":"scale(1)",boxShadow:fw?.inOrder?`0 0 10px ${COLORS[fw.player]}88`:"none"}}>{fw?.inOrder?"⭐ ":""}{word}</div>;
        })}
      </div>
      <div style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>
        {flash&&<span style={{fontFamily:"'Fraunces',serif",fontWeight:700,fontSize:"1rem",color:flash==="good"||flash==="goodOrder"?COLORS[currentPlayer]:"#FF5E5B"}}>
          {flash==="good"&&`✓ ${playerNames[currentPlayer]} found a word — goes again!`}
          {flash==="goodOrder"&&`⭐ ${playerNames[currentPlayer]} got it in order — goes again!`}
          {flash==="bad"&&"✗ Next player's turn"}
        </span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:"clamp(3px,1.2vw,8px)",padding:"clamp(4px,2vw,12px)",background:"#0a1520",borderRadius:16,border:"1.5px solid #1e3048"}}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile} isFlipped={flipped.includes(tile.id)} isFound={foundTileIdsMulti.has(tile.id)} isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)} isError={error.includes(tile.id)} onClick={()=>handleTileClick(tile)} orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined} />
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
        <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.75rem",margin:0}}>
          {playerNames[currentPlayer]}'s turn · Turn {turns+1}
        </p>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{ if(window.confirm('End game and see results?')) setGameOver(true); }} style={{...btnStyle("#1e3048","#3a5570"),padding:"4px 10px",fontSize:"0.7rem"}}>End</button>
          <button onClick={()=>{ if(window.confirm('Return to menu?')) onBack(); }} style={{...btnStyle("#1e3048","#3a5570"),padding:"4px 10px",fontSize:"0.7rem"}}>Menu</button>
        </div>
      </div>
    </div>
  );
}

// ─── Daily Already Done Screen ────────────────────────────────────────────────
function DailyAlreadyDone({ onMenu, streak }) {
  const done = getDailyDone();
  const wordResultsArr2 = getDailyWords().map((_,i) => done?.wordResults?.[i] || (done?.outOfTurns ? "missed" : "yellow"));
  const score = done ? scoreCalc(done.elapsed, wordResultsArr2, done.wrongGuesses, done.bonusPts||0) : 0;
  const [copied,setCopied] = useState(false);
  function handleShare() {
    const wordResultsArr = getDailyWords().map((_,i) => done?.wordResults?.[i] || "yellow");
    const text = buildShareText(done?.turns ?? 0, done?.elapsed ?? 0, score, wordResultsArr, getDailyWords().length);
    const shareData = { title:"WordFlip Daily", text };
    const tryClipboard = () => navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
    if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
      navigator.share(shareData).catch(tryClipboard);
    } else { tryClipboard(); }
  }
  return (
    <div style={{textAlign:"center",maxWidth:380,margin:"0 auto",padding:20}}>
      <div style={{fontSize:"3rem",marginBottom:12}}>✅</div>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"1.8rem",margin:"0 0 8px"}}>Already Played!</h2>
      <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#7a9cc0",fontSize:"0.85rem",marginBottom:16}}>
        Come back tomorrow for a new challenge.
      </p>
      {streak>0&&(
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"#1a1200",border:"1.5px solid #FFB703",borderRadius:20,padding:"6px 16px",marginBottom:16}}>
          <span style={{fontSize:"1.2rem"}}>🔥</span>
          <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontWeight:700}}>{streak} day streak</span>
        </div>
      )}
      {done&&(
        <ScoreReceipt
          wordResults={wordResultsArr2}
          elapsed={done.elapsed}
          wrongGuesses={done.wrongGuesses||0}
          turns={done.turns}
          score={score}
        />
      )}
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button onClick={handleShare} style={{...btnStyle(copied?"#00c49f":"#1e3048",copied?"#0a2e24":"#F5EDD6"),padding:"10px 20px"}}>
          {copied?"✓ Copied!":"📤 Share"}
        </button>
        <button onClick={onMenu} style={btnStyle("#1e3048","#F5EDD6")}>Menu</button>
      </div>
    </div>
  );
}

  const [screen,setScreen] = useState("menu");

  const [winIsNewBest,setWinIsNewBest] = useState(false);
  const [soloWords,setSoloWords] = useState(null);
  const [fireworks,setFireworks] = useState(false);

  const dailyBest = getDailyBest();
  const streak = getStreak();

  function startSolo(large) {
    setSoloLarge(large);
    setSoloWords(shuffle([...pickRandom(large?ALL_WORDS_9:ALL_WORDS_4)]));
    setScreen("solo");
  }

  function handleWin(result,mode) {
    setWinResult(result); setWinMode(mode);
    setFireworks(true); setTimeout(()=>setFireworks(false),4000);
    const wordResultsArr = result.words.map((_,i) => result.wordResults?.[i] || (result.outOfTurns ? "missed" : "yellow"));
    const score = scoreCalc(result.elapsed, wordResultsArr, result.wrongGuesses, result.bonusPts||0);
    if (mode==="daily") {
      saveDailyBest(score);
      setDailyDone({turns:result.turns,elapsed:result.elapsed,score,wordResults:result.wordResults||{},wrongGuesses:result.wrongGuesses||0,outOfTurns:result.outOfTurns||false});
      const s = updateStreak();
      setWinStreak(s.count);
      setWinIsNewBest(score > getPersonalBest());
      // Leaderboard is daily-challenge only
      // Save to personal history
      const d = new Date();
      const blocks = result.words.map((_,i) => {
        const r = result.wordResults?.[i];
        return r==="green" ? "🟩" : r==="yellow" ? "🟨" : "🟥";
      }).join("");
      saveToHistory({
        dayKey: dateKey(),
        date: d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
        shortDate: d.toLocaleDateString("en-US",{month:"short",day:"numeric"}),
        isoDate: d.toISOString(),
        score,
        turns: result.turns,
        elapsed: result.elapsed,
        blocks,
        wrongGuesses: result.wrongGuesses||0,
        outOfTurns: result.outOfTurns||false,
      });
    }
    setScreen("win");
  }

  return (
    <div style={{minHeight:"100dvh",overflowY:"auto",overflowX:"hidden",background:"linear-gradient(160deg,#0D1B2A 0%,#091422 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"clamp(12px,4vw,32px)",fontFamily:"sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,700&family=JetBrains+Mono:wght@400;700;800&display=swap');
        @keyframes fadeInOut{0%{opacity:0;transform:translateY(-4px)}20%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
        @keyframes menuIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tileVanish{0%{transform:rotateY(180deg) scale(1);opacity:1}40%{transform:rotateY(180deg) scale(1.18);opacity:1}100%{transform:rotateY(180deg) scale(0);opacity:0}}
        @keyframes receiptIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
        @keyframes receiptTotal{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
        @keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.3)}60%{opacity:1;transform:translateX(-50%) translateY(-52px) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-80px) scale(0.85)}}
        @keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}
        *{box-sizing:border-box;} button:hover{opacity:0.85;} button:focus-visible{outline:3px solid #00F5C4;outline-offset:3px;} a:focus-visible{outline:3px solid #00F5C4;}
        @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
      `}</style>
      <Fireworks active={fireworks} />

      <div style={{marginBottom:screen==="menu"?28:16,textAlign:"center",animation:"menuIn 0.5s ease"}}>
        <h1 style={{fontFamily:"'Fraunces',serif",fontWeight:900,fontStyle:"italic",fontSize:"clamp(2rem,6vw,3.2rem)",background:"linear-gradient(90deg,#00F5C4,#FFB703)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:0,letterSpacing:"-0.02em"}}>WordFlip</h1>
        {screen==="menu"&&<p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.8rem",margin:"4px 0 0"}}>flip · match · win</p>}
      </div>

      {screen==="menu"&&(
        <div style={{width:"100%",maxWidth:360,animation:"menuIn 0.5s ease"}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button onClick={()=>{ if(getDailyDone()){setScreen("daily-done");}else{setScreen("daily");}}} style={{...btnStyle("linear-gradient(90deg,#FFB703,#ff9f1c)","#0D1B2A"),padding:"14px 24px",fontSize:"1rem",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>⚡ Daily Challenge</span>
              <span style={{fontSize:"0.75rem",opacity:0.7}}>
                {getDailyDone()?"✓ Done today":dailyBest?`Best: ${dailyBest.toLocaleString()}`:"Play today!"}
              </span>
            </button>
            <button onClick={()=>setScreen("solo-setup")} style={{...btnStyle("#162030","#F5EDD6"),padding:"13px 24px",fontSize:"0.95rem",borderRadius:12,border:"1.5px solid #1e3048",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>🔤 Solo Play</span><span style={{fontSize:"0.75rem",color:"#7a9cc0"}}>→</span>
            </button>
            <button onClick={()=>setScreen("multi-setup")} style={{...btnStyle("#162030","#F5EDD6"),padding:"13px 24px",fontSize:"0.95rem",borderRadius:12,border:"1.5px solid #00F5C444",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>👥 Multiplayer</span><span style={{fontSize:"0.75rem",color:"#00F5C4"}}>→</span>
            </button>
            <button onClick={()=>setScreen("leaderboard")} style={{...btnStyle("transparent","#7a9cc0"),padding:"10px 24px",fontSize:"0.85rem",border:"none",textDecoration:"underline"}}>
              🏆 Scores {getPersonalBest()>0?`· Best: ${getPersonalBest().toLocaleString()}`:""}
            </button>
          </div>
          <div style={{marginTop:24,padding:14,background:"#0a1520",borderRadius:12,border:"1.5px solid #1e3048"}}>
            <p style={{fontFamily:"'JetBrains Mono',monospace",color:"#2a4060",fontSize:"0.75rem",margin:0,lineHeight:1.7}}>
              <strong style={{color:"#7a9cc0"}}>How to play:</strong> Flip 4 tiles to spell a word. 🟩 In order = +300, 🟨 any order = +100. Bonus points for speed (600) and accuracy (1200)!
            </p>
          </div>
        </div>
      )}

      {screen==="solo-setup"&&<SoloSetup onBack={()=>setScreen("menu")} onStart={(l)=>startSolo(l)} />}
      {screen==="multi-setup"&&<MultiSetup onBack={()=>setScreen("menu")} onLocal={()=>setScreen("multi-local")} onOnline={()=>setScreen("multi-online")} />}

      {screen==="solo"&&soloWords&&(
        <div style={{width:"100%",animation:"menuIn 0.3s ease"}}>
          <button onClick={()=>setScreen("solo-setup")} style={{...btnStyle("#1e3048","#7a9cc0"),marginBottom:14,fontSize:"0.8rem"}}>← Back</button>
          <GameBoard words={soloWords} onWin={r=>handleWin(r,"solo")} timeLimit={null} />
        </div>
      )}

      {screen==="daily"&&(
        <div style={{width:"100%",animation:"menuIn 0.3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <button onClick={()=>setScreen("menu")} style={{...btnStyle("#1e3048","#7a9cc0"),fontSize:"0.8rem"}}>← Menu</button>
            <span style={{fontFamily:"'Fraunces',serif",color:"#FFB703",fontSize:"0.9rem"}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
          </div>
          <GameBoard words={getDailyWords()} onWin={r=>handleWin(r,"daily")} timeLimit={null} maxTurns={16} />
        </div>
      )}

      {screen==="daily-done"&&<DailyAlreadyDone onMenu={()=>setScreen("menu")} streak={streak.count} />}

      {screen==="win"&&winResult&&(
        <div style={{width:"100%",animation:"menuIn 0.4s ease"}}>
          <WinScreen result={winResult} mode={winMode} onPlayAgain={()=>startSolo(soloLarge)} onMenu={()=>setScreen("menu")} isDaily={winMode==="daily"} streak={winStreak} isNewBest={winIsNewBest} />
        </div>
      )}

      {screen==="multi-local"&&<div style={{width:"100%",animation:"menuIn 0.3s ease"}}><LocalMultiScreen onBack={()=>setScreen("multi-setup")} /></div>}
      {screen==="multi-online"&&<div style={{animation:"menuIn 0.3s ease"}}><OnlineScreen onBack={()=>setScreen("multi-setup")} /></div>}
      {screen==="leaderboard"&&<div style={{width:"100%",maxWidth:440,animation:"menuIn 0.3s ease"}}><LeaderboardView onBack={()=>setScreen("menu")} /></div>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<WordFlip />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then(reg => {
          console.log("WordFlip SW registered:", reg.scope);

          // When a new SW is found, prompt the user to update
          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (newWorker.state === "activated") {
                // Show a subtle update banner
                const banner = document.createElement("div");
                banner.innerHTML = `
                  <div style="
                    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
                    background:#00F5C4; color:#0a2e24; padding:10px 20px; border-radius:20px;
                    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:0.85rem;
                    box-shadow:0 4px 16px #00000055; z-index:9999; white-space:nowrap;
                    cursor:pointer; animation:menuIn 0.3s ease;
                  " onclick="window.location.reload()">
                    ✨ New version available — tap to update
                  </div>`;
                document.body.appendChild(banner);
                // Auto-dismiss after 10 seconds
                setTimeout(() => banner.remove(), 10000);
              }
            });
          });
        }).catch(err => console.log("SW registration failed:", err));

        // Listen for SW_UPDATED message from the service worker
        navigator.serviceWorker.addEventListener("message", (event) => {
          if (event.data && event.data.type === "SW_UPDATED") {
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
