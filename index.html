// ─── Reveal Phase (daily challenge intro) ────────────────────────────────────
function RevealGrid({ words, tiles, maxTurns, onDone }) {
  const [phase, setPhase] = useState('show'); // show | flip | shuffle
  const SHUFFLE_MS = 650;
  const P = activePalette(); // theme tile palette (face-up uses selected look)
  const B = activeTileBack(); // face-down card design (shop cosmetic)

  // Shuffled position of each tile in the final 4×4 grid
  const shuffledPos = useMemo(() => {
    const m = {};
    tiles.forEach((t, i) => { m[t.id] = { r: Math.floor(i / 4), c: i % 4 }; });
    return m;
  }, [tiles]);

  // Show words (face up, in order) → flip face down in place → shuffle while
  // face down → done. The board is never face-up while scrambled, so there's
  // no frame to screenshot for the answers.
  useEffect(() => {
    const t = setTimeout(() => setPhase('flip'), 1100);
    return () => clearTimeout(t);
  }, []);
  useEffect(() => {
    if (phase !== 'flip') return;
    const t = setTimeout(() => setPhase('shuffle'), 520); // let the flip finish
    return () => clearTimeout(t);
  }, [phase]);
  useEffect(() => {
    if (phase !== 'shuffle') return;
    const t = setTimeout(onDone, SHUFFLE_MS + 120);
    return () => clearTimeout(t);
  }, [phase]);

  // If user switches away (e.g. to screenshot on Android), skip reveal immediately
  useEffect(() => {
    const skip = () => { if (document.visibilityState !== 'visible') onDone(); };
    document.addEventListener('visibilitychange', skip);
    return () => document.removeEventListener('visibilitychange', skip);
  }, []);

  // Tiles appear in word order during show + flip, then slide to shuffled spots.
  const sorted = phase === 'show' || phase === 'flip';
  const faceDown = phase === 'flip' || phase === 'shuffle';

  return (
    <div style={{width:"100%",maxWidth:480,margin:"0 auto"}}>
      {/* Score header — static initial values, matches GameBoard exactly */}
      <div style={{marginBottom:8}}>
        <div style={{position:"relative",textAlign:"center",marginBottom:6}}>
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"clamp(1.4rem,5vw,2rem)",fontWeight:900,color:"var(--wf-accent2)",display:"inline-block"}}>0</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.7rem",marginLeft:4}}>pts</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.78rem"}}>
            Turns: <strong style={{color:"var(--wf-accent2)"}}>{maxTurns}</strong> left
          </span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.78rem"}}>
            Found: <strong style={{color:"var(--wf-accent)"}}>0/{words.length}</strong>
          </span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:"var(--wf-text-dim)"}}>⏱ 0:00</span>
        </div>
      </div>
      <FoundWordBanner words={words} wordResults={{}} />
      {/* Empty flash message area — same height as real board */}
      <div style={{height:28,marginBottom:4}} />
      {/* Reserve the power-up row's space (if owned) so the board doesn't jump
          down when play begins after the reveal. Matches the real row's height. */}
      {(getInv('wf_inv_hint')>0||getInv('wf_inv_xray')>0||getInv('wf_inv_megahint')>0)&&(
        <div style={{minHeight:28,marginBottom:6}} />
      )}
      {/* Tile board — same container as real game board */}
      <div style={{
        padding:"clamp(4px,2vw,12px)",
        background:"var(--wf-surface)",borderRadius:16,border:"1.5px solid var(--wf-border)",
        boxShadow:"0 4px 32px #00000055",
      }}>
        <div style={{position:'relative',paddingBottom:'100%',userSelect:'none',WebkitUserSelect:'none'}}>
          <div style={{position:'absolute',inset:0}}>
            {tiles.map(tile => {
              const [wi, li] = tile.id.split('-').map(Number);
              const sp = shuffledPos[tile.id];
              // During 'show': tile visually appears at sorted pos (row=wi, col=li)
              // but is laid out at its shuffled pos (sp.r, sp.c).
              // Offset via transform so it looks sorted; removing it = scramble.
              const dC = li - sp.c;
              const dR = wi - sp.r;
              return (
                <div key={tile.id} style={{
                  position:'absolute',
                  left:`${sp.c * 25}%`, top:`${sp.r * 25}%`,
                  width:'25%', height:'25%',
                  padding:'clamp(2px,0.75vw,5px)',
                  boxSizing:'border-box',
                  transform: sorted ? `translate(${dC*100}%,${dR*100}%)` : 'translate(0,0)',
                  transition: phase==='shuffle'
                    ? `transform ${SHUFFLE_MS}ms cubic-bezier(.4,0,.6,1)`
                    : 'none',
                }}>
                  <div style={{width:'100%',height:'100%',perspective:'600px'}}>
                    <div style={{
                      width:'100%',height:'100%',
                      transformStyle:'preserve-3d',
                      transition: phase==='flip' ? 'transform 0.45s cubic-bezier(.4,0,.2,1)' : 'none',
                      transform: faceDown ? 'rotateY(180deg)' : 'rotateY(0deg)',
                    }}>
                      {/* Face-up: themed selected-tile look, same as tapped tiles in game */}
                      <div style={{
                        position:'absolute',inset:0,backfaceVisibility:'hidden',
                        background:P.sel.bg,
                        borderRadius:10,border:`2.5px solid ${P.sel.border}`,
                        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                        boxShadow:`0 0 16px ${P.sel.border}88`,
                      }}>
                        <span style={{
                          fontFamily:"'JetBrains Mono',monospace",
                          fontSize:'clamp(1.1rem,3.5vw,1.8rem)',fontWeight:800,
                          color:P.sel.text,letterSpacing:'0.05em',
                        }}>{tile.letter}</span>
                        <span style={{
                          position:'absolute',bottom:4,right:6,
                          fontSize:'0.55em',fontWeight:700,opacity:0.5,color:P.sel.text,
                        }}>{li+1}</span>
                      </div>
                      {/* Face-down: the player's chosen tile back */}
                      <div style={{
                        position:'absolute',inset:0,backfaceVisibility:'hidden',
                        transform:'rotateY(180deg)',borderRadius:10,
                        border:`2px solid ${B.border}`,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        boxShadow:'0 2px 8px #00000066',
                        backgroundImage:`radial-gradient(circle at 30% 30%, ${B.dot} 1px, transparent 1px),radial-gradient(circle at 70% 70%, ${B.dot} 1px, transparent 1px),${B.bg}`,
                        backgroundSize:'12px 12px, 12px 12px, 100% 100%',
                      }}>
                        <span style={{color:B.symbolColor,fontSize:'1.4em',fontWeight:900}}>{B.symbol}</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Game Board ───────────────────────────────────────────────────────────────
function GameBoard({ words, onWin, timeLimit, onTimeUp, maxTurns, isDaily }) {
  const cols = words.length===4?4:6;
  // Resume an in-progress daily so leaving mid-game continues instead of restarting.
  const savedProg = isDaily ? getDailyProgress() : null;
  const [tiles] = useState(()=> savedProg ? savedProg.tiles : buildTiles(words));
  // A resumed game already showed its reveal — skip straight to the board.
  const [showReveal, setShowReveal] = useState(!!isDaily && !savedProg);
  const [flipped, setFlipped] = useState([]);
  const [found, setFound] = useState(()=> savedProg ? savedProg.found : []);
  const [foundTileIds, setFoundTileIds] = useState(()=> savedProg ? new Set(savedProg.foundTileIds) : new Set());
  const [error, setError] = useState([]);
  const [turns, setTurns] = useState(()=> savedProg ? savedProg.turns : 0);
  const [hadError, setHadError] = useState(false);
  const [wrongGuesses, setWrongGuesses] = useState(()=> savedProg ? savedProg.wrongGuesses : 0);
  const [wordResults, setWordResults] = useState(()=> savedProg ? savedProg.wordResults : {});
  const [foundInOrderSet, setFoundInOrderSet] = useState(()=> savedProg ? new Set(savedProg.foundInOrderSet) : new Set());
  const [foundBonusWords, setFoundBonusWords] = useState(()=> savedProg ? savedProg.foundBonusWords : []);
  const [lastBonusWord, setLastBonusWord] = useState("");
  const [bonusPts, setBonusPts] = useState(()=> savedProg ? savedProg.bonusPts : 0);
  const [elapsed, setElapsed] = useState(()=> savedProg ? savedProg.elapsed : 0);
  const [started, setStarted] = useState(()=> savedProg ? savedProg.started : false);
  const [flash, setFlash] = useState(null);
  const [outOfTurns, setOutOfTurns] = useState(false);
  const [floatingScores, setFloatingScores] = useState([]);
  const [scorePop, setScorePop] = useState(false);
  // Shop power-ups (bought in the Token Shop, counts held per-device)
  const [invHint, setInvHint] = useState(() => getInv('wf_inv_hint'));
  const [invXray, setInvXray] = useState(() => getInv('wf_inv_xray'));
  const [invMega, setInvMega] = useState(() => getInv('wf_inv_megahint'));
  const [hintTileId, setHintTileId] = useState(null);   // single tile wiggling (Hint)
  const [megaHintIds, setMegaHintIds] = useState([]);   // whole-word tiles wiggling (Mega Hint)
  const [xrayArmed, setXrayArmed] = useState(false);    // next tap peeks instead of flips
  const [xrayTiles, setXrayTiles] = useState(new Set()); // tiles briefly revealed
  const timerRef = useRef(null);
  const startRef = useRef(null);
  const floatIdRef = useRef(0);
  const hasEndedRef = useRef(false); // prevents double onWin calls
  const stateRef = useRef({});       // always holds latest state values
  const processingRef = useRef(false); // hard lock during 4-tile processing
  const flippedRef = useRef([]);       // always-current mirror of flipped state
  const foundTileIdsRef = useRef(new Set()); // always-current mirror
  const dismissTimerRef = useRef(null);    // auto-flip-back timer for a wrong guess
  const awaitingDismissRef = useRef(false); // true while a wrong guess lingers (tap to dismiss)
  const usedHintRef = useRef(false); // hint used this game
  const usedXrayRef = useRef(false); // x-ray used this game

  useEffect(()=>{
    if (!started) return;
    startRef.current = Date.now()-elapsed;
    timerRef.current = setInterval(()=>{
      const e = Date.now()-startRef.current;
      setElapsed(e);
      if (timeLimit && e>=timeLimit*1000) { clearInterval(timerRef.current); onTimeUp&&onTimeUp(); }
    },200);
    return ()=>clearInterval(timerRef.current);
  },[started]);

  // Auto-save daily progress on every meaningful change so a mid-game exit resumes.
  // Gated on `started` (first flip) so merely peeking at the challenge and backing
  // out doesn't commit you — but once you've begun guessing, you can't restart.
  useEffect(()=>{
    if (!isDaily || !started || hasEndedRef.current) return;
    saveDailyProgress({
      tiles, found, foundTileIds:[...foundTileIds], turns, wrongGuesses,
      wordResults, foundInOrderSet:[...foundInOrderSet],
      foundBonusWords, bonusPts, elapsed:stateRef.current.elapsed||elapsed, started,
    });
  },[found, foundTileIds, turns, wrongGuesses, wordResults, foundInOrderSet, foundBonusWords, bonusPts, started]);

  // Keep the saved elapsed time roughly current (within ~5s) while playing.
  useEffect(()=>{
    if (!isDaily || !started) return;
    const t = setInterval(()=>{
      if (hasEndedRef.current) return;
      const prog = getDailyProgress();
      if (prog) saveDailyProgress({...prog, elapsed:stateRef.current.elapsed||elapsed});
    }, 5000);
    return ()=>clearInterval(t);
  },[isDaily, started]);

  // safeOnWin: can only fire once per game, always uses fresh state from stateRef
  function safeOnWin(extraProps={}) {
    if (hasEndedRef.current) return;
    hasEndedRef.current = true;
    clearInterval(timerRef.current);
    if (isDaily) clearDailyProgress(); // game finished — no resume next time
    setFlipped([]);
    setError([]);
    setFlash(null);
    const s = stateRef.current;
    setTimeout(()=>onWin({
      turns:s.turns, elapsed:s.elapsed, words:s.words,
      wordResults:s.wordResults, wrongGuesses:s.wrongGuesses,
      bonusPts:s.bonusPts, bonusWords:s.foundBonusWords,
      usedHint:usedHintRef.current, usedXray:usedXrayRef.current,
      usedHelp:usedHintRef.current||usedXrayRef.current, ...extraProps
    }), 600);
  }

  useEffect(()=>{
    if (found.length===words.length) {
      soundManager.complete();
      safeOnWin();
    }
  },[found]);

  useEffect(()=>{
    // Only trigger if words remain unfound (found effect handles the win case)
    if (maxTurns && turns >= maxTurns && stateRef.current.found.length < words.length) {
      setOutOfTurns(true);
      safeOnWin({outOfTurns:true});
    }
  },[turns]);

  // Keep refs fresh — these are used in handleTileClick guards (never stale)
  stateRef.current = {turns,elapsed,words,wordResults,wrongGuesses,bonusPts,found,foundBonusWords};
  foundTileIdsRef.current = foundTileIds;
  const timeLeft = timeLimit ? Math.max(0,timeLimit-Math.floor(elapsed/1000)) : null;

  function unlock() {
    processingRef.current = false;
    awaitingDismissRef.current = false;
    clearTimeout(dismissTimerRef.current);
    flippedRef.current = [];
    setFlipped([]);
    setError([]);
    setFlash(null);
  }

  // Tap anywhere to flip a lingering wrong guess back early.
  function dismissGuess() {
    if (!awaitingDismissRef.current) return;
    unlock();
  }

  // Daily challenge allows DAILY_HELP_LIMIT combined helps per day; solo is unlimited.
  const [dailyHelpsUsed, setDailyHelpsUsed] = useState(() => isDaily ? getDailyHelps() : 0);
  const helpsLeft = isDaily ? Math.max(0, DAILY_HELP_LIMIT - dailyHelpsUsed) : Infinity;

  // 💡 Hint: infer which word you're building from the letters you've flipped
  // (order doesn't matter), then wiggle a tile for that word's next missing letter.
  //   B flipped, BOWL unfound   → wiggles an O (next letter in order)
  //   O+W flipped, any order    → still infers BOWL, wiggles the B
  //   B flipped, BOWL AND BANK  → either is a fair answer; first match wins
  //   nothing flipped           → first unsolved word's first letter
  function useHint() {
    if (getInv('wf_inv_hint') < 1 || helpsLeft < 1) return;
    if (processingRef.current || hasEndedRef.current) return;
    const s = stateRef.current;
    const unfound = words.map((_, i) => i).filter(i => !s.found.includes(i));
    if (!unfound.length) return;
    const flippedNow = flippedRef.current;

    let tid = null;
    if (!flippedNow.length) {
      // Nothing flipped yet — point at the first letter of the first unsolved
      // word (so you can use a hint to start hunting, not just mid-word).
      tid = `${unfound[0]}-0`;
    } else {
      const flippedLetters = flippedNow.map(id => tiles.find(t => t.id === id)?.letter).filter(Boolean);
      // Candidate: first unfound word whose letters contain the flipped selection
      // as a sub-multiset; fall back to the first unsolved word.
      const containsSelection = (word) => {
        const pool = {};
        flippedLetters.forEach(l => { pool[l] = (pool[l] || 0) + 1; });
        let unmatched = flippedLetters.length;
        [...word].forEach(l => { if (pool[l] > 0) { pool[l]--; unmatched--; } });
        return unmatched === 0;
      };
      const targetWi = unfound.find(i => containsSelection(words[i])) ?? unfound[0];
      const word = words[targetWi];
      // Next missing letter: walk the word in order, crossing off flipped letters.
      const pool = {};
      flippedLetters.forEach(l => { pool[l] = (pool[l] || 0) + 1; });
      let hintPos = -1;
      for (let p = 0; p < word.length; p++) {
        if (pool[word[p]] > 0) pool[word[p]]--;
        else { hintPos = p; break; }
      }
      if (hintPos === -1) return; // selection already covers the whole word
      for (let q = 0; q < word.length; q++) {
        if (word[q] === word[hintPos] && !flippedNow.includes(`${targetWi}-${q}`)) { tid = `${targetWi}-${q}`; break; }
      }
    }
    if (!tid) return;
    setInvHint(addInv('wf_inv_hint', -1));
    usedHintRef.current = true;
    syncUseItem('hint'); // account-level consume (no-op for guests)
    if (isDaily) setDailyHelpsUsed(addDailyHelps(1));
    setHintTileId(tid);
    setTimeout(() => setHintTileId(null), 1600);
  }

  // 💥 Mega Hint: shake every tile of one undiscovered word at once — you see
  // where all four of its letters sit, without being told what they are.
  function useMegaHint() {
    if (getInv('wf_inv_megahint') < 1 || helpsLeft < 1) return;
    if (processingRef.current || hasEndedRef.current) return;
    const s = stateRef.current;
    const unfound = words.map((_, i) => i).filter(i => !s.found.includes(i));
    if (!unfound.length) return;
    // Prefer a word you haven't started building; else the first unsolved one.
    const flippedNow = flippedRef.current;
    const untouched = unfound.filter(wi => !flippedNow.some(id => id.startsWith(wi + '-')));
    const targetWi = (untouched.length ? untouched : unfound)[0];
    const ids = words[targetWi].split('').map((_, li) => `${targetWi}-${li}`);
    setInvMega(addInv('wf_inv_megahint', -1));
    usedHintRef.current = true;
    syncUseItem('megahint');
    if (isDaily) setDailyHelpsUsed(addDailyHelps(1));
    setMegaHintIds(ids);
    setTimeout(() => setMegaHintIds([]), 1800);
  }

  function handleTileClick(tile) {
    // 🔍 X-ray peek: when armed, this tap reveals the tile briefly instead of
    // flipping it. Pure early-return — does not count as a flip or a turn.
    if (xrayArmed) {
      setXrayArmed(false);
      if (processingRef.current || hasEndedRef.current) return;
      if (foundTileIdsRef.current.has(tile.id) || flippedRef.current.includes(tile.id)) return;
      if (getInv('wf_inv_xray') < 1 || helpsLeft < 1) return;
      setInvXray(addInv('wf_inv_xray', -1));
      usedXrayRef.current = true;
      syncUseItem('xray'); // account-level consume (no-op for guests)
      if (isDaily) setDailyHelpsUsed(addDailyHelps(1));
      setXrayTiles(new Set([tile.id]));
      setTimeout(() => setXrayTiles(new Set()), 1300);
      return;
    }

    // Ref-based guards — always current, never stale, immune to React batching
    if (processingRef.current) return;
    if (hasEndedRef.current) return;
    if (foundTileIdsRef.current.has(tile.id)) return;
    if (flippedRef.current.length >= 4) return;
    if (flippedRef.current.includes(tile.id)) return;

    if (!started) setStarted(true);

    // Update ref immediately (sync) then state (async for render)
    flippedRef.current = [...flippedRef.current, tile.id];
    const newFlipped = flippedRef.current;
    setFlipped([...newFlipped]);
    soundManager.flip();

    if (newFlipped.length === 4) {
      // Lock immediately — prevents ANY further input until we unlock
      processingRef.current = true;
      setTurns(t=>t+1);

      const ft = newFlipped.map(id=>tiles.find(t=>t.id===id));
      const letters = ft.map(t=>t.letter);
      const sorted = [...letters].sort().join("");
      const s = stateRef.current;
      const matchIdx = words.findIndex((w,i)=>!s.found.includes(i)&&[...w].sort().join("")===sorted);

      if (matchIdx===-1) {
        // Check for bonus word
        const bonusWord = ALL_WORDS_4.flat().find(w=>
          !words.includes(w) && [...w].sort().join("")===sorted
        );
        if (bonusWord && !foundBonusWords.includes(bonusWord)) {
          soundManager.bonus();
          const bfid = ++floatIdRef.current;
          setFloatingScores(prev=>[...prev,{id:bfid,pts:50,color:"#9B5DE5"}]);
          setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==bfid)),1500);
          setFoundBonusWords(b=>[...b,bonusWord]);
          setLastBonusWord(bonusWord);
          setBonusPts(p=>p+50);
          setFlash("bonus");
          setTimeout(()=>unlock(), 1200);
          return;
        }
        // Bad guess — linger so the player can read the four letters, then flip
        // back. They can tap anywhere to dismiss sooner (see dismissGuess).
        setError(newFlipped); setFlash("bad"); setHadError(true); setWrongGuesses(g=>g+1);
        soundManager.wrong();
        // Arm tap-to-dismiss after a short grace period so the tap that made
        // this 4th flip doesn't instantly dismiss it.
        setTimeout(()=>{ awaitingDismissRef.current = true; }, 400);
        dismissTimerRef.current = setTimeout(()=>unlock(), 2200);
        return;
      }

      // Valid word found!
      const inOrder = letters.join("") === words[matchIdx];
      const pts = inOrder ? 300 : 100;
      const floatColor = inOrder ? "var(--wf-accent)" : "var(--wf-accent2)";
      inOrder ? soundManager.wordGreen() : soundManager.wordYellow();
      const fid = ++floatIdRef.current;
      setFloatingScores(prev=>[...prev,{id:fid,pts,color:floatColor}]);
      setTimeout(()=>setFloatingScores(prev=>prev.filter(f=>f.id!==fid)),1150);
      setFlash(inOrder ? "good" : "goodYellow");
      setTimeout(()=>{
        setFound(f=>[...f,matchIdx]);
        setWordResults(prev=>({...prev,[matchIdx]:inOrder?"green":"yellow"}));
        if (inOrder) setFoundInOrderSet(prev=>new Set([...prev,...newFlipped]));
        // Add to found tile ids ref so future guards block them immediately
        const newFoundIds = new Set([...foundTileIdsRef.current,...newFlipped]);
        foundTileIdsRef.current = newFoundIds;
        setFoundTileIds(newFoundIds);
        setHadError(false);
        setScorePop(true); setTimeout(()=>setScorePop(false),400);
        unlock(); // clears flipped, error, flash, releases lock
      },420);
    }
  }

  if (showReveal) {
    return <RevealGrid words={words} tiles={tiles} maxTurns={maxTurns} onDone={() => setShowReveal(false)} />;
  }

  return (
    <div style={{width:"100%",maxWidth:480,margin:"0 auto"}} onClick={dismissGuess}>
      {(() => {
        const turnsLeft = maxTurns ? maxTurns - turns : null;
        const turnsDanger = turnsLeft !== null && turnsLeft <= 3;
        const wr = Object.values(wordResults);
        const liveScore = wr.filter(r=>r==="green").length*300 + wr.filter(r=>r==="yellow").length*100 + bonusPts;
        return (
          <div style={{marginBottom:8}}>
            {/* Score row — prominent center with floating animation target */}
            <div style={{position:"relative", textAlign:"center", marginBottom:6}}>
              <FloatingScore items={floatingScores} />
              <span style={{
                fontFamily:"'Fraunces',serif",
                fontSize:"clamp(1.4rem,5vw,2rem)",
                fontWeight:900,
                color:"var(--wf-accent2)",
                animation: scorePop ? "scorePop 0.4s cubic-bezier(.4,2,.6,1)" : "none",
                display:"inline-block",
                transition:"color 0.2s",
              }}>
                {liveScore.toLocaleString()}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.7rem",marginLeft:4}}>pts</span>
            </div>
            {/* Stats row */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.78rem"}}>
                {maxTurns ? (
                  <>Turns: <strong aria-live={turnsDanger?"assertive":"off"} style={{color:turnsLeft<=3?"#FF5E5B":"var(--wf-accent2)",transition:"color 0.3s"}}>{turnsLeft}</strong> left</>
                ) : (
                  <>Guesses: <strong style={{color:"var(--wf-accent2)"}}>{turns}</strong></>
                )}
              </span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-dim)",fontSize:"0.78rem"}}>
                Found: <strong style={{color:"var(--wf-accent)"}}>{found.length}/{words.length}</strong>
              </span>
              <span
                aria-live={timeLeft!==null&&timeLeft<15?"assertive":"off"}
                style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.78rem",color:timeLeft!==null&&timeLeft<15?"#FF5E5B":"var(--wf-text-dim)"}}
              >
                {timeLeft!==null?`⏱ ${timeLeft}s`:`⏱ ${formatTime(elapsed)}`}
              </span>
            </div>
          </div>
        );
      })()}
      <FoundWordBanner words={words} wordResults={wordResults} />
      <div
        aria-live="polite"
        aria-atomic="true"
        style={{height:28,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:4}}
      >
        {flash&&(
          <span style={{fontFamily:"'Fraunces',serif",fontSize:"0.95rem",fontWeight:700,animation:"fadeInOut 0.5s ease",
            color:flash==="good"?"var(--wf-accent)":flash==="goodYellow"?"var(--wf-accent2)":flash==="bonus"?"#9B5DE5":"#FF5E5B"}}>
            {flash==="good"&&"🟩 Nice — bonus points!"}
            {flash==="goodYellow"&&"🟨 Found! Try in order for more pts"}
            {flash==="bonus"&&`✨ Bonus word: ${lastBonusWord.toUpperCase()}! +50 pts`}
            {flash==="bad"&&"✗ Not a valid word here"}
          </span>
        )}
      </div>
      {/* Power-up row — only shows when the player owns items (bought in the shop).
          Compact + fixed-ish height; the reveal reserves the same space so the
          board doesn't jump when play begins. */}
      {(invHint>0||invXray>0||invMega>0||xrayArmed)&&(()=>{
        const hintOk = invHint>0 && helpsLeft>0;
        const xrayOk = invXray>0 && helpsLeft>0;
        const megaOk = invMega>0 && helpsLeft>0;
        const chip = (extra) => ({padding:"4px 9px",fontSize:"0.68rem",borderRadius:9,...extra});
        return (
          <div style={{display:"flex",gap:6,justifyContent:"center",alignItems:"center",flexWrap:"wrap",minHeight:28,marginBottom:6}}>
            <button onClick={useHint} disabled={!hintOk}
              style={{...btnStyle(hintOk?"#0e2a3a":"var(--wf-surface)",hintOk?"var(--wf-accent)":"#2a4060"),...chip({border:`1.5px solid ${hintOk?"#00F5C455":"var(--wf-border)"}`})}}>
              💡 ×{invHint}
            </button>
            <button onClick={()=>setXrayArmed(a=>!a)} disabled={!xrayOk&&!xrayArmed}
              style={{...btnStyle(xrayArmed?"#2a1a3e":xrayOk?"#0e2a3a":"var(--wf-surface)",xrayArmed?"#9B5DE5":xrayOk?"var(--wf-accent)":"#2a4060"),...chip({border:`1.5px solid ${xrayArmed?"#9B5DE5":xrayOk?"#00F5C455":"var(--wf-border)"}`})}}>
              {xrayArmed?"🔍 tap a tile…":`🔍 ×${invXray}`}
            </button>
            {invMega>0&&(
              <button onClick={useMegaHint} disabled={!megaOk}
                style={{...btnStyle(megaOk?"#2e1a0e":"var(--wf-surface)",megaOk?"var(--wf-accent2)":"#2a4060"),...chip({border:`1.5px solid ${megaOk?"#FFB70355":"var(--wf-border)"}`})}}>
                💥 ×{invMega}
              </button>
            )}
            {isDaily&&(
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"0.6rem",color:helpsLeft>0?"var(--wf-text-mute)":"#FF5E5B"}}>
                {helpsLeft>0?`${helpsLeft} left`:"limit reached"}
              </span>
            )}
          </div>
        );
      })()}
      <div
        role="grid"
        aria-label="WordFlip game board"
        style={{
          display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,
          gap:"clamp(4px,1.5vw,10px)",padding:"clamp(4px,2vw,12px)",
          background:"var(--wf-surface)",borderRadius:16,border:"1.5px solid var(--wf-border)",
          boxShadow:"0 4px 32px #00000055",
        }}>
        {tiles.map(tile=>(
          <Tile key={tile.id} tile={tile}
            isFlipped={flipped.includes(tile.id)}
            isFound={foundTileIds.has(tile.id)}
            foundInOrder={foundInOrderSet.has(tile.id)}
            isSelected={flipped.includes(tile.id)&&!error.includes(tile.id)}
            isError={error.includes(tile.id)}
            isHint={hintTileId===tile.id||megaHintIds.includes(tile.id)}
            isXray={xrayTiles.has(tile.id)}
            onClick={()=>handleTileClick(tile)}
            orderNum={flipped.includes(tile.id)?flipped.indexOf(tile.id):undefined}
          />
        ))}
      </div>
      <p style={{textAlign:"center",color:"#2a4060",fontSize:"0.75rem",marginTop:8,fontFamily:"'JetBrains Mono',monospace"}}>{maxTurns?`${maxTurns} turns max · `:""}🟩 +300 · 🟨 +100 · time & accuracy bonus revealed at end</p>
    </div>
  );
}

// ─── Count-up number animation ──────────────────────────────────────────────────────
function CountUp({ to, active, color, large, unit = "pts" }) {
  const [val, setVal] = useState(0);
  const [big, setBig] = useState(false);
  const started = useRef(false);
  useEffect(() => {
    if (!active || started.current) return;
    started.current = true;
    if (to === 0) { setVal(0); return; }
    const DURATION = large ? 800 : 620;
    const FRAMES  = large ? 32 : 26;
    let frame = 0;
    const id = setInterval(() => {
      frame++;
      const p = 1 - Math.pow(1 - frame / FRAMES, 3); // cubic ease-out
      setVal(frame >= FRAMES ? to : Math.round(p * to));
      if (frame >= FRAMES) {
        clearInterval(id);
        setBig(true);
        setTimeout(() => setBig(false), large ? 400 : 300);
      }
    }, Math.round(DURATION / FRAMES));
    return () => clearInterval(id);
  }, [active]);
  const popScale = large ? 1.45 : 1.38;
  return (
    <span style={{
      fontFamily: large ? "'Fraunces',serif" : "'JetBrains Mono',monospace",
      fontWeight: 900, color,
      fontSize: large ? "1.6rem" : "0.88rem",
      display: "inline-block",
      transform: big ? `scale(${popScale})` : "scale(1)",
      transition: "transform 0.22s cubic-bezier(.4,2,.6,1)",
    }}>
      +{val.toLocaleString()}{large && unit && <span style={{fontSize:"0.85rem",fontWeight:700}}> {unit}</span>}
    </span>
  );
}

// ─── Firework burst helper ────────────────────────────────────────────────────
function Firework({ color, trigger, large }) {
  const [particles, setParticles] = useState([]);
  const fired = useRef(false);
  useEffect(() => {
    if (!trigger || fired.current) return;
    fired.current = true;
    const count = large ? 22 : 12;
    setParticles(Array.from({ length: count }, (_, i) => {
      const angle = (i / count) * 2 * Math.PI;
      const dist = (large ? 58 : 32) + Math.random() * (large ? 28 : 14);
      return { id: i, tx: Math.cos(angle) * dist, ty: Math.sin(angle) * dist };
    }));
    const t = setTimeout(() => setParticles([]), 900);
    return () => clearTimeout(t);
  }, [trigger]);
  const sz = large ? 9 : 5;
  return particles.map(p => (
    <div key={p.id} style={{
      position:"absolute", width:sz, height:sz, borderRadius:"50%",
      background:color, boxShadow:`0 0 ${sz+2}px ${color}`,
      top:"50%", right:0, marginTop:-(sz/2),
      "--fw-tx":p.tx+"px", "--fw-ty":p.ty+"px",
      animation:"fwParticle 0.72s ease-out forwards", pointerEvents:"none", zIndex:20,
    }} />
  ));
}

// ─── Score Receipt ─────────────────────────────────────────────────────────────────────────────────
function ScoreReceipt({ wordResults, elapsed, wrongGuesses, turns, score, bonusPts = 0, bonusWords = [], coins = 0, coinsFormula = "" }) {
  const greens = wordResults.filter(r=>r==="green").length;
  const yellows = wordResults.filter(r=>r==="yellow").length;
  const wordPts  = greens*300 + yellows*100;
  const timePts  = Math.max(0, 600 - Math.floor(elapsed/1000));
  const guessPts = Math.max(0, 800 - wrongGuesses*50);

  const timeFormula  = timePts > 0 ? `${timePts}s to spare` : "just in time!";
  const accuracyCredits = Math.round(guessPts / 50);
  const guessFormula = `${accuracyCredits} remaining guesses × 50 pts`;

  const rows = [
    { icon:"🔤", label:`Words (${greens}🟩 ${yellows}🟨)`,
      formula: yellows > 0 ? `${greens}×300 + ${yellows}×100` : `${greens}×300`,
      pts:wordPts,  color:"var(--wf-accent)" },
    ...(bonusPts > 0 ? [
      { icon:"✨", label:"Bonus words",
        formula: (bonusWords && bonusWords.length)
          ? `${bonusWords.map(w=>w.toUpperCase()).join(", ")} · ${bonusWords.length}×50`
          : `${Math.round(bonusPts/50)}×50`,
        pts:bonusPts, color:"var(--wf-accent2)" },
    ] : []),
    { icon:"⏱", label:"Time bonus",
      formula:timeFormula,
      pts:timePts,  color:"#9B5DE5" },
    { icon:"🎯", label:"Accuracy bonus",
      formula:guessFormula,
      pts:guessPts, color:"#00BBF9" },
  ];

  const ROW_MS   = 1200;
  const FW_AFTER = 700;
  const [visibleCount, setVisibleCount] = useState(0);
  const [firedSet,     setFiredSet]     = useState(new Set());

  useEffect(() => {
    const timers = [];
    const fire = key => setFiredSet(s => { const n = new Set(s); n.add(key); return n; });
    rows.forEach((_, i) => {
      timers.push(setTimeout(() => setVisibleCount(v => Math.max(v, i+1)), 300 + i*ROW_MS));
      timers.push(setTimeout(() => fire(i),                                300 + i*ROW_MS + FW_AFTER));
    });
    const totalShow = 300 + rows.length * ROW_MS;
    timers.push(setTimeout(() => setVisibleCount(rows.length + 1), totalShow));
    timers.push(setTimeout(() => fire("total"),                    totalShow + 900));
    // Coins earned reveals last, after the total has landed
    if (coins > 0) {
      timers.push(setTimeout(() => setVisibleCount(rows.length + 2), totalShow + 1400));
      timers.push(setTimeout(() => fire("coins"),                    totalShow + 2100));
    }
    return () => timers.forEach(clearTimeout);
  }, []);

  const totalVisible = visibleCount > rows.length;
  const coinsVisible = visibleCount > rows.length + 1;

  return (
    <div style={{background:"var(--wf-surface)", border:"1.5px solid var(--wf-border)", borderRadius:14, padding:"16px 18px", marginBottom:20, textAlign:"left"}}>
      {rows.map((row, i) => {
        const visible = visibleCount > i;
        return (
          <div key={row.label} style={{
            marginBottom:10, opacity:visible?1:0,
            transform:visible?"translateX(0)":"translateX(-10px)",
            transition:"opacity 0.35s ease, transform 0.35s ease",
          }}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace", color:"var(--wf-text-dim)", fontSize:"0.78rem"}}>
                {row.icon} {row.label}
              </span>

    </div>
  );
}


// ─── Win Screen ───────────────────────────────────────────────────────────────
function WinScreen({ result, mode, onPlayAgain, onMenu, isDaily, streak, streakBonus = 0, isNewBest, signedIn, onShop }) {
  const wordResultsArr = result.words.map((_,i) => result.wordResults?.[i] || (result.outOfTurns ? "missed" : "yellow"));
  const score = scoreCalc(result.elapsed, wordResultsArr, result.wrongGuesses, result.bonusPts||0);
  // Coins are only granted server-side when signed in, so only advertise them then.
  // streakBonus comes from handleWin (week-boundary crossing) so it matches the grant.
  const coins = !signedIn ? 0 : mode==="daily" ? dailyTokens(score) + streakBonus : mode==="solo" ? soloTokens(score) : 0;
  const coinsFormula = mode==="daily"
    ? (streakBonus ? `10% of ${score.toLocaleString()} pts + ${streakBonus} streak bonus` : `10% of ${score.toLocaleString()} pts`)
    : "win bonus";
  // Start the streak animation right after the receipt's coins row lands
  const receiptRows = 3 + ((result.bonusPts||0) > 0 ? 1 : 0);
  const streakDelay = 300 + receiptRows * 1200 + (coins > 0 ? 2600 : 1000);
  const prevBest = getPersonalBest();
  const computedNewBest = isDaily && score > prevBest;
  const showNewBest = isNewBest || computedNewBest;
  const [copied, setCopied] = useState(false);

  function handleShare() {
    const text = buildShareText(result.turns, result.elapsed, score, wordResultsArr, result.words.length);
    shareOrCopy(text, (didCopy) => { if (didCopy) { setCopied(true); setTimeout(()=>setCopied(false),2500); } });
  }

  return (
    <div role="main" aria-label="Game results" style={{textAlign:"center",maxWidth:400,margin:"0 auto",padding:20}}>
      <div aria-hidden="true" style={{fontSize:"3rem",marginBottom:8}}>{result.outOfTurns?"😬":"🎉"}</div>
      <h2 style={{fontFamily:"'Fraunces',serif",color:"#F5EDD6",fontSize:"2rem",margin:"0 0 4px"}}>
        {result.outOfTurns?"Out of turns!":mode==="daily"?"Daily Complete!":"You Win!"}
      </h2>
      <p style={{color:"var(--wf-text-dim)",fontFamily:"'JetBrains Mono',monospace",fontSize:"0.9rem",marginBottom:16}}>
        {result.words.join(" · ")}
      </p>
      {isDaily&&showNewBest&&(
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0a2e24",border:"1.5px solid #00F5C4",borderRadius:20,padding:"5px 14px"}}>
            <span>🏆</span>
            <span style={{fontFamily:"'Fraunces',serif",color:"var(--wf-accent)",fontWeight:700,fontSize:"0.9rem"}}>New personal best!</span>
          </div>
        </div>
      )}
      <ScoreReceipt
        wordResults={wordResultsArr}
        elapsed={result.elapsed}
        wrongGuesses={result.wrongGuesses||0}
        turns={result.turns}
        score={score}
        bonusPts={result.bonusPts||0}
        bonusWords={result.bonusWords||[]}
        coins={coins}
        coinsFormula={coinsFormula}
      />
      {isDaily&&(
        <div style={{marginBottom:20}}>
          <StreakCard animate delay={streakDelay} />
        </div>
      )}
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        {isDaily&&(
          <button onClick={handleShare} style={{...btnStyle(copied?"#00c49f":"var(--wf-border)",copied?"#0a2e24":"#F5EDD6"),padding:"10px 20px"}}>
            {copied?"✓ Copied!":"📤 Share"}
          </button>
        )}
        {!isDaily&&(
          <button onClick={onPlayAgain} style={btnStyle("var(--wf-accent)","#0a2e24")}>Play Again</button>
        )}
        <button onClick={onMenu} style={btnStyle("var(--wf-border)","#F5EDD6")}>Menu</button>
      </div>
      {signedIn && onShop && coins > 0 && (
        <button onClick={onShop} style={{...btnStyle("transparent","var(--wf-accent)"),marginTop:14,fontSize:"0.82rem",border:"none",textDecoration:"underline",animation: shopHasNew()?"shopPulse 1.5s ease-in-out infinite":"none"}}>
          🛍️ Spend your coins in the Shop →
        </button>
      )}
    </div>
  );
}

function btnStyle(bg,color) {
  // Remap the common chrome/accent literals callers pass to the active theme,
  // so every button reskins without touching call sites. Primary gradients are
  // rebuilt from the theme accents. Unknown values pass through untouched.
  const c = activeChrome();
  const map = {
    '#00F5C4':c.accent, '#FFB703':c.accent2, '#1e3048':c.border, '#0a1520':c.surface,
    '#7a9cc0':c.textDim, '#3a5570':c.textMute,
    'linear-gradient(90deg,#00c49f,#00F5C4)':`linear-gradient(90deg,${c.accent},${c.accent})`,
    'linear-gradient(90deg,#00F5C4,#FFB703)':`linear-gradient(90deg,${c.accent},${c.accent2})`,
    'linear-gradient(90deg,#FFB703,#ff9f1c)':`linear-gradient(90deg,${c.accent2},${c.accent2})`,
  };
  return {
    background:map[bg]||bg,color:map[color]||color,border:"none",borderRadius:10,
    padding:"10px 24px",fontFamily:"'JetBrains Mono',monospace",
    fontWeight:700,fontSize:"0.9rem",cursor:"pointer",transition:"opacity 0.15s",
  };
}

// ─── Leaderboard ──────────────────────────────────────────────────────────────
function LeaderboardView({ onBack, session, onSignIn, onAchievements }) {
  const [tab, setTab] = useState("personal");
  const [globalTab, setGlobalTab] = useState("daily");
  const [leaderboard, setLeaderboard] = useState([]);
  const [lbLoading, setLbLoading] = useState(false);
  const [lbError, setLbError] = useState(false);
  const [myScores, setMyScores] = useState(null); // null = not yet loaded
  const [myLoading, setMyLoading] = useState(false);
  const [myError, setMyError] = useState(false);
  const [retryKey, setRetryKey] = useState(0);
  const streak = getLiveStreak(); // live, not the possibly-stale stored record

  useEffect(() => {
    if (tab !== "global") return;
    let cancelled = false;
    setLbLoading(true);
    setLbError(false);
    const today = new Date();
    const dk = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
    Promise.race([
      // Refresh an expired JWT first — signed-in reads 401 otherwise (the
      // "leaderboards not loading after being signed in a while" bug).
      ensureFreshSession().then(() => fetchLeaderboard(globalTab, dk)),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000)),
    ]).then(data => {
      if (!cancelled) {
        setLeaderboard(data || []);
        setLbLoading(false);
        // Top-10 placement achievements: is the signed-in user in the top 10?
        if (session?.user && data?.length) {
          const inTop10 = data.slice(0, 10).some(r => r.user_id === session.user.id);
          if (inTop10) {
            const fresh = unlockAchievements([globalTab === 'alltime' ? 'top10_all' : 'top10_daily']);
            if (fresh.length && onAchievements) onAchievements(fresh);
          }
        }
      }
    }).catch(() => {
      if (!cancelled) { setLeaderboard([]); setLbLoading(false); setLbError(true); }
    });
    return () => { cancelled = true; };
  }, [tab, globalTab, retryKey]);

  // When signed in, "My Scores" comes from the account (follows you across devices)
  useEffect(() => {
    if (tab !== "personal" || !session?.user) return;
    let cancelled = false;
    // Only show the loading spinner on first load (no data yet); subsequent
    // re-fetches (e.g. after a session token refresh) refresh silently in bg.
    if (myScores === null) setMyLoading(true);
    setMyError(false);
    Promise.race([
      ensureFreshSession().then(() => fetchMyScores(session.user.id)),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000)),
    ]).then(rows => {
      if (!cancelled) {
        const mapped = (rows || []).map(r => ({
          ...dayKeyToDates(r.day_key),
          score: r.score,
          turns: r.turns,
          elapsed: r.elapsed,
          blocks: r.blocks,
          wrongGuesses: r.wrong_guesses || 0,
          helps: r.helps,
        }));
        setMyScores(mapped);
        setMyLoading(false);
      }
    }).catch(() => {
      if (!cancelled) { setMyScores([]); setMyLoading(false); setMyError(true); }
    });
    return () => { cancelled = true; };
  }, [tab, session?.user?.id, retryKey]);

  // Signed in → account scores; signed out → local device history
  const history = session?.user ? (myScores || []) : getHistory();
  const personalBest = history.reduce((max, e) => Math.max(max, e.score || 0), 0);

    <div style={{maxWidth:440,margin:"0 auto"}}>

        <button onClick={()=>setTab("global")} style={{
          flex:1, padding:"8px 0", borderRadius:10, border:"none", cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:"0.8rem",
          background: tab==="global" ? "#9B5DE5" : "var(--wf-surface)",
          color: tab==="global" ? "#fff" : "var(--wf-text-mute)",
          transition:"all 0.15s",
        }}>🌍 Global</button>
      </div>

      {tab === "personal" && (<>
        {/* Personal best hero card */}
        {personalBest > 0 && (
          <div style={{
            background:"linear-gradient(135deg,#0e2a3a,#0a1520)",
            border:"1.5px solid #FFB703", borderRadius:14,
            padding:"14px 18px", marginBottom:14,
            display:"flex", justifyContent:"space-between", alignItems:"center",
          }}>
            <div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.7rem",marginBottom:4,letterSpacing:"0.08em"}}>PERSONAL BEST</div>
              <div style={{fontFamily:"'Fraunces',serif",color:"var(--wf-accent2)",fontWeight:900,fontSize:"1.8rem"}}>{personalBest.toLocaleString()}</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",color:"var(--wf-text-mute)",fontSize:"0.7rem",marginTop:2}}>pts</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"2rem"}}>🏆</div>

        {/* History list */}

        ) : myError ? (
          <div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:"1.5rem",marginBottom:8}}>⚠️</div>

        ) : (

}
